<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ainf_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ainf_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ainf_arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ainf_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Infrastructure Stack</text>

  <!-- Layer 5: Applications (top, narrowest) -->
  <rect x="185" y="58" width="350" height="46" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="185" y="58" width="350" height="18" rx="14" fill="url(#ainf_accent)"/>
  <rect x="185" y="66" width="350" height="10" fill="url(#ainf_accent)"/>
  <text x="360" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Applications</text>
  <text x="360" y="94" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Chatbots · Recommenders · Vision Apps · NLP Services</text>

  <!-- Arrow 4→5 -->
  <line x1="360" y1="115" x2="360" y2="108" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ainf_arrow)"/>

  <!-- Layer 4: Model Serving -->
  <rect x="155" y="118" width="410" height="46" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="155" y="118" width="410" height="18" rx="14" fill="url(#ainf_accent)"/>
  <rect x="155" y="126" width="410" height="10" fill="url(#ainf_accent)"/>
  <text x="360" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Model Serving</text>
  <text x="360" y="154" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">TF Serving · Triton Inference Server · TorchServe · Seldon Core</text>

  <!-- Arrow 3→4 -->
  <line x1="360" y1="175" x2="360" y2="168" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ainf_arrow)"/>

  <!-- Layer 3: ML Platform -->
  <rect x="125" y="178" width="470" height="46" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="125" y="178" width="470" height="18" rx="14" fill="url(#ainf_accent)"/>
  <rect x="125" y="186" width="470" height="10" fill="url(#ainf_accent)"/>
  <text x="360" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">ML Platform</text>
  <text x="360" y="214" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">MLflow · Kubeflow · SageMaker · Vertex AI · Feature Stores</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="235" x2="360" y2="228" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ainf_arrow)"/>

  <!-- Layer 2: Orchestration -->
  <rect x="95" y="238" width="530" height="46" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="95" y="238" width="530" height="18" rx="14" fill="url(#ainf_accent)"/>
  <rect x="95" y="246" width="530" height="10" fill="url(#ainf_accent)"/>
  <text x="360" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Orchestration</text>
  <text x="360" y="274" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Kubernetes · Docker · Terraform · Helm · Service Mesh</text>

  <!-- Arrow 1→2 -->
  <line x1="360" y1="295" x2="360" y2="288" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ainf_arrow)"/>

  <!-- Layer 1: Hardware (bottom, widest) -->
  <rect x="65" y="298" width="590" height="46" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="65" y="298" width="590" height="18" rx="14" fill="url(#ainf_accent)"/>
  <rect x="65" y="306" width="590" height="10" fill="url(#ainf_accent)"/>
  <text x="360" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Hardware (GPUs / TPUs)</text>
  <text x="360" y="334" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">NVIDIA A100 · Google TPU v4 · AMD MI300 · Intel Gaudi · HBM Memory</text>

  <!-- Side label -->
  <text x="30" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90 30 210)">Abstraction Level ↑</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Infrastructure — From Hardware to Applications</text>
</svg>
