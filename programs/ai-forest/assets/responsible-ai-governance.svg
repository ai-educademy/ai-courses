<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="raig_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="raig_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="raig_accent_v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#raig_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Responsible AI Governance — FATE Framework</text>

  <!-- Roof: AI Governance -->
  <rect x="40" y="52" width="640" height="36" rx="14" fill="url(#raig_accent)"/>
  <text x="360" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="white">🏛️ AI Governance</text>

  <!-- Roof underline connector -->
  <rect x="100" y="88" width="8" height="10" fill="#6366f1" opacity="0.6"/>
  <rect x="256" y="88" width="8" height="10" fill="#6366f1" opacity="0.6"/>
  <rect x="412" y="88" width="8" height="10" fill="#6366f1" opacity="0.6"/>
  <rect x="568" y="88" width="8" height="10" fill="#6366f1" opacity="0.6"/>

  <!-- Pillar 1: Fairness -->
  <rect x="45" y="98" width="148" height="225" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="45" y="98" width="148" height="30" rx="14" fill="url(#raig_accent)"/>
  <rect x="45" y="114" width="148" height="14" fill="url(#raig_accent)"/>
  <text x="119" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">⚖️ Fairness</text>

  <text x="65" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Bias detection &amp;</text>
  <text x="72" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">mitigation</text>
  <text x="65" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Equal treatment</text>
  <text x="72" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">across groups</text>
  <text x="65" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Inclusive datasets</text>
  <text x="65" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Disparate impact</text>
  <text x="72" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">analysis</text>
  <text x="65" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Regular fairness</text>
  <text x="72" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">audits</text>

  <!-- Pillar 2: Accountability -->
  <rect x="201" y="98" width="148" height="225" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="201" y="98" width="148" height="30" rx="14" fill="url(#raig_accent)"/>
  <rect x="201" y="114" width="148" height="14" fill="url(#raig_accent)"/>
  <text x="275" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">📋 Accountability</text>

  <text x="221" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Clear ownership</text>
  <text x="228" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">of AI decisions</text>
  <text x="221" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Audit trails &amp;</text>
  <text x="228" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">documentation</text>
  <text x="221" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Incident response</text>
  <text x="228" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">procedures</text>
  <text x="221" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Role-based access</text>
  <text x="221" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Compliance</text>
  <text x="228" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">reporting</text>

  <!-- Pillar 3: Transparency -->
  <rect x="357" y="98" width="148" height="225" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="357" y="98" width="148" height="30" rx="14" fill="url(#raig_accent)"/>
  <rect x="357" y="114" width="148" height="14" fill="url(#raig_accent)"/>
  <text x="431" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">🔍 Transparency</text>

  <text x="377" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Explainable AI</text>
  <text x="384" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">(XAI) methods</text>
  <text x="377" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Model cards &amp;</text>
  <text x="384" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">datasheets</text>
  <text x="377" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Open documentation</text>
  <text x="377" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Decision rationale</text>
  <text x="384" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">logging</text>
  <text x="377" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Stakeholder</text>
  <text x="384" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">communication</text>

  <!-- Pillar 4: Ethics -->
  <rect x="513" y="98" width="148" height="225" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="513" y="98" width="148" height="30" rx="14" fill="url(#raig_accent)"/>
  <rect x="513" y="114" width="148" height="14" fill="url(#raig_accent)"/>
  <text x="587" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">🧭 Ethics</text>

  <text x="533" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Human-centered</text>
  <text x="540" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">design principles</text>
  <text x="533" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Privacy by design</text>
  <text x="533" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Do-no-harm policy</text>
  <text x="533" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Ethics review</text>
  <text x="540" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">boards</text>
  <text x="533" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Consent &amp; user</text>
  <text x="540" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">agency</text>

  <!-- Foundation bar: Responsible AI -->
  <rect x="40" y="335" width="640" height="36" rx="14" fill="url(#raig_accent)"/>
  <text x="360" y="359" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="white">🌱 Responsible AI</text>

  <!-- Foundation connectors -->
  <rect x="100" y="323" width="8" height="12" fill="#6366f1" opacity="0.6"/>
  <rect x="256" y="323" width="8" height="12" fill="#6366f1" opacity="0.6"/>
  <rect x="412" y="323" width="8" height="12" fill="#6366f1" opacity="0.6"/>
  <rect x="568" y="323" width="8" height="12" fill="#6366f1" opacity="0.6"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">FATE Framework — Fairness, Accountability, Transparency &amp; Ethics</text>
</svg>
