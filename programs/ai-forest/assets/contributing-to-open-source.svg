<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ctos_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ctos_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ctos_arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ctos_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Open Source Contribution Workflow</text>

  <!-- Step positions arranged in a rounded rectangle flow -->
  <!-- Top row: Fork → Clone → Branch → Commit (left to right) -->
  <!-- Bottom row: Merge ← Review ← PR ← Push (left to right, flow goes right to left) -->

  <!-- Fork -->
  <rect x="50" y="70" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="110" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🍴 Fork</text>
  <text x="110" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Copy repository</text>

  <!-- Arrow Fork → Clone -->
  <line x1="170" y1="96" x2="198" y2="96" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Clone -->
  <rect x="205" y="70" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="265" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📥 Clone</text>
  <text x="265" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Local copy</text>

  <!-- Arrow Clone → Branch -->
  <line x1="325" y1="96" x2="353" y2="96" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Branch -->
  <rect x="360" y="70" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="420" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🌿 Branch</text>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Feature branch</text>

  <!-- Arrow Branch → Commit -->
  <line x1="480" y1="96" x2="508" y2="96" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Commit -->
  <rect x="515" y="70" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="575" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">💾 Commit</text>
  <text x="575" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Save changes</text>

  <!-- Arrow Commit → Push (going down on right side) -->
  <line x1="660" y1="96" x2="660" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="660" y1="130" x2="660" y2="195" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="660" y1="195" x2="640" y2="195" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Right side connector (vertical) -->
  <path d="M 635 122 Q 665 122 665 152 L 665 168 Q 665 195 640 195" fill="none" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- Push -->
  <rect x="515" y="170" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="575" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📤 Push</text>
  <text x="575" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Upload to remote</text>

  <!-- Arrow Push → PR -->
  <line x1="515" y1="196" x2="487" y2="196" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Pull Request -->
  <rect x="360" y="170" width="120" height="52" rx="14" fill="url(#ctos_accent)"/>
  <text x="420" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">📋 Pull Request</text>
  <text x="420" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Propose changes</text>

  <!-- Arrow PR → Review -->
  <line x1="360" y1="196" x2="332" y2="196" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Review -->
  <rect x="205" y="170" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="265" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">👀 Review</text>
  <text x="265" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Code review</text>

  <!-- Arrow Review → Merge -->
  <line x1="205" y1="196" x2="177" y2="196" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ctos_arrow)"/>

  <!-- Merge -->
  <rect x="50" y="170" width="120" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="110" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🔀 Merge</text>
  <text x="110" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Integrate code</text>

  <!-- Arrow Merge back to Fork (cycle arrow on left side) -->
  <path d="M 50 196 L 25 196 Q 15 196 15 175 L 15 96 Q 15 76 50 76" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6 3" marker-end="url(#ctos_arrow)"/>

  <!-- Cycle label -->
  <text x="360" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">↻ Continue contributing — start new features from your fork</text>

  <!-- Key tips section -->
  <rect x="80" y="280" width="560" height="70" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Best Practices</text>
  <text x="180" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Small, focused PRs</text>
  <text x="360" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Descriptive commits</text>
  <text x="540" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Follow conventions</text>
  <text x="180" y="338" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Sync with upstream</text>
  <text x="360" y="338" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Add tests</text>
  <text x="540" y="338" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✓ Update docs</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Open Source Git Workflow — Fork, Branch, PR &amp; Merge</text>
</svg>
