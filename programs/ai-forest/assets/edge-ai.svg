<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="edai_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="edai_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="edai_arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="edai_arrow_accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#edai_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Edge AI Architecture</text>

  <!-- Cloud Box (left side) -->
  <rect x="40" y="60" width="250" height="280" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="40" y="60" width="250" height="32" rx="14" fill="url(#edai_accent)"/>
  <rect x="40" y="78" width="250" height="14" fill="url(#edai_accent)"/>
  <text x="165" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">☁️ Cloud</text>

  <!-- Cloud sub-items -->
  <rect x="60" y="105" width="210" height="40" rx="10" fill="#f0f0ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Model Training</text>
  <text x="165" y="137" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">GPU clusters · Large datasets</text>

  <rect x="60" y="155" width="210" height="40" rx="10" fill="#f0f0ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="171" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Model Optimization</text>
  <text x="165" y="187" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Quantization · Pruning · Distillation</text>

  <rect x="60" y="205" width="210" height="40" rx="10" fill="#f0f0ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="221" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Analytics Dashboard</text>
  <text x="165" y="237" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Aggregate telemetry · KPI tracking</text>

  <rect x="60" y="255" width="210" height="40" rx="10" fill="#f0f0ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="271" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">OTA Updates</text>
  <text x="165" y="287" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Deploy new models to devices</text>

  <!-- Network connection zone -->
  <text x="375" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6b7280">Network</text>
  <line x1="340" y1="80" x2="410" y2="80" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Arrows: Model deployment (down) -->
  <line x1="290" y1="140" x2="420" y2="107" stroke="#6366f1" stroke-width="2.5" marker-end="url(#edai_arrow_accent)"/>
  <text x="340" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1" transform="rotate(-8 340 112)">Model Deploy ↓</text>

  <line x1="290" y1="200" x2="420" y2="207" stroke="#6366f1" stroke-width="2.5" marker-end="url(#edai_arrow_accent)"/>
  <text x="348" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">Model Deploy ↓</text>

  <line x1="290" y1="265" x2="420" y2="307" stroke="#6366f1" stroke-width="2.5" marker-end="url(#edai_arrow_accent)"/>
  <text x="340" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1" transform="rotate(8 340 295)">Model Deploy ↓</text>

  <!-- Arrows: Telemetry (up) -->
  <line x1="420" y1="125" x2="290" y2="158" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#edai_arrow)"/>
  <text x="370" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Telemetry ↑</text>

  <line x1="420" y1="225" x2="290" y2="218" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#edai_arrow)"/>
  <text x="370" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Telemetry ↑</text>

  <line x1="420" y1="325" x2="290" y2="280" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#edai_arrow)"/>
  <text x="370" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Telemetry ↑</text>

  <!-- Edge Device 1: Phone -->
  <rect x="430" y="68" width="260" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="430" y="68" width="260" height="26" rx="14" fill="url(#edai_accent)"/>
  <rect x="430" y="82" width="260" height="12" fill="url(#edai_accent)"/>
  <text x="560" y="87" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">📱 Smartphone</text>
  <text x="560" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Local Inference</text>
  <text x="560" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Voice assistant · Face ID · On-device ML</text>

  <!-- Edge Device 2: Camera -->
  <rect x="430" y="168" width="260" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="430" y="168" width="260" height="26" rx="14" fill="url(#edai_accent)"/>
  <rect x="430" y="182" width="260" height="12" fill="url(#edai_accent)"/>
  <text x="560" y="187" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">📷 Smart Camera</text>
  <text x="560" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Local Inference</text>
  <text x="560" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Object detection · Motion alerts · Analytics</text>

  <!-- Edge Device 3: Vehicle -->
  <rect x="430" y="268" width="260" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="430" y="268" width="260" height="26" rx="14" fill="url(#edai_accent)"/>
  <rect x="430" y="282" width="260" height="12" fill="url(#edai_accent)"/>
  <text x="560" y="287" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">🚗 Autonomous Vehicle</text>
  <text x="560" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Local Inference</text>
  <text x="560" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">LIDAR processing · Path planning · Real-time</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Edge AI — Cloud Training, On-Device Inference</text>
</svg>
