<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="airg_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="airg_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#airg_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Global AI Regulation Landscape</text>

  <!-- EU Panel -->
  <rect x="30" y="55" width="210" height="305" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="55" width="210" height="36" rx="14" fill="url(#airg_accent)"/>
  <rect x="30" y="77" width="210" height="14" fill="url(#airg_accent)"/>
  <text x="135" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">🇪🇺 European Union</text>
  <text x="135" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">AI Act</text>

  <text x="50" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Risk-Based Classification</text>
  <text x="50" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Unacceptable risk — banned</text>
  <text x="50" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• High risk — strict oversight</text>
  <text x="50" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Limited risk — transparency</text>
  <text x="50" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Minimal risk — no rules</text>

  <text x="50" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Prohibited Practices</text>
  <text x="50" y="219" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Social scoring systems</text>
  <text x="50" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Real-time biometric ID</text>
  <text x="50" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Manipulative AI</text>

  <text x="50" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Transparency</text>
  <text x="50" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Disclosure requirements</text>
  <text x="50" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Technical documentation</text>
  <text x="50" y="321" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Human oversight mandates</text>
  <text x="50" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Data governance rules</text>

  <!-- US Panel -->
  <rect x="255" y="55" width="210" height="305" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="255" y="55" width="210" height="36" rx="14" fill="url(#airg_accent)"/>
  <rect x="255" y="77" width="210" height="14" fill="url(#airg_accent)"/>
  <text x="360" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">🇺🇸 United States</text>
  <text x="360" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Executive Order</text>

  <text x="275" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Safety Standards</text>
  <text x="275" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Red-team testing required</text>
  <text x="275" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Safety benchmarks</text>
  <text x="275" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Dual-use model reporting</text>
  <text x="275" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Watermarking AI content</text>

  <text x="275" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Privacy</text>
  <text x="275" y="219" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Federal privacy guidance</text>
  <text x="275" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Training data protections</text>
  <text x="275" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Consumer safeguards</text>

  <text x="275" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Equity</text>
  <text x="275" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Anti-discrimination rules</text>
  <text x="275" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Algorithmic bias audits</text>
  <text x="275" y="321" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Civil rights protections</text>
  <text x="275" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Workforce impact studies</text>

  <!-- China Panel -->
  <rect x="480" y="55" width="210" height="305" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="480" y="55" width="210" height="36" rx="14" fill="url(#airg_accent)"/>
  <rect x="480" y="77" width="210" height="14" fill="url(#airg_accent)"/>
  <text x="585" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">🇨🇳 China</text>
  <text x="585" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Algorithm Rules</text>

  <text x="500" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Algorithm Registration</text>
  <text x="500" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Mandatory filing system</text>
  <text x="500" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Security assessments</text>
  <text x="500" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Public algorithm registry</text>
  <text x="500" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Compliance audits</text>

  <text x="500" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Content Recommendations</text>
  <text x="500" y="219" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• User opt-out rights</text>
  <text x="500" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• No price discrimination</text>
  <text x="500" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Addiction prevention</text>

  <text x="500" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Data Governance</text>
  <text x="500" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Cross-border data rules</text>
  <text x="500" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Personal data protection</text>
  <text x="500" y="321" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Deep synthesis labelling</text>
  <text x="500" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Generative AI licensing</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Regulation — EU AI Act, US Executive Order &amp; China Algorithm Rules</text>
</svg>
