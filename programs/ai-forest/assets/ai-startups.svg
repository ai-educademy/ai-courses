<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="aist_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aist_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="aist_arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#aist_bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Startup Lifecycle</text>

  <!-- Step 1: Idea -->
  <rect x="38" y="280" width="115" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="38" y="280" width="115" height="22" rx="14" fill="url(#aist_accent)"/>
  <rect x="38" y="292" width="115" height="10" fill="url(#aist_accent)"/>
  <text x="95" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">💡 Idea</text>
  <text x="95" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Identify problem</text>
  <text x="95" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Validate hypothesis</text>
  <!-- Platform for step 1 -->
  <rect x="28" y="340" width="135" height="8" rx="4" fill="url(#aist_accent)" opacity="0.3"/>

  <!-- Arrow 1→2 -->
  <line x1="163" y1="300" x2="180" y2="268" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aist_arrow)"/>

  <!-- Step 2: MVP -->
  <rect x="170" y="225" width="115" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="170" y="225" width="115" height="22" rx="14" fill="url(#aist_accent)"/>
  <rect x="170" y="237" width="115" height="10" fill="url(#aist_accent)"/>
  <text x="227" y="241" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🔧 MVP</text>
  <text x="227" y="263" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Build prototype</text>
  <text x="227" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">First users &amp; feedback</text>
  <!-- Platform for step 2 -->
  <rect x="160" y="285" width="135" height="8" rx="4" fill="url(#aist_accent)" opacity="0.3"/>

  <!-- Arrow 2→3 -->
  <line x1="295" y1="245" x2="312" y2="213" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aist_arrow)"/>

  <!-- Step 3: Product-Market Fit -->
  <rect x="302" y="170" width="115" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="302" y="170" width="115" height="22" rx="14" fill="url(#aist_accent)"/>
  <rect x="302" y="182" width="115" height="10" fill="url(#aist_accent)"/>
  <text x="359" y="186" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">🎯 PMF</text>
  <text x="359" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Revenue traction</text>
  <text x="359" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Series A funding</text>
  <!-- Platform for step 3 -->
  <rect x="292" y="230" width="135" height="8" rx="4" fill="url(#aist_accent)" opacity="0.3"/>

  <!-- Arrow 3→4 -->
  <line x1="427" y1="190" x2="444" y2="158" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aist_arrow)"/>

  <!-- Step 4: Scale -->
  <rect x="434" y="115" width="115" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="434" y="115" width="115" height="22" rx="14" fill="url(#aist_accent)"/>
  <rect x="434" y="127" width="115" height="10" fill="url(#aist_accent)"/>
  <text x="491" y="131" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🚀 Scale</text>
  <text x="491" y="153" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Grow team &amp; infra</text>
  <text x="491" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Series B/C rounds</text>
  <!-- Platform for step 4 -->
  <rect x="424" y="175" width="135" height="8" rx="4" fill="url(#aist_accent)" opacity="0.3"/>

  <!-- Arrow 4→5 -->
  <line x1="559" y1="135" x2="576" y2="103" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aist_arrow)"/>

  <!-- Step 5: Exit -->
  <rect x="566" y="60" width="115" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="566" y="60" width="115" height="22" rx="14" fill="url(#aist_accent)"/>
  <rect x="566" y="72" width="115" height="10" fill="url(#aist_accent)"/>
  <text x="623" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🏆 Exit</text>
  <text x="623" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">IPO or Acquisition</text>
  <text x="623" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Return to investors</text>
  <!-- Platform for step 5 -->
  <rect x="556" y="120" width="135" height="8" rx="4" fill="url(#aist_accent)" opacity="0.3"/>

  <!-- Ascending dashed guide line -->
  <line x1="50" y1="345" x2="680" y2="65" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Startup Journey — From Idea to Exit</text>
</svg>
