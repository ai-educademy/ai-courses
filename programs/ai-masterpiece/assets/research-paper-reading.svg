<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="rpr-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="rpr-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#rpr-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Reading Research Papers — Efficient Strategy</text>
  <!-- Paper sections as stacked cards with reading order -->
  <rect x="40" y="58" width="360" height="48" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="68" cy="82" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">1</text>
  <text x="230" y="77" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Abstract</text>
  <text x="230" y="94" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Read first — decide if paper is worth your time (2 min)</text>
  <rect x="40" y="112" width="360" height="48" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="68" cy="136" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">2</text>
  <text x="230" y="131" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Introduction</text>
  <text x="230" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Problem statement, motivation, and contributions (5 min)</text>
  <rect x="40" y="166" width="360" height="48" rx="14" fill="white" stroke="#6366f1" stroke-width="2"/>
  <circle cx="68" cy="190" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="230" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Figures &amp; Tables</text>
  <text x="230" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Skip text — scan all visuals and captions first (5 min) ⭐</text>
  <rect x="40" y="220" width="360" height="48" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="68" cy="244" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">4</text>
  <text x="230" y="239" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Method</text>
  <text x="230" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Core technical approach — take notes, draw diagrams (15 min)</text>
  <rect x="40" y="274" width="360" height="48" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="68" cy="298" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="302" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">5</text>
  <text x="230" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Experiments &amp; Results</text>
  <text x="230" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Baselines, ablations, key findings (10 min)</text>
  <rect x="40" y="328" width="360" height="48" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="68" cy="352" r="14" fill="url(#rpr-accent)"/>
  <text x="68" y="356" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">6</text>
  <text x="230" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Conclusion</text>
  <text x="230" y="364" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Summary, limitations, and future work (3 min)</text>
  <!-- Right side: tips -->
  <rect x="425" y="58" width="270" height="155" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="560" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📖 Three-Pass Method</text>
  <text x="560" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">Pass 1: Skim (10 min)</text>
  <text x="560" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Title, abstract, figures, conclusion</text>
  <text x="560" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">Pass 2: Understand (30 min)</text>
  <text x="560" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Read fully, ignore proofs/details</text>
  <text x="560" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">Pass 3: Reproduce (hours)</text>
  <text x="560" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Re-derive results, implement code</text>
  <!-- Active reading -->
  <rect x="425" y="225" width="270" height="145" rx="14" fill="url(#rpr-accent)"/>
  <text x="560" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">✍️ Active Reading Notes</text>
  <text x="560" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">• What problem does this solve?</text>
  <text x="560" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">• What's the key insight/novelty?</text>
  <text x="560" y="311" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">• What are the limitations?</text>
  <text x="560" y="329" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">• How could I apply this?</text>
  <text x="560" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">• What questions remain?</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Reading papers is a skill — practice with 2-3 papers per week</text>
</svg>