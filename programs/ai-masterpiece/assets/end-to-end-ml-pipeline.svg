<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="eml-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="eml-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="eml-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#eml-bg)" rx="20"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">End-to-End ML Pipeline</text>
  <!-- Stage 1: Data Collection -->
  <rect x="15" y="60" width="88" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="59" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="59" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">1</text>
  <text x="59" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Data</text>
  <text x="59" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Collection</text>
  <text x="59" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">APIs, DBs,</text>
  <text x="59" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Scraping</text>
  <line x1="103" y1="110" x2="113" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 2: Preprocessing -->
  <rect x="118" y="60" width="76" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="156" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="156" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">2</text>
  <text x="156" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Pre-</text>
  <text x="156" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">processing</text>
  <text x="156" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Clean, impute,</text>
  <text x="156" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">normalise</text>
  <line x1="194" y1="110" x2="204" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 3: Feature Engineering -->
  <rect x="209" y="60" width="76" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="247" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="247" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">3</text>
  <text x="247" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Feature</text>
  <text x="247" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Engineering</text>
  <text x="247" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Transform,</text>
  <text x="247" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">encode, select</text>
  <line x1="285" y1="110" x2="295" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 4: Training -->
  <rect x="300" y="60" width="76" height="100" rx="14" fill="url(#eml-accent)"/>
  <circle cx="338" cy="82" r="12" fill="white"/>
  <text x="338" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">4</text>
  <text x="338" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">Model</text>
  <text x="338" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">Training</text>
  <text x="338" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e0e7ff">Experiments,</text>
  <text x="338" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e0e7ff">hyperparams</text>
  <line x1="376" y1="110" x2="386" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 5: Evaluation -->
  <rect x="391" y="60" width="76" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="429" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="429" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">5</text>
  <text x="429" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Evaluation</text>
  <text x="429" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Metrics, A/B,</text>
  <text x="429" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">cross-validation</text>
  <line x1="467" y1="110" x2="477" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 6: Deployment -->
  <rect x="542" y="60" width="76" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="580" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="580" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">6</text>
  <text x="580" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Deploy</text>
  <text x="580" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">API, container,</text>
  <text x="580" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">CI/CD</text>
  <line x1="618" y1="110" x2="628" y2="110" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#eml-arrow)"/>
  <!-- Stage 7: Monitoring -->
  <rect x="633" y="60" width="76" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="671" cy="82" r="12" fill="url(#eml-accent)"/>
  <text x="671" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="white">7</text>
  <text x="671" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Monitor</text>
  <text x="671" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Drift, perf,</text>
  <text x="671" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">alerting</text>
  <!-- Registry box connecting eval and deploy -->
  <rect x="480" y="70" width="58" height="40" rx="8" fill="#ede9fe" stroke="#c7d2fe" stroke-width="1"/>
  <text x="509" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7" font-weight="600" fill="#4338ca">Model</text>
  <text x="509" y="99" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7" font-weight="600" fill="#4338ca">Registry</text>
  <!-- Tools row -->
  <text x="360" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Tools &amp; Technologies</text>
  <rect x="20" y="210" width="100" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="70" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Data</text>
  <text x="70" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Spark, Airflow</text>
  <rect x="130" y="210" width="100" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="180" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Training</text>
  <text x="180" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">PyTorch, W&amp;B</text>
  <rect x="240" y="210" width="100" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="290" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Tracking</text>
  <text x="290" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">MLflow, DVC</text>
  <rect x="350" y="210" width="100" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="400" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Serving</text>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">FastAPI, TF Serve</text>
  <rect x="460" y="210" width="100" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="510" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Infra</text>
  <text x="510" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Docker, K8s</text>
  <rect x="570" y="210" width="130" height="45" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="635" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">Monitoring</text>
  <text x="635" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Prometheus, Grafana</text>
  <!-- Key Principles -->
  <rect x="60" y="280" width="280" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">✅ Best Practices</text>
  <text x="200" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Version everything: data, code, models</text>
  <text x="200" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Automate with CI/CD from day one</text>
  <text x="200" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Monitor for data &amp; model drift</text>
  <rect x="380" y="280" width="280" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="520" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">📊 Key Metrics</text>
  <text x="520" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Model accuracy, F1, AUC</text>
  <text x="520" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Latency p50, p95, p99</text>
  <text x="520" y="347" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Data freshness &amp; pipeline SLA</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Production ML is 90% engineering, 10% modelling</text>
</svg>