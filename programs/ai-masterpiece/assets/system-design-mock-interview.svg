<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="sdm-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="sdm-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="sdm-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#sdm-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">System Design Interview — 5-Step Framework</text>
  <!-- Step 1 -->
  <rect x="20" y="65" width="125" height="155" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="20" y="65" width="125" height="38" rx="14" fill="url(#sdm-accent)"/>
  <rect x="20" y="85" width="125" height="18" fill="url(#sdm-accent)"/>
  <text x="82" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">① Requirements</text>
  <text x="82" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">~5 minutes</text>
  <text x="82" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Functional reqs</text>
  <text x="82" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Non-functional reqs</text>
  <text x="82" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Scale estimates</text>
  <text x="82" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Constraints</text>
  <text x="82" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Ask many questions!</text>
  <line x1="145" y1="142" x2="160" y2="142" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#sdm-arrow)"/>
  <!-- Step 2 -->
  <rect x="163" y="65" width="125" height="155" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="163" y="65" width="125" height="38" rx="14" fill="url(#sdm-accent)"/>
  <rect x="163" y="85" width="125" height="18" fill="url(#sdm-accent)"/>
  <text x="225" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">② High Level</text>
  <text x="225" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">~10 minutes</text>
  <text x="225" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">API design</text>
  <text x="225" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Data model</text>
  <text x="225" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Component diagram</text>
  <text x="225" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Data flow</text>
  <text x="225" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Draw boxes &amp; arrows</text>
  <line x1="288" y1="142" x2="303" y2="142" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#sdm-arrow)"/>
  <!-- Step 3 -->
  <rect x="306" y="65" width="125" height="155" rx="14" fill="white" stroke="#6366f1" stroke-width="2"/>
  <rect x="306" y="65" width="125" height="38" rx="14" fill="url(#sdm-accent)"/>
  <rect x="306" y="85" width="125" height="18" fill="url(#sdm-accent)"/>
  <text x="368" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">③ Deep Dive</text>
  <text x="368" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">~15 minutes</text>
  <text x="368" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Core algorithms</text>
  <text x="368" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">DB schema details</text>
  <text x="368" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Caching strategy</text>
  <text x="368" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Key component</text>
  <text x="368" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Show depth here ⭐</text>
  <line x1="431" y1="142" x2="446" y2="142" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#sdm-arrow)"/>
  <!-- Step 4 -->
  <rect x="449" y="65" width="125" height="155" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="449" y="65" width="125" height="38" rx="14" fill="url(#sdm-accent)"/>
  <rect x="449" y="85" width="125" height="18" fill="url(#sdm-accent)"/>
  <text x="511" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">④ Trade-offs</text>
  <text x="511" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">~8 minutes</text>
  <text x="511" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">SQL vs NoSQL</text>
  <text x="511" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Push vs Pull</text>
  <text x="511" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Consistency models</text>
  <text x="511" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Cost analysis</text>
  <text x="511" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">No perfect answer!</text>
  <line x1="574" y1="142" x2="589" y2="142" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#sdm-arrow)"/>
  <!-- Step 5 -->
  <rect x="592" y="65" width="108" height="155" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="592" y="65" width="108" height="38" rx="14" fill="url(#sdm-accent)"/>
  <rect x="592" y="85" width="108" height="18" fill="url(#sdm-accent)"/>
  <text x="646" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">⑤ Scale</text>
  <text x="646" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">~7 minutes</text>
  <text x="646" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Sharding</text>
  <text x="646" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Load balancing</text>
  <text x="646" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">CDN, replication</text>
  <text x="646" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Monitoring</text>
  <text x="646" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">10x the load</text>
  <!-- Evaluation criteria -->
  <rect x="40" y="240" width="640" height="120" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🎯 What Interviewers Evaluate</text>
  <rect x="60" y="278" width="145" height="36" rx="10" fill="#ede9fe"/>
  <text x="132" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca" font-weight="600">Problem Scoping</text>
  <text x="132" y="308" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Can you narrow scope?</text>
  <rect x="215" y="278" width="145" height="36" rx="10" fill="#ede9fe"/>
  <text x="287" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca" font-weight="600">Technical Depth</text>
  <text x="287" y="308" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Do you know the details?</text>
  <rect x="370" y="278" width="145" height="36" rx="10" fill="#ede9fe"/>
  <text x="442" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca" font-weight="600">Communication</text>
  <text x="442" y="308" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Clear explanation?</text>
  <rect x="525" y="278" width="145" height="36" rx="10" fill="#ede9fe"/>
  <text x="597" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4338ca" font-weight="600">Trade-off Analysis</text>
  <text x="597" y="308" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Justify every choice</text>
  <text x="360" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">💡 Tip: Treat it as a collaborative design session, not a test</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Structure beats brilliance — follow the framework, then go deep where it matters</text>
</svg>