<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="kcg-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="kcg-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="kcg-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#kcg-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Kaggle Competition Guide</text>
  <!-- Circular flow: 6 steps arranged in a rounded rectangle path -->
  <!-- Top row: left to right -->
  <rect x="30" y="65" width="130" height="105" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="95" cy="88" r="14" fill="url(#kcg-accent)"/>
  <text x="95" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">1</text>
  <text x="95" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Explore Data</text>
  <text x="95" y="133" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">EDA, visualise</text>
  <text x="95" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">distributions, nulls</text>
  <text x="95" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">pandas, seaborn</text>
  <line x1="160" y1="117" x2="185" y2="117" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#kcg-arrow)"/>
  <rect x="190" y="65" width="130" height="105" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="255" cy="88" r="14" fill="url(#kcg-accent)"/>
  <text x="255" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">2</text>
  <text x="255" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Feature Eng.</text>
  <text x="255" y="133" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Create, transform,</text>
  <text x="255" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">select features</text>
  <text x="255" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Often the biggest lever</text>
  <line x1="320" y1="117" x2="345" y2="117" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#kcg-arrow)"/>
  <rect x="350" y="65" width="130" height="105" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="415" cy="88" r="14" fill="url(#kcg-accent)"/>
  <text x="415" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">3</text>
  <text x="415" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Model Select</text>
  <text x="415" y="133" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">XGBoost, LightGBM,</text>
  <text x="415" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Neural nets, SVM</text>
  <text x="415" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Cross-validate locally</text>
  <line x1="480" y1="117" x2="505" y2="117" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#kcg-arrow)"/>
  <!-- Bottom row: right to left (but arranged left to right visually) -->
  <rect x="510" y="65" width="130" height="105" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="575" cy="88" r="14" fill="url(#kcg-accent)"/>
  <text x="575" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">4</text>
  <text x="575" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Ensemble</text>
  <text x="575" y="133" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Blend, stack,</text>
  <text x="575" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">average models</text>
  <text x="575" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Top teams always do</text>
  <!-- Arrow down from Ensemble -->
  <line x1="575" y1="170" x2="575" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#kcg-arrow)"/>
  <!-- Submit -->
  <rect x="510" y="205" width="130" height="85" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="575" cy="228" r="14" fill="url(#kcg-accent)"/>
  <text x="575" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">5</text>
  <text x="575" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Submit</text>
  <text x="575" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Generate predictions</text>
  <text x="575" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Max 5 subs/day</text>
  <!-- Arrow left from Submit -->
  <line x1="510" y1="248" x2="490" y2="248" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#kcg-arrow)"/>
  <!-- Leaderboard -->
  <rect x="350" y="205" width="135" height="85" rx="14" fill="url(#kcg-accent)"/>
  <text x="418" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🏆 Leaderboard</text>
  <text x="418" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Public vs Private</text>
  <text x="418" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Trust your local CV!</text>
  <!-- Iterate loop arrow back to step 1 -->
  <path d="M350,248 L200,248 C100,248 95,200 95,170" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6" marker-end="url(#kcg-arrow)"/>
  <text x="180" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6366f1" font-weight="600">↻ Iterate &amp; improve</text>
  <!-- Tips -->
  <rect x="40" y="305" width="300" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="190" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">🎯 Winning Strategies</text>
  <text x="190" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Focus 80% on features, 20% on models</text>
  <text x="190" y="357" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Build a robust local validation setup</text>
  <rect x="360" y="305" width="320" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="520" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">⚠️ Common Mistakes</text>
  <text x="520" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Overfitting to public leaderboard</text>
  <text x="520" y="357" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Ignoring data leakage in features</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Kaggle medals prove you can ship ML — treat competitions as portfolio pieces</text>
</svg>