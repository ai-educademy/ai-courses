<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="osa-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="osa-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#osa-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Open Source AI Project Structure</text>
  <!-- Repo tree on left -->
  <rect x="30" y="60" width="280" height="310" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="170" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📁 my-ai-project/</text>
  <text x="55" y="110" font-family="monospace" font-size="11" fill="#475569">├── 📄 README.md</text>
  <text x="55" y="128" font-family="monospace" font-size="11" fill="#475569">├── 📄 LICENSE</text>
  <text x="55" y="146" font-family="monospace" font-size="11" fill="#475569">├── �� CONTRIBUTING.md</text>
  <text x="55" y="164" font-family="monospace" font-size="11" fill="#475569">├── 📄 pyproject.toml</text>
  <text x="55" y="182" font-family="monospace" font-size="11" fill="#475569">├── 📁 src/</text>
  <text x="55" y="200" font-family="monospace" font-size="11" fill="#6b7280">│   ├── model.py</text>
  <text x="55" y="218" font-family="monospace" font-size="11" fill="#6b7280">│   ├── train.py</text>
  <text x="55" y="236" font-family="monospace" font-size="11" fill="#6b7280">│   └── serve.py</text>
  <text x="55" y="254" font-family="monospace" font-size="11" fill="#475569">├── 📁 tests/</text>
  <text x="55" y="272" font-family="monospace" font-size="11" fill="#475569">├── 📁 docs/</text>
  <text x="55" y="290" font-family="monospace" font-size="11" fill="#475569">├── 📁 .github/workflows/</text>
  <text x="55" y="308" font-family="monospace" font-size="11" fill="#475569">├── 📄 Dockerfile</text>
  <text x="55" y="326" font-family="monospace" font-size="11" fill="#475569">├── 📄 Makefile</text>
  <text x="55" y="344" font-family="monospace" font-size="11" fill="#475569">└── 📄 .gitignore</text>
  <!-- Component descriptions on right -->
  <rect x="340" y="60" width="350" height="68" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="515" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">📖 README — Your project's front door</text>
  <text x="515" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Demo GIF • What it does • Quick start • Installation</text>
  <text x="515" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">API docs • Examples • Badges (CI, coverage, PyPI)</text>
  <rect x="340" y="136" width="170" height="62" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="425" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🧪 Tests</text>
  <text x="425" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">pytest, 80%+ coverage</text>
  <text x="425" y="187" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Unit + integration</text>
  <rect x="520" y="136" width="170" height="62" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="605" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🔄 CI/CD</text>
  <text x="605" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">GitHub Actions</text>
  <text x="605" y="187" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Lint, test, build, deploy</text>
  <rect x="340" y="206" width="170" height="62" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="425" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">📚 Docs</text>
  <text x="425" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">MkDocs or Sphinx</text>
  <text x="425" y="257" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">API ref + tutorials</text>
  <rect x="520" y="206" width="170" height="62" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="605" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">👥 Community</text>
  <text x="605" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Issue templates</text>
  <text x="605" y="257" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Code of conduct, labels</text>
  <!-- Quality checklist -->
  <rect x="340" y="280" width="350" height="88" rx="14" fill="url(#osa-accent)"/>
  <text x="515" y="302" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">✅ Quality Checklist</text>
  <text x="430" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Reproducible with one command</text>
  <text x="430" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Model card with limitations</text>
  <text x="430" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Pinned dependencies</text>
  <text x="580" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Docker support</text>
  <text x="580" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Clear license (MIT/Apache)</text>
  <text x="580" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">☑ Semantic versioning</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Well-structured open source projects attract contributors and employers alike</text>
</svg>