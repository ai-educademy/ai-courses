<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dtf-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="dtf-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="dtf-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#dtf-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Design: Twitter AI Feed Architecture</text>
  <!-- User Actions -->
  <rect x="20" y="100" width="110" height="180" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="75" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">👤 User</text>
  <text x="75" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Actions</text>
  <text x="75" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Likes</text>
  <text x="75" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Retweets</text>
  <text x="75" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Follows</text>
  <text x="75" y="207" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Dwell Time</text>
  <text x="75" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Replies</text>
  <text x="75" y="237" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Mutes/Blocks</text>
  <text x="75" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Implicit + explicit</text>
  <line x1="130" y1="190" x2="150" y2="190" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dtf-arrow)"/>
  <!-- Feature Pipeline -->
  <rect x="155" y="120" width="120" height="140" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="215" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">⚙️ Feature</text>
  <text x="215" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Pipeline</text>
  <text x="215" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">User embeddings</text>
  <text x="215" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Tweet features</text>
  <text x="215" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Graph features</text>
  <text x="215" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Real-time signals</text>
  <line x1="275" y1="190" x2="295" y2="190" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dtf-arrow)"/>
  <!-- Ranking Model (highlighted) -->
  <rect x="300" y="105" width="130" height="170" rx="14" fill="url(#dtf-accent)" stroke="#4f46e5" stroke-width="2"/>
  <text x="365" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🧠 Ranking</text>
  <text x="365" y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Model</text>
  <text x="365" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Candidate Gen</text>
  <text x="365" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Heavy Ranker</text>
  <text x="365" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Multi-objective</text>
  <text x="365" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Engagement pred.</text>
  <text x="365" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Quality filters</text>
  <text x="365" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#c7d2fe" font-style="italic">ML is the core</text>
  <line x1="430" y1="190" x2="450" y2="190" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dtf-arrow)"/>
  <!-- Feed Assembly -->
  <rect x="455" y="120" width="120" height="140" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="515" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">📋 Feed</text>
  <text x="515" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Assembly</text>
  <text x="515" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Mix content types</text>
  <text x="515" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Insert ads</text>
  <text x="515" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Dedup &amp; diversity</text>
  <text x="515" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Policy filters</text>
  <line x1="575" y1="190" x2="595" y2="190" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dtf-arrow)"/>
  <!-- Delivery -->
  <rect x="600" y="140" width="100" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="650" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">📱 Delivery</text>
  <text x="650" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Timeline API</text>
  <text x="650" y="207" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Push notifs</text>
  <text x="650" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Cache layer</text>
  <!-- Scale note -->
  <rect x="180" y="310" width="360" height="50" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Scale: ~500M tweets/day • ~300M users • &lt;200ms latency</text>
  <text x="360" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Candidate generation narrows 500M → 1500 → 50 ranked tweets</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">The ranking model is the heart of the AI feed — it decides what you see</text>
</svg>