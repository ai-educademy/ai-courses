<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="byp-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="byp-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="byp-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#byp-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Build Your AI Project — 6 Phases</text>
  <!-- Phase 1 -->
  <rect x="20" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="70" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="70" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">1</text>
  <text x="70" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Define</text>
  <text x="70" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Problem</text>
  <text x="70" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Scope, goals,</text>
  <text x="70" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">success metrics</text>
  <line x1="120" y1="135" x2="135" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#byp-arrow)"/>
  <!-- Phase 2 -->
  <rect x="138" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="188" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="188" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">2</text>
  <text x="188" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Collect</text>
  <text x="188" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Data</text>
  <text x="188" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Sources, cleaning,</text>
  <text x="188" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">labelling, splits</text>
  <line x1="238" y1="135" x2="253" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#byp-arrow)"/>
  <!-- Phase 3 -->
  <rect x="256" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="306" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="306" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">3</text>
  <text x="306" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Train</text>
  <text x="306" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Model</text>
  <text x="306" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Experiments,</text>
  <text x="306" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">tuning, validation</text>
  <line x1="356" y1="135" x2="371" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#byp-arrow)"/>
  <!-- Phase 4 -->
  <rect x="374" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="424" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="424" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">4</text>
  <text x="424" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Build</text>
  <text x="424" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">App</text>
  <text x="424" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">API, frontend,</text>
  <text x="424" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">integration</text>
  <line x1="474" y1="135" x2="489" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#byp-arrow)"/>
  <!-- Phase 5 -->
  <rect x="492" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="542" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="542" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">5</text>
  <text x="542" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Deploy</text>
  <text x="542" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Cloud, CI/CD,</text>
  <text x="542" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">monitoring</text>
  <line x1="592" y1="135" x2="607" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#byp-arrow)"/>
  <!-- Phase 6 -->
  <rect x="600" y="80" width="100" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="650" cy="105" r="16" fill="url(#byp-accent)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">6</text>
  <text x="650" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Iterate</text>
  <text x="650" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Feedback, retrain,</text>
  <text x="650" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">improve</text>
  <!-- Feedback loop arrow -->
  <path d="M650,195 C650,260 70,260 70,195" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#byp-arrow)"/>
  <text x="360" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6366f1" font-weight="600">↻ Continuous improvement loop</text>
  <!-- Key tips -->
  <rect x="60" y="285" width="280" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="200" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">🎯 Key Success Factors</text>
  <text x="200" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Start with a clear, scoped problem</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Baseline model first, then optimise</text>
  <text x="200" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Ship early, iterate based on real data</text>
  <rect x="380" y="285" width="280" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="520" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">⚠️ Common Pitfalls</text>
  <text x="520" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Skipping data quality checks</text>
  <text x="520" y="337" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Over-engineering before MVP</text>
  <text x="520" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">• Ignoring deployment from day one</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Great AI projects are built iteratively — ship, learn, improve</text>
</svg>