<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="fmi-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="fmi-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#fmi-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Full Mock Interview — 75 Minutes</text>
  <!-- Timeline bar -->
  <rect x="40" y="70" width="640" height="10" rx="5" fill="#e0e7ff"/>
  <!-- Segments with proportional widths: 5/75, 25/75, 25/75, 15/75, 5/75 of 640 -->
  <!-- Intro: 5min = 42.7px -->
  <rect x="40" y="70" width="43" height="10" rx="5" fill="#a5b4fc"/>
  <!-- Coding: 25min = 213.3px -->
  <rect x="83" y="70" width="213" height="10" fill="#818cf8"/>
  <!-- System Design: 25min = 213.3px -->
  <rect x="296" y="70" width="213" height="10" fill="#6366f1"/>
  <!-- Behavioural: 15min = 128px -->
  <rect x="509" y="70" width="128" height="10" fill="#4f46e5"/>
  <!-- Q&A: 5min = 42.7px -->
  <rect x="637" y="70" width="43" height="10" rx="5" fill="#3730a3"/>
  <!-- Time markers -->
  <text x="40" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">0:00</text>
  <text x="83" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">0:05</text>
  <text x="296" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">0:30</text>
  <text x="509" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">0:55</text>
  <text x="637" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">1:10</text>
  <text x="680" y="60" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">1:15</text>
  <!-- Section cards -->
  <!-- Intro -->
  <rect x="15" y="95" width="120" height="160" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="15" y="95" width="120" height="34" rx="14" fill="#a5b4fc"/>
  <rect x="15" y="115" width="120" height="14" fill="#a5b4fc"/>
  <text x="75" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">👋 Intro</text>
  <text x="75" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">5 min</text>
  <text x="75" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Greet interviewer</text>
  <text x="75" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Brief self-intro</text>
  <text x="75" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Set the tone</text>
  <text x="75" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Be warm &amp; concise</text>
  <!-- Coding -->
  <rect x="150" y="95" width="160" height="160" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="150" y="95" width="160" height="34" rx="14" fill="#818cf8"/>
  <rect x="150" y="115" width="160" height="14" fill="#818cf8"/>
  <text x="230" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">💻 Coding</text>
  <text x="230" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">25 min</text>
  <text x="230" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Clarify requirements</text>
  <text x="230" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Think aloud</text>
  <text x="230" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Code clean solution</text>
  <text x="230" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Test edge cases</text>
  <text x="230" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Communicate your process</text>
  <!-- System Design -->
  <rect x="325" y="95" width="160" height="160" rx="14" fill="white" stroke="#6366f1" stroke-width="2"/>
  <rect x="325" y="95" width="160" height="34" rx="14" fill="#6366f1"/>
  <rect x="325" y="115" width="160" height="14" fill="#6366f1"/>
  <text x="405" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🏗️ System Design</text>
  <text x="405" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">25 min</text>
  <text x="405" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Gather requirements</text>
  <text x="405" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">High-level design</text>
  <text x="405" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Deep dive component</text>
  <text x="405" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Discuss trade-offs</text>
  <text x="405" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Drive the conversation</text>
  <!-- Behavioural -->
  <rect x="500" y="95" width="120" height="160" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="500" y="95" width="120" height="34" rx="14" fill="#4f46e5"/>
  <rect x="500" y="115" width="120" height="14" fill="#4f46e5"/>
  <text x="560" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">🗣️ Behavioural</text>
  <text x="560" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">15 min</text>
  <text x="560" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Use STAR method</text>
  <text x="560" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Show leadership</text>
  <text x="560" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Conflict resolution</text>
  <text x="560" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Be authentic</text>
  <!-- Q&A -->
  <rect x="635" y="95" width="70" height="160" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="635" y="95" width="70" height="34" rx="14" fill="#3730a3"/>
  <rect x="635" y="115" width="70" height="14" fill="#3730a3"/>
  <text x="670" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">❓ Q&amp;A</text>
  <text x="670" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">5 min</text>
  <text x="670" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Ask smart</text>
  <text x="670" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">questions</text>
  <text x="670" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Show genuine</text>
  <text x="670" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">interest</text>
  <!-- Tips -->
  <rect x="60" y="280" width="600" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">💡 Pro Tips for Each Section</text>
  <text x="170" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">⏱ Time-box strictly</text>
  <text x="330" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🎯 Lead with structure</text>
  <text x="500" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">💬 Communicate constantly</text>
  <text x="170" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">📝 Prepare 5 STAR stories</text>
  <text x="330" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🔄 Practice weekly</text>
  <text x="500" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">✨ Ask insightful questions</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Practice makes permanent — rehearse with real people, not just in your head</text>
</svg>