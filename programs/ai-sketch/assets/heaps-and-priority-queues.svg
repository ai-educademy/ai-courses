<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="hp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="hp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#hp-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Heaps &amp; Priority Queues</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Min-Heap — parent is always smaller than children</text>

  <!-- Tree visualization -->
  <rect x="30" y="66" width="420" height="230" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="240" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Min-Heap Tree View</text>

  <!-- Edges -->
  <line x1="240" y1="116" x2="150" y2="158" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="240" y1="116" x2="330" y2="158" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="150" y1="180" x2="100" y2="224" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="150" y1="180" x2="200" y2="224" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="330" y1="180" x2="280" y2="224" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="330" y1="180" x2="380" y2="224" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- Node 1 (root/min) -->
  <circle cx="240" cy="106" r="22" fill="#22c55e" stroke="#16a34a" stroke-width="2.5"/>
  <text x="240" y="113" text-anchor="middle" font-family="monospace" font-size="18" font-weight="700" fill="white">1</text>
  <text x="272" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e" font-weight="600">min!</text>

  <!-- Node 3 -->
  <circle cx="150" cy="168" r="20" fill="url(#hp-accent)"/>
  <text x="150" y="175" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">3</text>
  <!-- Node 2 -->
  <circle cx="330" cy="168" r="20" fill="url(#hp-accent)"/>
  <text x="330" y="175" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">2</text>

  <!-- Node 7 -->
  <circle cx="100" cy="236" r="18" fill="#818cf8"/>
  <text x="100" y="242" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">7</text>
  <!-- Node 6 -->
  <circle cx="200" cy="236" r="18" fill="#818cf8"/>
  <text x="200" y="242" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">6</text>
  <!-- Node 5 -->
  <circle cx="280" cy="236" r="18" fill="#818cf8"/>
  <text x="280" y="242" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">5</text>
  <!-- Node 4 -->
  <circle cx="380" cy="236" r="18" fill="#818cf8"/>
  <text x="380" y="242" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">4</text>

  <!-- Heap property annotations -->
  <text x="195" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">1≤3 ✓</text>
  <text x="290" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">1≤2 ✓</text>
  <text x="115" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">3≤7 ✓</text>
  <text x="185" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e">3≤6 ✓</text>

  <!-- Array representation -->
  <rect x="30" y="266" width="420" height="30" rx="6" fill="#f1f5f9"/>
  <text x="240" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">Array: [1, 3, 2, 7, 6, 5, 4]</text>

  <!-- Array index mapping -->
  <rect x="60" y="270" width="36" height="22" rx="3" fill="#22c55e"/><text x="78" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">1</text>
  <rect x="100" y="270" width="36" height="22" rx="3" fill="url(#hp-accent)"/><text x="118" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">3</text>
  <rect x="140" y="270" width="36" height="22" rx="3" fill="url(#hp-accent)"/><text x="158" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">2</text>
  <rect x="180" y="270" width="36" height="22" rx="3" fill="#818cf8"/><text x="198" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">7</text>
  <rect x="220" y="270" width="36" height="22" rx="3" fill="#818cf8"/><text x="238" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">6</text>
  <rect x="260" y="270" width="36" height="22" rx="3" fill="#818cf8"/><text x="278" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">5</text>
  <rect x="300" y="270" width="36" height="22" rx="3" fill="#818cf8"/><text x="318" y="286" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">4</text>

  <!-- Index formulas -->
  <text x="400" y="286" font-family="monospace" font-size="9" fill="#6b7280">i=0..6</text>

  <!-- Properties panel -->
  <rect x="470" y="66" width="220" height="230" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="580" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Heap Properties</text>

  <text x="490" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Index formulas:</text>
  <text x="495" y="130" font-family="monospace" font-size="10" fill="#475569">parent(i) = (i-1)/2</text>
  <text x="495" y="148" font-family="monospace" font-size="10" fill="#475569">left(i)   = 2*i + 1</text>
  <text x="495" y="166" font-family="monospace" font-size="10" fill="#475569">right(i)  = 2*i + 2</text>

  <line x1="485" y1="178" x2="675" y2="178" stroke="#e0e7ff" stroke-width="1"/>

  <text x="490" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Operations:</text>
  <text x="495" y="214" font-family="monospace" font-size="10" fill="#475569">peek min:   </text><text x="600" y="214" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1)</text>
  <text x="495" y="232" font-family="monospace" font-size="10" fill="#475569">insert:     </text><text x="600" y="232" font-family="monospace" font-size="10" font-weight="700" fill="#f59e0b">O(log n)</text>
  <text x="495" y="250" font-family="monospace" font-size="10" fill="#475569">extract min:</text><text x="600" y="250" font-family="monospace" font-size="10" font-weight="700" fill="#f59e0b">O(log n)</text>
  <text x="495" y="268" font-family="monospace" font-size="10" fill="#475569">heapify:    </text><text x="600" y="268" font-family="monospace" font-size="10" font-weight="700" fill="#ef4444">O(n)</text>

  <text x="580" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Used in: Dijkstra, median</text>

  <!-- Bottom note -->
  <rect x="80" y="310" width="560" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Min-Heap vs Max-Heap</text>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Min-Heap: root = smallest</text>
  <text x="500" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Max-Heap: root = largest</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-sketch</text>
</svg>