<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="gr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="gr-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#gr-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Greedy Algorithms</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Coin Change — Make amount 36¢ using fewest coins (greedy approach)</text>

  <!-- Available coins -->
  <rect x="30" y="68" width="660" height="50" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="120" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Available coins:</text>
  <circle cx="220" cy="92" r="18" fill="url(#gr-accent)"/><text x="220" y="98" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="white">25¢</text>
  <circle cx="290" cy="92" r="18" fill="#818cf8"/><text x="290" y="98" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="white">10¢</text>
  <circle cx="360" cy="92" r="18" fill="#a5b4fc"/><text x="360" y="98" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">5¢</text>
  <circle cx="430" cy="92" r="18" fill="#c7d2fe"/><text x="430" y="98" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#4338ca">1¢</text>
  <text x="560" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Pick largest first!</text>

  <!-- Step 1 -->
  <rect x="30" y="130" width="210" height="165" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="130" width="210" height="26" rx="14" fill="url(#gr-accent)"/>
  <rect x="30" y="144" width="210" height="12" fill="url(#gr-accent)"/>
  <text x="135" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Step 1: Pick 25¢</text>

  <text x="135" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Remaining: 36¢</text>
  <text x="135" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">25¢ ≤ 36¢? ✓ Take it!</text>
  <circle cx="135" cy="226" r="28" fill="url(#gr-accent)" stroke="#4338ca" stroke-width="2"/>
  <text x="135" y="232" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">25¢</text>
  <text x="135" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" font-weight="600">Remaining: 11¢</text>

  <!-- Step 2 -->
  <rect x="255" y="130" width="210" height="165" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="255" y="130" width="210" height="26" rx="14" fill="#818cf8"/>
  <rect x="255" y="144" width="210" height="12" fill="#818cf8"/>
  <text x="360" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Step 2: Pick 10¢</text>

  <text x="360" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Remaining: 11¢</text>
  <text x="360" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">10¢ ≤ 11¢? ✓ Take it!</text>
  <circle cx="360" cy="226" r="28" fill="#818cf8" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="232" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">10¢</text>
  <text x="360" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" font-weight="600">Remaining: 1¢</text>

  <!-- Step 3 -->
  <rect x="480" y="130" width="210" height="165" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="480" y="130" width="210" height="26" rx="14" fill="#c7d2fe"/>
  <rect x="480" y="144" width="210" height="12" fill="#c7d2fe"/>
  <text x="585" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">Step 3: Pick 1¢</text>

  <text x="585" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Remaining: 1¢</text>
  <text x="585" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">1¢ ≤ 1¢? ✓ Take it!</text>
  <circle cx="585" cy="226" r="28" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="585" y="232" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#4338ca">1¢</text>
  <text x="585" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" font-weight="600">Remaining: 0¢ ✓</text>

  <!-- Result -->
  <rect x="30" y="306" width="660" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#22c55e">Result: 25¢ + 10¢ + 1¢ = 36¢ using only 3 coins!</text>
  <text x="240" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Greedy: always pick the locally optimal choice</text>
  <text x="510" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ef4444">⚠ Not always globally optimal</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-sketch</text>
</svg>