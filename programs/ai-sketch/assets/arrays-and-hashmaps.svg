<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ah-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ah-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ah-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Arrays and HashMaps</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Two fundamental data structures — indexed vs key-value access</text>

  <!-- Array Section -->
  <rect x="30" y="66" width="320" height="260" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="66" width="320" height="28" rx="14" fill="url(#ah-accent)"/>
  <rect x="30" y="80" width="320" height="14" fill="url(#ah-accent)"/>
  <text x="190" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Array — Indexed Access</text>

  <!-- Index labels -->
  <text x="82" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[0]</text>
  <text x="132" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[1]</text>
  <text x="182" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[2]</text>
  <text x="232" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[3]</text>
  <text x="282" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[4]</text>

  <!-- Array cells -->
  <rect x="58" y="118" width="48" height="38" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/><text x="82" y="142" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">10</text>
  <rect x="108" y="118" width="48" height="38" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/><text x="132" y="142" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">20</text>
  <rect x="158" y="118" width="48" height="38" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="182" y="142" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#92400e">30</text>
  <rect x="208" y="118" width="48" height="38" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/><text x="232" y="142" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">40</text>
  <rect x="258" y="118" width="48" height="38" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/><text x="282" y="142" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">50</text>

  <!-- Access highlight -->
  <text x="182" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b" font-weight="600">arr[2] → 30</text>

  <!-- Complexity -->
  <text x="55" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Operations:</text>
  <text x="60" y="218" font-family="monospace" font-size="10" fill="#475569">Access by index:</text><text x="190" y="218" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1) ✓</text>
  <text x="60" y="236" font-family="monospace" font-size="10" fill="#475569">Search by value:</text><text x="190" y="236" font-family="monospace" font-size="10" font-weight="700" fill="#ef4444">O(n) ✗</text>
  <text x="60" y="254" font-family="monospace" font-size="10" fill="#475569">Insert at end:  </text><text x="190" y="254" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1)</text>
  <text x="60" y="272" font-family="monospace" font-size="10" fill="#475569">Insert at start:</text><text x="190" y="272" font-family="monospace" font-size="10" font-weight="700" fill="#ef4444">O(n)</text>
  <text x="60" y="290" font-family="monospace" font-size="10" fill="#475569">Delete:         </text><text x="190" y="290" font-family="monospace" font-size="10" font-weight="700" fill="#ef4444">O(n)</text>
  <text x="190" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Contiguous memory, cache-friendly</text>

  <!-- HashMap Section -->
  <rect x="370" y="66" width="320" height="260" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="370" y="66" width="320" height="28" rx="14" fill="url(#ah-accent)"/>
  <rect x="370" y="80" width="320" height="14" fill="url(#ah-accent)"/>
  <text x="530" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">HashMap — Key-Value Access</text>

  <!-- Key-value pairs -->
  <rect x="395" y="102" width="120" height="26" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="455" y="120" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#166534">"name" → "Alice"</text>
  <rect x="395" y="134" width="120" height="26" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="455" y="152" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#166534">"age" → 25</text>
  <rect x="395" y="166" width="120" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="455" y="184" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#92400e">"city" → "NYC"</text>
  <rect x="395" y="198" width="120" height="26" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="455" y="216" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#166534">"job" → "Dev"</text>

  <!-- Hash buckets visualization -->
  <rect x="540" y="102" width="30" height="22" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="555" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">[0]</text>
  <rect x="540" y="126" width="30" height="22" rx="3" fill="#e0e7ff" stroke="#818cf8"/><text x="555" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#4338ca">[1]</text>
  <rect x="540" y="150" width="30" height="22" rx="3" fill="#e0e7ff" stroke="#818cf8"/><text x="555" y="166" text-anchor="middle" font-family="monospace" font-size="8" fill="#4338ca">[2]</text>
  <rect x="540" y="174" width="30" height="22" rx="3" fill="#e0e7ff" stroke="#818cf8"/><text x="555" y="190" text-anchor="middle" font-family="monospace" font-size="8" fill="#4338ca">[3]</text>
  <rect x="540" y="198" width="30" height="22" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/><text x="555" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">[4]</text>

  <!-- Lookup highlight -->
  <text x="455" y="242" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b" font-weight="600">map["city"] → "NYC"</text>

  <!-- Complexity -->
  <text x="395" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Operations:</text>
  <text x="400" y="282" font-family="monospace" font-size="10" fill="#475569">Get by key:   </text><text x="530" y="282" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1) avg ✓</text>
  <text x="400" y="298" font-family="monospace" font-size="10" fill="#475569">Insert:       </text><text x="530" y="298" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1) avg ✓</text>
  <text x="400" y="314" font-family="monospace" font-size="10" fill="#475569">Delete:       </text><text x="530" y="314" font-family="monospace" font-size="10" font-weight="700" fill="#22c55e">O(1) avg ✓</text>
  <text x="530" y="326" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">No ordering, extra memory for hash</text>

  <!-- Key Insight -->
  <rect x="90" y="338" width="540" height="32" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="359" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">💡 Use Array for ordered/indexed data • Use HashMap when you need O(1) lookup by key</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-sketch</text>
</svg>