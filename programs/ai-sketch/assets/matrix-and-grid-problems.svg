<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="mg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="mg-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#mg-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Matrix / Grid Problems</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">BFS shortest path from start (0,0) to end (3,3) in a 4×4 grid</text>

  <!-- Grid -->
  <rect x="30" y="68" width="380" height="300" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="220" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">4×4 Grid — BFS Shortest Path</text>

  <!-- Grid cells - Row 0 -->
  <rect x="70" y="100" width="68" height="55" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="104" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">START</text>
  <text x="104" y="142" text-anchor="middle" font-family="monospace" font-size="9" fill="white">(0,0)</text>

  <rect x="146" y="100" width="68" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="132" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">1</text>

  <rect x="222" y="100" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="256" y="132" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <rect x="298" y="100" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="332" y="132" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <!-- Row 1 -->
  <rect x="70" y="163" width="68" height="55" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <text x="104" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">wall</text>

  <rect x="146" y="163" width="68" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">2</text>

  <rect x="222" y="163" width="68" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="256" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">3</text>

  <rect x="298" y="163" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="332" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <!-- Row 2 -->
  <rect x="70" y="226" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="104" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <rect x="146" y="226" width="68" height="55" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <text x="180" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">wall</text>

  <rect x="222" y="226" width="68" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="256" y="258" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">4</text>

  <rect x="298" y="226" width="68" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="332" y="258" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">5</text>

  <!-- Row 3 -->
  <rect x="70" y="289" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="104" y="321" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <rect x="146" y="289" width="68" height="55" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="321" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">0</text>

  <rect x="222" y="289" width="68" height="55" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <text x="256" y="321" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">wall</text>

  <rect x="298" y="289" width="68" height="55" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <text x="332" y="313" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">END</text>
  <text x="332" y="330" text-anchor="middle" font-family="monospace" font-size="9" fill="white">(3,3)</text>

  <!-- Path arrows -->
  <line x1="138" y1="127" x2="148" y2="127" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="180" y1="155" x2="180" y2="163" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="214" y1="190" x2="224" y2="190" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="256" y1="218" x2="256" y2="228" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="290" y1="253" x2="300" y2="253" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="332" y1="281" x2="332" y2="291" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Legend & Info -->
  <rect x="430" y="68" width="260" height="300" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="560" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">BFS Grid Traversal</text>

  <!-- Legend -->
  <rect x="455" y="106" width="18" height="18" rx="4" fill="#22c55e"/><text x="480" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Start cell</text>
  <rect x="455" y="130" width="18" height="18" rx="4" fill="#ef4444"/><text x="480" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">End cell</text>
  <rect x="455" y="154" width="18" height="18" rx="4" fill="#bbf7d0" stroke="#22c55e"/><text x="480" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">BFS path (dist #)</text>
  <rect x="455" y="178" width="18" height="18" rx="4" fill="#1e293b"/><text x="480" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Wall (blocked)</text>
  <rect x="455" y="202" width="18" height="18" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="480" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Unvisited</text>

  <line x1="445" y1="230" x2="675" y2="230" stroke="#e0e7ff" stroke-width="1"/>

  <text x="455" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Directions (4-connected):</text>
  <text x="460" y="268" font-family="monospace" font-size="10" fill="#475569">↑ up    (-1, 0)</text>
  <text x="460" y="284" font-family="monospace" font-size="10" fill="#475569">↓ down  (+1, 0)</text>
  <text x="460" y="300" font-family="monospace" font-size="10" fill="#475569">← left  ( 0,-1)</text>
  <text x="460" y="316" font-family="monospace" font-size="10" fill="#475569">→ right ( 0,+1)</text>

  <line x1="445" y1="326" x2="675" y2="326" stroke="#e0e7ff" stroke-width="1"/>
  <text x="560" y="344" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" font-weight="600">Shortest path: 6 steps</text>
  <text x="560" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">BFS guarantees shortest path</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-sketch</text>
</svg>