<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="rb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="rb-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#rb-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Recursion &amp; Backtracking</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">factorial(4) = 4 × 3 × 2 × 1 = 24 — recursive call tree and call stack</text>

  <!-- Recursion Tree -->
  <rect x="30" y="66" width="420" height="220" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="240" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Recursive Call Tree — factorial(4)</text>

  <!-- Edges -->
  <line x1="240" y1="116" x2="240" y2="148" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="240" y1="178" x2="240" y2="206" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="240" y1="236" x2="240" y2="260" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- fact(4) -->
  <rect x="170" y="96" width="140" height="24" rx="8" fill="url(#rb-accent)"/>
  <text x="240" y="113" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">factorial(4)</text>
  <text x="330" y="113" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ 4 × factorial(3)</text>

  <!-- fact(3) -->
  <rect x="170" y="148" width="140" height="24" rx="8" fill="#818cf8"/>
  <text x="240" y="165" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">factorial(3)</text>
  <text x="330" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ 3 × factorial(2)</text>

  <!-- fact(2) -->
  <rect x="170" y="200" width="140" height="24" rx="8" fill="#a5b4fc"/>
  <text x="240" y="217" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">factorial(2)</text>
  <text x="330" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ 2 × factorial(1)</text>

  <!-- fact(1) - base case -->
  <rect x="170" y="252" width="140" height="24" rx="8" fill="#22c55e"/>
  <text x="240" y="269" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">factorial(1) = 1</text>
  <text x="330" y="269" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">← base case!</text>

  <!-- Call labels -->
  <text x="155" y="113" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">call 1</text>
  <text x="155" y="165" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">call 2</text>
  <text x="155" y="217" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">call 3</text>
  <text x="155" y="269" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">call 4</text>

  <!-- Call Stack -->
  <rect x="470" y="66" width="220" height="220" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="580" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Call Stack</text>

  <!-- Stack frames -->
  <text x="580" y="106" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Winding up ↓         Unwinding ↑</text>

  <rect x="490" y="116" width="80" height="24" rx="6" fill="url(#rb-accent)"/>
  <text x="530" y="133" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">f(4)</text>
  <text x="590" y="133" font-family="monospace" font-size="10" fill="#4338ca" font-weight="600">← 4×6=24</text>

  <rect x="490" y="144" width="80" height="24" rx="6" fill="#818cf8"/>
  <text x="530" y="161" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">f(3)</text>
  <text x="590" y="161" font-family="monospace" font-size="10" fill="#4338ca" font-weight="600">← 3×2=6</text>

  <rect x="490" y="172" width="80" height="24" rx="6" fill="#a5b4fc"/>
  <text x="530" y="189" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">f(2)</text>
  <text x="590" y="189" font-family="monospace" font-size="10" fill="#4338ca" font-weight="600">← 2×1=2</text>

  <rect x="490" y="200" width="80" height="24" rx="6" fill="#22c55e"/>
  <text x="530" y="217" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">f(1)=1</text>
  <text x="590" y="217" font-family="monospace" font-size="10" fill="#22c55e" font-weight="600">← returns 1</text>

  <line x1="490" y1="230" x2="670" y2="230" stroke="#475569" stroke-width="2"/>
  <text x="580" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Stack grows down,</text>
  <text x="580" y="262" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">unwinds back up with results</text>
  <text x="580" y="280" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#4338ca">O(n) space — n stack frames</text>

  <!-- Summary -->
  <rect x="30" y="298" width="660" height="72" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Key Recursion Concepts</text>
  <text x="120" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Base Case</text>
  <text x="120" y="356" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">stops recursion</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Recursive Case</text>
  <text x="300" y="356" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">calls itself smaller</text>
  <text x="480" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Backtracking</text>
  <text x="480" y="356" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">undo + try next</text>
  <text x="620" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Stack Depth</text>
  <text x="620" y="356" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">watch for overflow</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-sketch</text>
</svg>