<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="pe-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="pe-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="pe-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#pe-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Prompt Engineering</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Crafting effective prompts: structure, examples, and best practices</text>

  <!-- System Message -->
  <rect x="30" y="80" width="250" height="65" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <rect x="30" y="80" width="250" height="22" rx="14" fill="#6366f1" fill-opacity="0.1"/>
  <text x="155" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">🎭 System Message</text>
  <text x="155" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">"You are a helpful coding assistant</text>
  <text x="155" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">specialized in Python and TypeScript."</text>
  <!-- Annotation -->
  <line x1="280" y1="112" x2="310" y2="112" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Sets persona</text>
  <text x="315" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">&amp; constraints</text>

  <!-- Few-Shot Examples -->
  <rect x="30" y="155" width="250" height="105" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <rect x="30" y="155" width="250" height="22" rx="14" fill="#6366f1" fill-opacity="0.1"/>
  <text x="155" y="171" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">📝 Few-Shot Examples</text>
  <text x="50" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">User: "Sort [3,1,2]"</text>
  <text x="50" y="209" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">Assistant: "[1,2,3] — used quicksort"</text>
  <text x="50" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">User: "Reverse 'hello'"</text>
  <text x="50" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">Assistant: "'olleh' — used slicing"</text>
  <text x="50" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">Shows expected format and reasoning style</text>
  <!-- Annotation -->
  <line x1="280" y1="210" x2="310" y2="210" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Demonstrates</text>
  <text x="315" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">desired output</text>

  <!-- User Query -->
  <rect x="30" y="270" width="250" height="65" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <rect x="30" y="270" width="250" height="22" rx="14" fill="#6366f1" fill-opacity="0.1"/>
  <text x="155" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">💬 User Query</text>
  <text x="155" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">"Find duplicates in [1,2,2,3,3,4]</text>
  <text x="155" y="324" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">and explain your approach."</text>
  <!-- Annotation -->
  <line x1="280" y1="310" x2="310" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Clear, specific</text>
  <text x="315" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">task + format</text>

  <!-- Bracket grouping -->
  <text x="20" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="80" fill="#c7d2fe" opacity="0.5">{</text>

  <!-- Arrow to LLM -->
  <line x1="355" y1="200" x2="430" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#pe-arrow)"/>

  <!-- LLM -->
  <rect x="440" y="135" width="120" height="130" rx="16" fill="url(#pe-accent)"/>
  <text x="500" y="175" text-anchor="middle" font-size="28">🧠</text>
  <text x="500" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fff">LLM</text>
  <text x="500" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">Token generation</text>
  <text x="500" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">Temperature</text>
  <text x="500" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">Top-p sampling</text>

  <!-- Arrow to Response -->
  <line x1="560" y1="200" x2="595" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#pe-arrow)"/>

  <!-- Response -->
  <rect x="605" y="110" width="100" height="180" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="655" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Response</text>
  <line x1="615" y1="142" x2="695" y2="142" stroke="#e0e7ff" stroke-width="1"/>
  <text x="655" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Duplicates:</text>
  <text x="655" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">[2, 3]</text>
  <text x="655" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Approach:</text>
  <text x="655" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Used Counter</text>
  <text x="655" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">to count freq.</text>
  <text x="655" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Filter count &gt; 1</text>
  <!-- Code block -->
  <rect x="615" y="242" width="80" height="38" rx="6" fill="#1e1b4b" fill-opacity="0.08"/>
  <text x="655" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#4338ca">from collections</text>
  <text x="655" y="266" text-anchor="middle" font-family="monospace" font-size="7" fill="#4338ca">import Counter</text>
  <text x="655" y="276" text-anchor="middle" font-family="monospace" font-size="7" fill="#4338ca">Counter(lst)</text>

  <!-- Techniques at bottom -->
  <rect x="60" y="350" width="600" height="25" rx="8" fill="#fff" fill-opacity="0.5" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="367" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Techniques: Zero-shot • Few-shot • Chain-of-Thought • ReAct • Tree-of-Thought • Self-Consistency</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Prompt Engineering</text>
</svg>
