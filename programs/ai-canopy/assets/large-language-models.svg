<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="llm-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="llm-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#llm-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Large Language Models</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">From training data to emergent capabilities</text>

  <!-- Layer 1 (bottom): Training Data -->
  <rect x="80" y="280" width="560" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="360" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">📚 Training Data</text>
  <text x="145" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🌐 Web text</text>
  <text x="250" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">📖 Books</text>
  <text x="350" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">💻 Code</text>
  <text x="450" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">📄 Papers</text>
  <text x="560" y="328" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">💬 Conversations</text>
  <text x="360" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Trillions of tokens from diverse sources</text>

  <!-- Upward arrows -->
  <line x1="250" y1="275" x2="250" y2="240" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="244,245 250,232 256,245" fill="#94a3b8"/>
  <line x1="360" y1="275" x2="360" y2="240" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="354,245 360,232 366,245" fill="#94a3b8"/>
  <line x1="470" y1="275" x2="470" y2="240" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="464,245 470,232 476,245" fill="#94a3b8"/>

  <!-- Layer 2 (middle): Transformer Architecture -->
  <rect x="120" y="155" width="480" height="80" rx="16" fill="url(#llm-accent)"/>
  <text x="360" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff">⚡ Transformer Architecture</text>
  <text x="200" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Self-Attention</text>
  <text x="310" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Feed-Forward</text>
  <text x="420" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Layer Norm</text>
  <text x="520" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Positional Enc.</text>
  <!-- Layer indicators -->
  <rect x="145" y="218" width="430" height="4" rx="2" fill="#fff" fill-opacity="0.15"/>
  <rect x="145" y="224" width="430" height="3" rx="1" fill="#fff" fill-opacity="0.1"/>
  <rect x="145" y="229" width="430" height="2" rx="1" fill="#fff" fill-opacity="0.06"/>

  <!-- Upward arrows to capabilities -->
  <line x1="200" y1="150" x2="200" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="194,135 200,122 206,135" fill="#94a3b8"/>
  <line x1="310" y1="150" x2="310" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="304,135 310,122 316,135" fill="#94a3b8"/>
  <line x1="420" y1="150" x2="420" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="414,135 420,122 426,135" fill="#94a3b8"/>
  <line x1="530" y1="150" x2="530" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="524,135 530,122 536,135" fill="#94a3b8"/>

  <!-- Layer 3 (top): Capabilities -->
  <text x="360" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🚀 Emergent Capabilities</text>

  <rect x="120" y="92" width="100" height="32" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="170" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🌐 Translation</text>

  <rect x="235" y="92" width="100" height="32" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="285" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">❓ QA</text>

  <rect x="350" y="92" width="100" height="32" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="400" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">💻 Code</text>

  <rect x="465" y="92" width="100" height="32" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="515" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✨ Creative</text>

  <!-- Model sizes -->
  <text x="360" y="375" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">GPT-4 (~1.8T params) • Claude 3.5 • Gemini Ultra • Llama 3 (405B) • Mistral Large</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Large Language Models</text>
</svg>
