<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="ra-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ra-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ra-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#ra-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">RLHF &amp; Alignment</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Three-step process to align AI with human preferences</text>

  <!-- Step numbers -->
  <circle cx="120" cy="92" r="16" fill="url(#ra-accent)"/>
  <text x="120" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
  <circle cx="360" cy="92" r="16" fill="url(#ra-accent)"/>
  <text x="360" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
  <circle cx="600" cy="92" r="16" fill="url(#ra-accent)"/>
  <text x="600" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>

  <!-- Step 1: SFT -->
  <rect x="30" y="115" width="210" height="200" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="135" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Supervised Fine-Tuning</text>
  <text x="135" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">(SFT)</text>
  <line x1="50" y1="168" x2="220" y2="168" stroke="#e0e7ff" stroke-width="1"/>

  <!-- SFT diagram -->
  <rect x="55" y="180" width="70" height="35" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <text x="90" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Pre-trained</text>
  <text x="90" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">LLM</text>

  <text x="138" y="198" text-anchor="middle" font-size="14">+</text>

  <rect x="150" y="180" width="70" height="35" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <text x="185" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Human-written</text>
  <text x="185" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">demos</text>

  <text x="135" y="235" text-anchor="middle" font-size="14">↓</text>

  <rect x="65" y="245" width="140" height="30" rx="8" fill="url(#ra-accent)" opacity="0.8"/>
  <text x="135" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#fff">SFT Model</text>

  <text x="135" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Train on high-quality</text>
  <text x="135" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">prompt-response pairs</text>

  <!-- Arrow 1->2 -->
  <line x1="240" y1="215" x2="252" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ra-arrow)"/>

  <!-- Step 2: Reward Model -->
  <rect x="260" y="115" width="210" height="200" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="365" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Reward Model Training</text>
  <text x="365" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">(RM)</text>
  <line x1="280" y1="168" x2="450" y2="168" stroke="#e0e7ff" stroke-width="1"/>

  <!-- Comparison pairs -->
  <rect x="280" y="180" width="85" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="322" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16a34a">Response A ✓</text>
  <text x="322" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Preferred</text>

  <text x="378" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">vs</text>

  <rect x="395" y="180" width="85" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="437" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">Response B ✗</text>
  <text x="437" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Rejected</text>

  <text x="365" y="240" text-anchor="middle" font-size="14">↓</text>

  <rect x="295" y="245" width="140" height="30" rx="8" fill="url(#ra-accent)" opacity="0.8"/>
  <text x="365" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#fff">Reward Model</text>

  <text x="365" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Humans rank outputs;</text>
  <text x="365" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">model learns preferences</text>

  <!-- Arrow 2->3 -->
  <line x1="470" y1="215" x2="482" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ra-arrow)"/>

  <!-- Step 3: PPO -->
  <rect x="490" y="115" width="210" height="200" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="595" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">PPO Optimization</text>
  <text x="595" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">(Reinforcement Learning)</text>
  <line x1="510" y1="168" x2="680" y2="168" stroke="#e0e7ff" stroke-width="1"/>

  <!-- PPO loop -->
  <rect x="530" y="180" width="130" height="30" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <text x="595" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Generate response</text>

  <text x="595" y="222" text-anchor="middle" font-size="14">↓</text>

  <rect x="530" y="228" width="130" height="30" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <text x="595" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">Score with RM</text>

  <text x="595" y="270" text-anchor="middle" font-size="14">↓</text>

  <rect x="525" y="275" width="140" height="30" rx="8" fill="url(#ra-accent)"/>
  <text x="595" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#fff">Aligned Model ✅</text>

  <text x="595" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Optimize policy using</text>
  <text x="595" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">reward signal via PPO</text>

  <!-- Bottom summary -->
  <rect x="130" y="340" width="460" height="28" rx="8" fill="#fff" fill-opacity="0.5" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="359" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Used by: ChatGPT • Claude • Gemini — Makes AI helpful, harmless, and honest (HHH)</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — RLHF &amp; Alignment</text>
</svg>
