<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="aa-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aa-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="aa-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#aa-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Agents</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Perception-Reasoning-Planning-Action architecture with feedback</text>

  <!-- Step 1: Perception -->
  <rect x="40" y="140" width="130" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="105" y="172" text-anchor="middle" font-size="26">👁️</text>
  <text x="105" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Perception</text>
  <text x="105" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Observe environment</text>
  <text x="105" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Parse inputs</text>
  <text x="105" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Sensors, text, API</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="200" x2="205" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#aa-arrow)"/>

  <!-- Step 2: Reasoning -->
  <rect x="210" y="140" width="130" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="275" y="172" text-anchor="middle" font-size="26">🧠</text>
  <text x="275" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Reasoning</text>
  <text x="275" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Analyze &amp; interpret</text>
  <text x="275" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Chain-of-thought</text>
  <text x="275" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">LLM inference</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="200" x2="375" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#aa-arrow)"/>

  <!-- Step 3: Planning -->
  <rect x="380" y="140" width="130" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="445" y="172" text-anchor="middle" font-size="26">📋</text>
  <text x="445" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Planning</text>
  <text x="445" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Decompose tasks</text>
  <text x="445" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Select tools</text>
  <text x="445" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Strategy &amp; order</text>

  <!-- Arrow 3 -->
  <line x1="510" y1="200" x2="545" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#aa-arrow)"/>

  <!-- Step 4: Action -->
  <rect x="550" y="140" width="130" height="120" rx="14" fill="url(#aa-accent)"/>
  <text x="615" y="172" text-anchor="middle" font-size="26">⚡</text>
  <text x="615" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fff">Action</text>
  <text x="615" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Execute plan</text>
  <text x="615" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Call APIs/tools</text>
  <text x="615" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Produce output</text>

  <!-- Feedback loop arrow (Action back to Perception) -->
  <path d="M615 265 C615 330, 105 330, 105 265" stroke="#6366f1" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#aa-arrow)"/>
  <rect x="310" y="308" width="100" height="24" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6366f1">Feedback Loop</text>

  <!-- Labels below -->
  <text x="360" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Examples: AutoGPT • BabyAGI • LangChain Agents • CrewAI • OpenAI Assistants</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — AI Agents</text>
</svg>
