<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="sl-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="sl-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#sl-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Scaling Laws &amp; Training</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">More compute, data, and parameters → better performance (with diminishing returns)</text>

  <!-- Graph area -->
  <rect x="100" y="80" width="520" height="260" rx="12" fill="#fff" fill-opacity="0.7" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- Y-axis -->
  <line x1="140" y1="100" x2="140" y2="320" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca" transform="rotate(-90 90 215)">Performance (Loss ↓)</text>
  <!-- Y-axis ticks -->
  <line x1="135" y1="120" x2="140" y2="120" stroke="#475569" stroke-width="1"/>
  <text x="128" y="124" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">High</text>
  <line x1="135" y1="210" x2="140" y2="210" stroke="#475569" stroke-width="1"/>
  <text x="128" y="214" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Med</text>
  <line x1="135" y1="300" x2="140" y2="300" stroke="#475569" stroke-width="1"/>
  <text x="128" y="304" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Low</text>

  <!-- X-axis -->
  <line x1="140" y1="320" x2="590" y2="320" stroke="#475569" stroke-width="1.5"/>
  <text x="365" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Compute (FLOPs) →</text>
  <!-- X-axis ticks -->
  <line x1="220" y1="320" x2="220" y2="325" stroke="#475569" stroke-width="1"/>
  <text x="220" y="336" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">10¹⁸</text>
  <line x1="330" y1="320" x2="330" y2="325" stroke="#475569" stroke-width="1"/>
  <text x="330" y="336" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">10²⁰</text>
  <line x1="440" y1="320" x2="440" y2="325" stroke="#475569" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">10²²</text>
  <line x1="550" y1="320" x2="550" y2="325" stroke="#475569" stroke-width="1"/>
  <text x="550" y="336" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">10²⁴</text>

  <!-- Grid lines (subtle) -->
  <line x1="220" y1="100" x2="220" y2="320" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="330" y1="100" x2="330" y2="320" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="440" y1="100" x2="440" y2="320" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="550" y1="100" x2="550" y2="320" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="140" y1="120" x2="590" y2="120" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="140" y1="210" x2="590" y2="210" stroke="#e0e7ff" stroke-width="0.5"/>
  <line x1="140" y1="300" x2="590" y2="300" stroke="#e0e7ff" stroke-width="0.5"/>

  <!-- Performance curve (diminishing returns) -->
  <path d="M160 300 C200 290, 220 260, 260 230 C300 200, 340 170, 400 145 C440 130, 490 120, 570 112" stroke="url(#sl-accent)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Shaded area under curve -->
  <path d="M160 300 C200 290, 220 260, 260 230 C300 200, 340 170, 400 145 C440 130, 490 120, 570 112 L570 320 L160 320 Z" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Model size markers on curve -->
  <circle cx="200" cy="285" r="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#475569">125M</text>

  <circle cx="280" cy="220" r="7" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
  <text x="280" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#475569">1.3B</text>

  <circle cx="370" cy="158" r="8" fill="#818cf8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="370" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#475569">13B</text>

  <circle cx="470" cy="125" r="9" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="470" y="117" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#fff">175B</text>

  <circle cx="555" cy="114" r="10" fill="url(#sl-accent)"/>
  <text x="555" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#fff">1T+</text>

  <!-- Diminishing returns annotation -->
  <path d="M500 140 C520 135, 540 130, 560 128" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <text x="585" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#dc2626">Diminishing</text>
  <text x="585" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#dc2626">returns</text>

  <!-- Key insight -->
  <rect x="440" y="205" width="155" height="65" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="517" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#4338ca">Chinchilla Scaling Law</text>
  <text x="517" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">Optimal: 20 tokens per</text>
  <text x="517" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">parameter for compute-</text>
  <text x="517" y="262" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">optimal training</text>

  <!-- Three scaling dimensions -->
  <rect x="150" y="160" width="130" height="48" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="215" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#4338ca">Scale 3 Dimensions:</text>
  <text x="215" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">📐 Parameters • 📊 Data • ⚡ Compute</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Scaling Laws &amp; Training</text>
</svg>
