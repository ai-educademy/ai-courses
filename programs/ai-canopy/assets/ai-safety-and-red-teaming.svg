<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="as-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="as-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#as-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Safety &amp; Red Teaming</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Attack vectors and defense mechanisms for AI systems</text>

  <!-- Shield (center) -->
  <path d="M360 90 L400 110 L400 170 C400 210, 360 240, 360 240 C360 240, 320 210, 320 170 L320 110 Z" fill="url(#as-accent)" opacity="0.9"/>
  <path d="M360 100 L392 117 L392 168 C392 203, 360 228, 360 228 C360 228, 328 203, 328 168 L328 117 Z" fill="#fff" fill-opacity="0.15"/>
  <text x="360" y="155" text-anchor="middle" font-size="28">🛡️</text>
  <text x="360" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#fff">Safety</text>
  <text x="360" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">First</text>

  <!-- Left: Attack Vectors -->
  <text x="140" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#dc2626">⚠️ Attack Vectors</text>

  <rect x="40" y="108" width="200" height="50" rx="12" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="140" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#dc2626">💉 Prompt Injection</text>
  <text x="140" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Malicious instructions in input</text>

  <rect x="40" y="168" width="200" height="50" rx="12" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="140" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#dc2626">☠️ Data Poisoning</text>
  <text x="140" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Corrupted training data</text>

  <rect x="40" y="228" width="200" height="50" rx="12" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="140" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#dc2626">🎭 Adversarial Attacks</text>
  <text x="140" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Crafted inputs to fool models</text>

  <!-- Attack arrows -->
  <line x1="240" y1="133" x2="310" y2="155" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>
  <line x1="240" y1="193" x2="310" y2="175" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>
  <line x1="240" y1="253" x2="310" y2="200" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>

  <!-- Right: Defenses -->
  <text x="580" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#16a34a">✅ Defenses</text>

  <rect x="480" y="108" width="200" height="50" rx="12" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="580" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#16a34a">🚧 Guardrails</text>
  <text x="580" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Input/output filtering</text>

  <rect x="480" y="168" width="200" height="50" rx="12" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="580" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#16a34a">🎯 RLHF</text>
  <text x="580" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Human feedback alignment</text>

  <rect x="480" y="228" width="200" height="50" rx="12" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="580" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#16a34a">📊 Monitoring</text>
  <text x="580" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Real-time anomaly detection</text>

  <!-- Defense arrows -->
  <line x1="480" y1="133" x2="410" y2="155" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="480" y1="193" x2="410" y2="175" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>
  <line x1="480" y1="253" x2="410" y2="200" stroke="#86efac" stroke-width="2" stroke-linecap="round"/>

  <!-- Red Teaming bottom -->
  <rect x="140" y="300" width="440" height="55" rx="12" fill="#fff" fill-opacity="0.7" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🔴 Red Teaming Process</text>
  <text x="360" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Identify vulnerabilities → Test attacks → Document findings → Strengthen defenses → Repeat</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — AI Safety &amp; Red Teaming</text>
</svg>
