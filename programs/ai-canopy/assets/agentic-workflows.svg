<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="aw-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aw-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#aw-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Agentic Workflows</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">AI agents orchestrating tools with planning and reasoning</text>

  <!-- Planning Loop (top) -->
  <rect x="230" y="72" width="260" height="36" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="95" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">🔄 Plan → Execute → Observe → Re-plan</text>
  <line x1="360" y1="108" x2="360" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,128 360,138 366,128" fill="#94a3b8"/>

  <!-- Agent (center) -->
  <circle cx="360" cy="210" r="65" fill="url(#aw-accent)"/>
  <circle cx="360" cy="210" r="55" fill="#fff" fill-opacity="0.1"/>
  <text x="360" y="195" text-anchor="middle" font-size="30">🤖</text>
  <text x="360" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fff">Agent</text>
  <text x="360" y="237" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">LLM-powered</text>
  <text x="360" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">reasoning core</text>

  <!-- Tool: Search (top-left) -->
  <rect x="60" y="100" width="120" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="120" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🔍 Search</text>
  <text x="120" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Web, RAG, vector</text>
  <line x1="180" y1="145" x2="300" y2="185" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="296,179 306,188 294,188" fill="#94a3b8"/>

  <!-- Tool: Code (bottom-left) -->
  <rect x="60" y="240" width="120" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="120" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">💻 Code</text>
  <text x="120" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Execute, debug</text>
  <line x1="180" y1="258" x2="300" y2="230" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="296,236 306,226 294,226" fill="#94a3b8"/>

  <!-- Tool: Database (top-right) -->
  <rect x="540" y="100" width="120" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="600" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🗄️ Database</text>
  <text x="600" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Query, store</text>
  <line x1="540" y1="145" x2="420" y2="185" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="424,179 414,188 426,188" fill="#94a3b8"/>

  <!-- Tool: API (bottom-right) -->
  <rect x="540" y="240" width="120" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="600" y="268" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🌐 API</text>
  <text x="600" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">REST, GraphQL</text>
  <line x1="540" y1="258" x2="420" y2="230" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="424,236 414,226 426,226" fill="#94a3b8"/>

  <!-- Workflow steps at bottom -->
  <rect x="80" y="325" width="560" height="40" rx="10" fill="#fff" fill-opacity="0.6" stroke="#c7d2fe" stroke-width="1"/>
  <text x="160" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📋 Task Decomposition</text>
  <text x="310" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🔧 Tool Selection</text>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📊 Result Synthesis</text>
  <text x="570" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Delivery</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Agentic Workflows</text>
</svg>
