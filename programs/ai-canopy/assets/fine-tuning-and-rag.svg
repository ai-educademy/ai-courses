<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="fr-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="fr-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="fr-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#fr-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Fine-tuning vs RAG</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Two approaches to customize LLMs for specific tasks</text>

  <!-- Top Path: Fine-tuning -->
  <text x="40" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Path 1: Fine-tuning</text>

  <rect x="40" y="100" width="130" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="105" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🧠 Base Model</text>
  <text x="105" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Pre-trained LLM</text>
  <text x="105" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">General knowledge</text>

  <line x1="170" y1="135" x2="210" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#fr-arrow)"/>

  <rect x="218" y="100" width="160" height="70" rx="14" fill="url(#fr-accent)"/>
  <text x="298" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">⚡ Fine-tune</text>
  <text x="298" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Train on domain data</text>
  <text x="298" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff">LoRA, QLoRA, Full FT</text>

  <line x1="378" y1="135" x2="418" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#fr-arrow)"/>

  <rect x="426" y="100" width="160" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="506" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🎯 Specialized</text>
  <text x="506" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Domain-specific model</text>
  <text x="506" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Updated weights</text>

  <!-- Pros/Cons Fine-tuning -->
  <text x="640" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16a34a">✅ Fast inference</text>
  <text x="640" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16a34a">✅ No retrieval needed</text>
  <text x="640" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">❌ Expensive training</text>
  <text x="640" y="163" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">❌ Data goes stale</text>

  <!-- Divider -->
  <line x1="40" y1="190" x2="680" y2="190" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="360" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">— OR —</text>

  <!-- Bottom Path: RAG -->
  <text x="40" y="233" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Path 2: RAG (Retrieval-Augmented Generation)</text>

  <rect x="40" y="245" width="110" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="95" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🧠 Base Model</text>
  <text x="95" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Unchanged LLM</text>
  <text x="95" y="307" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">No retraining</text>

  <!-- Plus sign -->
  <text x="167" y="285" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#6366f1">+</text>

  <rect x="185" y="245" width="110" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="240" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🔍 Retrieval</text>
  <text x="240" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Vector DB search</text>
  <text x="240" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Embeddings</text>

  <line x1="295" y1="280" x2="335" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#fr-arrow)"/>

  <rect x="343" y="245" width="130" height="70" rx="14" fill="url(#fr-accent)"/>
  <text x="408" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">📚 RAG Pipeline</text>
  <text x="408" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Query → Retrieve →</text>
  <text x="408" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Augment → Generate</text>

  <line x1="473" y1="280" x2="513" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#fr-arrow)"/>

  <rect x="521" y="245" width="130" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="586" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">✅ Grounded</text>
  <text x="586" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Factual response</text>
  <text x="586" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">With citations</text>

  <!-- Pros/Cons RAG -->
  <text x="40" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16a34a">✅ Always up-to-date  ✅ No training cost  ✅ Citable sources</text>
  <text x="40" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626">❌ Slower (retrieval step)  ❌ Depends on retrieval quality  ❌ Context window limits</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Fine-tuning vs RAG</text>
</svg>
