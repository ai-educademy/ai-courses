<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="at-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="at-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#at-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Attention &amp; Transformers</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Scaled Dot-Product Attention: the core mechanism of modern AI</text>

  <!-- Query Matrix -->
  <rect x="40" y="100" width="120" height="140" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="100" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Q</text>
  <text x="100" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Query Matrix</text>
  <line x1="55" y1="158" x2="145" y2="158" stroke="#e0e7ff" stroke-width="1"/>
  <!-- Matrix rows -->
  <text x="100" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.8  0.2  0.5]</text>
  <text x="100" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.1  0.9  0.3]</text>
  <text x="100" y="212" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.4  0.6  0.7]</text>
  <text x="100" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">"What am I looking for?"</text>

  <!-- Key Matrix -->
  <rect x="40" y="260" width="120" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="100" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">K</text>
  <text x="100" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Key Matrix</text>
  <line x1="55" y1="314" x2="145" y2="314" stroke="#e0e7ff" stroke-width="1"/>
  <text x="100" y="334" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.3  0.7  0.1]</text>
  <text x="100" y="351" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.6  0.4  0.8]</text>
  <text x="100" y="364" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">"What do I contain?"</text>

  <!-- Value Matrix -->
  <rect x="200" y="260" width="120" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="260" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">V</text>
  <text x="260" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Value Matrix</text>
  <line x1="215" y1="314" x2="305" y2="314" stroke="#e0e7ff" stroke-width="1"/>
  <text x="260" y="334" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.5  0.1  0.9]</text>
  <text x="260" y="351" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.2  0.8  0.4]</text>
  <text x="260" y="364" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">"What do I return?"</text>

  <!-- Arrows to attention -->
  <line x1="160" y1="170" x2="340" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="340,164 356,170 340,176" fill="#94a3b8"/>
  <line x1="160" y1="310" x2="260" y2="250" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="260" y1="260" x2="360" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Attention Scores (center) -->
  <rect x="360" y="110" width="160" height="160" rx="16" fill="url(#at-accent)"/>
  <text x="440" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fff">Attention Scores</text>
  <line x1="378" y1="150" x2="502" y2="150" stroke="#fff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="440" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">QKᵀ / √dₖ</text>
  <text x="440" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">↓</text>
  <text x="440" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Softmax</text>
  <text x="440" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">↓</text>
  <text x="440" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">× V</text>
  <!-- Heatmap mini -->
  <rect x="388" y="252" width="20" height="10" rx="2" fill="#fff" fill-opacity="0.6"/>
  <rect x="412" y="252" width="20" height="10" rx="2" fill="#fff" fill-opacity="0.3"/>
  <rect x="436" y="252" width="20" height="10" rx="2" fill="#fff" fill-opacity="0.8"/>
  <rect x="460" y="252" width="20" height="10" rx="2" fill="#fff" fill-opacity="0.15"/>
  <rect x="484" y="252" width="20" height="10" rx="2" fill="#fff" fill-opacity="0.45"/>

  <!-- Arrow to output -->
  <line x1="520" y1="190" x2="560" y2="190" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="560,184 576,190 560,196" fill="#94a3b8"/>

  <!-- Weighted Output -->
  <rect x="580" y="120" width="120" height="140" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Output</text>
  <text x="640" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Weighted sum</text>
  <line x1="595" y1="180" x2="685" y2="180" stroke="#e0e7ff" stroke-width="1"/>
  <text x="640" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.42 0.38 0.71]</text>
  <text x="640" y="217" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.15 0.82 0.53]</text>
  <text x="640" y="234" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">[0.67 0.29 0.44]</text>
  <text x="640" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Context-aware repr.</text>

  <!-- Formula -->
  <rect x="200" y="300" width="320" height="35" rx="8" fill="#fff" fill-opacity="0.7" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Attention(Q,K,V) = softmax(QKᵀ / √dₖ) · V</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Attention &amp; Transformers</text>
</svg>
