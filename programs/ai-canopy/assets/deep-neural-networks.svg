<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="dnn-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dnn-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#dnn-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Deep Neural Networks</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Multi-layer architecture: Input → Hidden layers → Output</text>

  <!-- Layer labels -->
  <text x="95" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Input</text>
  <text x="95" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(3 nodes)</text>
  <text x="245" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Hidden 1</text>
  <text x="245" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(5 nodes)</text>
  <text x="395" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Hidden 2</text>
  <text x="395" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(5 nodes)</text>
  <text x="545" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Hidden 3</text>
  <text x="545" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(4 nodes)</text>
  <text x="660" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Output</text>
  <text x="660" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(2 nodes)</text>

  <!-- Input layer nodes (3) - y: 140, 200, 260 -->
  <!-- Hidden1 nodes (5) - y: 110, 155, 200, 245, 290 -->
  <!-- Hidden2 nodes (5) - y: 110, 155, 200, 245, 290 -->
  <!-- Hidden3 nodes (4) - y: 125, 175, 225, 275 -->
  <!-- Output nodes (2) - y: 170, 230 -->

  <!-- Connections: Input -> Hidden1 -->
  <line x1="115" y1="140" x2="225" y2="110" stroke="#c7d2fe" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="140" x2="225" y2="155" stroke="#c7d2fe" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="140" x2="225" y2="200" stroke="#c7d2fe" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="140" x2="225" y2="245" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <line x1="115" y1="140" x2="225" y2="290" stroke="#c7d2fe" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="200" x2="225" y2="110" stroke="#c7d2fe" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="200" x2="225" y2="155" stroke="#c7d2fe" stroke-width="1" opacity="0.7"/>
  <line x1="115" y1="200" x2="225" y2="200" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>
  <line x1="115" y1="200" x2="225" y2="245" stroke="#c7d2fe" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="200" x2="225" y2="290" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <line x1="115" y1="260" x2="225" y2="110" stroke="#c7d2fe" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="260" x2="225" y2="155" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <line x1="115" y1="260" x2="225" y2="200" stroke="#c7d2fe" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="260" x2="225" y2="245" stroke="#c7d2fe" stroke-width="1" opacity="0.7"/>
  <line x1="115" y1="260" x2="225" y2="290" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>

  <!-- Connections: Hidden1 -> Hidden2 -->
  <line x1="265" y1="110" x2="375" y2="110" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="110" x2="375" y2="155" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="110" x2="375" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="155" x2="375" y2="110" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="155" x2="375" y2="155" stroke="#a5b4fc" stroke-width="1" opacity="0.6"/>
  <line x1="265" y1="155" x2="375" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="200" x2="375" y2="155" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="200" x2="375" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.7"/>
  <line x1="265" y1="200" x2="375" y2="245" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="245" x2="375" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="245" x2="375" y2="245" stroke="#a5b4fc" stroke-width="1" opacity="0.6"/>
  <line x1="265" y1="245" x2="375" y2="290" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="290" x2="375" y2="245" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="290" x2="375" y2="290" stroke="#a5b4fc" stroke-width="1" opacity="0.6"/>
  <line x1="265" y1="290" x2="375" y2="200" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>

  <!-- Connections: Hidden2 -> Hidden3 -->
  <line x1="415" y1="110" x2="525" y2="125" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="415" y1="110" x2="525" y2="175" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="415" y1="155" x2="525" y2="125" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="415" y1="155" x2="525" y2="175" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="415" y1="200" x2="525" y2="175" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="415" y1="200" x2="525" y2="225" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="415" y1="245" x2="525" y2="225" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="415" y1="245" x2="525" y2="275" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="415" y1="290" x2="525" y2="275" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="415" y1="290" x2="525" y2="225" stroke="#818cf8" stroke-width="1" opacity="0.4"/>

  <!-- Connections: Hidden3 -> Output -->
  <line x1="565" y1="125" x2="640" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="565" y1="125" x2="640" y2="230" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="565" y1="175" x2="640" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="565" y1="175" x2="640" y2="230" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="565" y1="225" x2="640" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="565" y1="225" x2="640" y2="230" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <line x1="565" y1="275" x2="640" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="565" y1="275" x2="640" y2="230" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>

  <!-- Input nodes -->
  <circle cx="95" cy="140" r="16" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="95" y="144" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">x₁</text>
  <circle cx="95" cy="200" r="16" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="95" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">x₂</text>
  <circle cx="95" cy="260" r="16" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="95" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#475569">x₃</text>

  <!-- Hidden 1 nodes -->
  <circle cx="245" cy="110" r="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <circle cx="245" cy="155" r="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <circle cx="245" cy="200" r="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <circle cx="245" cy="245" r="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <circle cx="245" cy="290" r="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>

  <!-- Hidden 2 nodes -->
  <circle cx="395" cy="110" r="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <circle cx="395" cy="155" r="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <circle cx="395" cy="200" r="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <circle cx="395" cy="245" r="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <circle cx="395" cy="290" r="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>

  <!-- Hidden 3 nodes -->
  <circle cx="545" cy="125" r="14" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  <circle cx="545" cy="175" r="14" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  <circle cx="545" cy="225" r="14" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  <circle cx="545" cy="275" r="14" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>

  <!-- Output nodes -->
  <circle cx="660" cy="170" r="18" fill="url(#dnn-accent)"/>
  <text x="660" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">y₁</text>
  <circle cx="660" cy="230" r="18" fill="url(#dnn-accent)"/>
  <text x="660" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">y₂</text>

  <!-- Legend -->
  <rect x="100" y="325" width="520" height="40" rx="10" fill="#fff" fill-opacity="0.6" stroke="#c7d2fe" stroke-width="1"/>
  <text x="180" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Activation: ReLU</text>
  <text x="310" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Backpropagation: ∂L/∂w</text>
  <text x="440" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Optimizer: Adam/SGD</text>
  <text x="560" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Loss: Cross-entropy</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Deep Neural Networks</text>
</svg>
