<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="avbg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="avhuman" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="avai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#avbg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI vs Human Intelligence</text>

  <!-- VS Circle -->
  <circle cx="360" cy="200" r="30" fill="white" stroke="#94a3b8" stroke-width="2"/>
  <text x="360" y="207" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#475569">VS</text>

  <!-- Human Column Header -->
  <rect x="40" y="55" width="260" height="36" rx="12" fill="url(#avhuman)"/>
  <text x="170" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">🧠 Human Intelligence</text>

  <!-- Human Strengths -->
  <g transform="translate(40,105)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">🎨</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#92400e">Creativity</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Original ideas, art, imagination</text>
  </g>
  <g transform="translate(40,185)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">❤️</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#92400e">Empathy</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Understanding emotions &amp; feelings</text>
  </g>
  <g transform="translate(40,265)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">💭</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#92400e">Common Sense</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Intuition &amp; real-world reasoning</text>
  </g>

  <!-- AI Column Header -->
  <rect x="420" y="55" width="260" height="36" rx="12" fill="url(#avai)"/>
  <text x="550" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">🤖 AI Intelligence</text>

  <!-- AI Strengths -->
  <g transform="translate(420,105)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">⚡</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Speed</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Processes millions of data points/sec</text>
  </g>
  <g transform="translate(420,185)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">📊</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Scale</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Handles massive datasets easily</text>
  </g>
  <g transform="translate(420,265)">
    <rect width="260" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="40" y="28" font-size="22">🎯</text>
    <text x="70" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Consistency</text>
    <text x="70" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Never tired, same accuracy always</text>
  </g>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Humans and AI excel at different things — together they're strongest</text>
</svg>
