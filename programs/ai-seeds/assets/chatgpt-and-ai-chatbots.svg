<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="chbg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="chhdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#chbg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">How AI Chatbots Work</text>

  <!-- Step 1: User Types -->
  <g transform="translate(20,110)">
    <rect width="120" height="130" rx="16" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="60" y="45" text-anchor="middle" font-size="32">👤</text>
    <rect x="15" y="60" width="90" height="22" rx="8" fill="url(#chhdr)"/>
    <text x="60" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="white">Step 1</text>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">User Types</text>
    <text x="60" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Sends a message</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="175" x2="165" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="163,170 173,175 163,180" fill="#94a3b8"/>

  <!-- Step 2: Tokeniser -->
  <g transform="translate(175,110)">
    <rect width="120" height="130" rx="16" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="60" y="45" text-anchor="middle" font-size="32">✂️</text>
    <rect x="15" y="60" width="90" height="22" rx="8" fill="url(#chhdr)"/>
    <text x="60" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="white">Step 2</text>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Tokeniser</text>
    <text x="60" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Splits into tokens</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="175" x2="320" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="318,170 328,175 318,180" fill="#94a3b8"/>

  <!-- Step 3: Language Model -->
  <g transform="translate(325,110)">
    <rect width="120" height="130" rx="16" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="60" y="45" text-anchor="middle" font-size="32">🧠</text>
    <rect x="15" y="60" width="90" height="22" rx="8" fill="url(#chhdr)"/>
    <text x="60" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="white">Step 3</text>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Language Model</text>
    <text x="60" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Predicts next word</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="175" x2="470" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="468,170 478,175 468,180" fill="#94a3b8"/>

  <!-- Step 4: Generate Response -->
  <g transform="translate(475,110)">
    <rect width="120" height="130" rx="16" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="60" y="45" text-anchor="middle" font-size="32">📝</text>
    <rect x="15" y="60" width="90" height="22" rx="8" fill="url(#chhdr)"/>
    <text x="60" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="white">Step 4</text>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Generate Text</text>
    <text x="60" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Builds a response</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="600" y1="175" x2="620" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="618,170 628,175 618,180" fill="#94a3b8"/>

  <!-- Step 5: User Reads -->
  <g transform="translate(625,110)">
    <rect width="80" height="130" rx="16" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="40" y="45" text-anchor="middle" font-size="32">👁️</text>
    <rect x="5" y="60" width="70" height="22" rx="8" fill="url(#chhdr)"/>
    <text x="40" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="white">Step 5</text>
    <text x="40" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">User Reads</text>
    <text x="40" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Response</text>
  </g>

  <!-- Explanation boxes below -->
  <rect x="60" y="280" width="600" height="70" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>
  <text x="360" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">How does the Language Model know what to say?</text>
  <text x="360" y="323" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">It was trained on billions of text examples to learn patterns in language.</text>
  <text x="360" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">It predicts the most likely next word, one token at a time.</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">From your question to the chatbot's answer — step by step</text>
</svg>
