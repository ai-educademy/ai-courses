<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="ambg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="amhdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#ambg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Myths Debunked</text>

  <!-- Column Headers -->
  <rect x="60" y="55" width="270" height="32" rx="10" fill="#fef2f2"/>
  <text x="195" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#dc2626">❌ Myth</text>
  <rect x="390" y="55" width="270" height="32" rx="10" fill="#f0fdf4"/>
  <text x="525" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#16a34a">✅ Reality</text>

  <!-- Row 1 -->
  <g transform="translate(60,100)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b91c1c">"AI will replace all jobs"</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Robots are coming for</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">every job imaginable</text>
  </g>
  <g transform="translate(390,100)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#86efac" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#15803d">AI transforms jobs</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">AI automates tasks, not entire</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">roles — humans adapt &amp; upskill</text>
  </g>
  <!-- Arrow Row 1 -->
  <line x1="335" y1="138" x2="385" y2="138" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="383,133 393,138 383,143" fill="#94a3b8"/>

  <!-- Row 2 -->
  <g transform="translate(60,195)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b91c1c">"AI is conscious"</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">AI thinks and feels</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">like a human being</text>
  </g>
  <g transform="translate(390,195)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#86efac" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#15803d">AI follows patterns</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">AI is math &amp; statistics —</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">no awareness or feelings</text>
  </g>
  <!-- Arrow Row 2 -->
  <line x1="335" y1="233" x2="385" y2="233" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="383,228 393,233 383,238" fill="#94a3b8"/>

  <!-- Row 3 -->
  <g transform="translate(60,290)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b91c1c">"AI is always right"</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">If a computer says it,</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">it must be true</text>
  </g>
  <g transform="translate(390,290)">
    <rect width="270" height="75" rx="14" fill="white" stroke="#86efac" stroke-width="1.5"/>
    <text x="135" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#15803d">AI makes mistakes too</text>
    <text x="135" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">AI can hallucinate, be biased,</text>
    <text x="135" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">or give wrong answers</text>
  </g>
  <!-- Arrow Row 3 -->
  <line x1="335" y1="328" x2="385" y2="328" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="383,323 393,328 383,333" fill="#94a3b8"/>

  <text x="360" y="390" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Separating AI facts from fiction</text>
</svg>
