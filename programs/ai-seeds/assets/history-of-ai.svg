<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="hibg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="hihdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#hibg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">History of AI</text>

  <!-- Timeline Line -->
  <line x1="60" y1="180" x2="660" y2="180" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>

  <!-- 1950: Turing Test -->
  <circle cx="100" cy="180" r="10" fill="url(#hihdr)"/>
  <text x="100" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">1950</text>
  <g transform="translate(40,200)">
    <rect width="120" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="20">🧪</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Turing Test</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">"Can machines</text>
    <text x="60" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">think?"</text>
  </g>

  <!-- 1960s: Rule-based -->
  <circle cx="240" cy="180" r="10" fill="url(#hihdr)"/>
  <text x="240" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">1960s</text>
  <g transform="translate(180,200)">
    <rect width="120" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="20">📏</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Rule-Based AI</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">If-then logic</text>
    <text x="60" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">programs</text>
  </g>

  <!-- 1980s: Expert Systems -->
  <circle cx="380" cy="180" r="10" fill="url(#hihdr)"/>
  <text x="380" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">1980s</text>
  <g transform="translate(320,200)">
    <rect width="120" height="80" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="20">🏥</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Expert Systems</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Domain-specific</text>
    <text x="60" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">knowledge bases</text>
  </g>

  <!-- 2012: Deep Learning -->
  <circle cx="520" cy="180" r="10" fill="url(#hihdr)"/>
  <text x="520" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">2012</text>
  <g transform="translate(460,200)">
    <rect width="120" height="80" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="20">🔬</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Deep Learning</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Neural networks</text>
    <text x="60" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">revolution</text>
  </g>

  <!-- 2023: LLMs -->
  <circle cx="660" cy="180" r="10" fill="url(#hihdr)"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">2023</text>
  <g transform="translate(600,200)">
    <rect width="120" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="20">💬</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">LLMs</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">ChatGPT &amp; large</text>
    <text x="60" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">language models</text>
  </g>

  <!-- Timeline arrows between dots -->
  <line x1="115" y1="180" x2="225" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="255" y1="180" x2="365" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="395" y1="180" x2="505" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="535" y1="180" x2="645" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom note -->
  <rect x="120" y="310" width="480" height="45" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1" opacity="0.7"/>
  <text x="360" y="337" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">From Turing's question to today's AI assistants — 70+ years of progress</text>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Key milestones in the history of Artificial Intelligence</text>
</svg>
