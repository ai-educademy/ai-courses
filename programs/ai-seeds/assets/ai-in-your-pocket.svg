<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="apbg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aphdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#apbg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI in Your Pocket</text>

  <!-- Phone Outline -->
  <rect x="310" y="80" width="100" height="180" rx="16" fill="white" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="320" y="95" width="80" height="130" rx="4" fill="#eef2ff"/>
  <circle cx="360" cy="245" r="8" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="168" text-anchor="middle" font-size="32">📱</text>

  <!-- Top-Left: Autocomplete -->
  <g transform="translate(40,90)">
    <rect width="170" height="75" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="85" y="30" text-anchor="middle" font-size="22">⌨️</text>
    <text x="85" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Autocomplete</text>
    <text x="85" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Predicts your next word</text>
  </g>
  <line x1="210" y1="130" x2="310" y2="150" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top-Right: Face Unlock -->
  <g transform="translate(510,90)">
    <rect width="170" height="75" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="85" y="30" text-anchor="middle" font-size="22">🔓</text>
    <text x="85" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Face Unlock</text>
    <text x="85" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Recognises your face</text>
  </g>
  <line x1="510" y1="130" x2="410" y2="150" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom-Left: Photo Enhancement -->
  <g transform="translate(40,225)">
    <rect width="170" height="75" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="85" y="30" text-anchor="middle" font-size="22">📸</text>
    <text x="85" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Photo Enhancement</text>
    <text x="85" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Auto-improves your photos</text>
  </g>
  <line x1="210" y1="260" x2="310" y2="220" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom-Right: Smart Suggestions -->
  <g transform="translate(510,225)">
    <rect width="170" height="75" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="85" y="30" text-anchor="middle" font-size="22">💡</text>
    <text x="85" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Smart Suggestions</text>
    <text x="85" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Learns your habits</text>
  </g>
  <line x1="510" y1="260" x2="410" y2="220" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Your smartphone uses AI dozens of times every day</text>
</svg>
