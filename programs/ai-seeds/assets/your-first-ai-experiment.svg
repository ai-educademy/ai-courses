<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="yobg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="yohdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#yobg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Your First AI Experiment</text>

  <!-- Step 1: Choose a Dataset -->
  <g transform="translate(40,80)">
    <rect width="190" height="230" rx="16" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="20" y="15" width="150" height="30" rx="10" fill="url(#yohdr)"/>
    <text x="95" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 1</text>
    <text x="95" y="80" text-anchor="middle" font-size="40">📊</text>
    <text x="95" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4338ca">Choose a Dataset</text>
    <text x="95" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Pick data to learn from:</text>
    <text x="95" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Images of cats &amp; dogs</text>
    <text x="95" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Movie reviews</text>
    <text x="95" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Weather data</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="235" y1="195" x2="260" y2="195" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="258,190 268,195 258,200" fill="#94a3b8"/>

  <!-- Step 2: Pick a Model -->
  <g transform="translate(265,80)">
    <rect width="190" height="230" rx="16" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <rect x="20" y="15" width="150" height="30" rx="10" fill="url(#yohdr)"/>
    <text x="95" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 2</text>
    <text x="95" y="80" text-anchor="middle" font-size="40">🧠</text>
    <text x="95" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4338ca">Pick a Model</text>
    <text x="95" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Choose how AI learns:</text>
    <text x="95" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Decision Tree</text>
    <text x="95" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Neural Network</text>
    <text x="95" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Linear Regression</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="195" x2="485" y2="195" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="483,190 493,195 483,200" fill="#94a3b8"/>

  <!-- Step 3: See Results -->
  <g transform="translate(490,80)">
    <rect width="190" height="230" rx="16" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="20" y="15" width="150" height="30" rx="10" fill="url(#yohdr)"/>
    <text x="95" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 3</text>
    <text x="95" y="80" text-anchor="middle" font-size="40">🎉</text>
    <text x="95" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4338ca">See Results</text>
    <text x="95" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Evaluate what AI learned:</text>
    <text x="95" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Accuracy score</text>
    <text x="95" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Predictions on new data</text>
    <text x="95" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">• Visualise results</text>
  </g>

  <text x="360" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">💡 Try it yourself: teachablemachine.withgoogle.com</text>
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Three simple steps to build your first AI model</text>
</svg>
