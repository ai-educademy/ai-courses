<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="aibg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aihdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#aibg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI in Everyday Life</text>

  <!-- Center AI Circle -->
  <circle cx="360" cy="200" r="48" fill="url(#aihdr)" opacity="0.95"/>
  <text x="360" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="white">🤖</text>
  <text x="360" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">AI</text>

  <!-- Top-Left: Smart Home -->
  <g transform="translate(60,70)">
    <rect width="160" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="80" y="38" text-anchor="middle" font-size="28">🏠</text>
    <text x="80" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Smart Home</text>
    <text x="80" y="80" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Thermostats, lights,</text>
    <text x="80" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">security cameras</text>
  </g>
  <!-- Arrow: Smart Home → Center -->
  <line x1="220" y1="145" x2="315" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#aiarrow)"/>

  <!-- Top-Right: Phone AI -->
  <g transform="translate(500,70)">
    <rect width="160" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="80" y="38" text-anchor="middle" font-size="28">📱</text>
    <text x="80" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Phone AI</text>
    <text x="80" y="80" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Face ID, autocorrect,</text>
    <text x="80" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">photo suggestions</text>
  </g>
  <!-- Arrow: Phone AI → Center -->
  <line x1="500" y1="145" x2="405" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom-Left: Music Recommendations -->
  <g transform="translate(60,240)">
    <rect width="160" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="80" y="38" text-anchor="middle" font-size="28">🎵</text>
    <text x="80" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Music Recs</text>
    <text x="80" y="80" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Spotify, Apple Music</text>
    <text x="80" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">learn your taste</text>
  </g>
  <!-- Arrow: Music → Center -->
  <line x1="220" y1="265" x2="315" y2="225" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom-Right: Voice Assistants -->
  <g transform="translate(500,240)">
    <rect width="160" height="100" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="80" y="38" text-anchor="middle" font-size="28">🗣️</text>
    <text x="80" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Voice Assistants</text>
    <text x="80" y="80" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Siri, Alexa, Google</text>
    <text x="80" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">understand speech</text>
  </g>
  <!-- Arrow: Voice → Center -->
  <line x1="500" y1="265" x2="405" y2="225" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI powers many tools you already use every day</text>
</svg>
