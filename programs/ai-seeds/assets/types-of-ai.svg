<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="tybg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="tyhdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#tybg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Types of AI</text>

  <!-- Top Level: AI -->
  <g transform="translate(290,55)">
    <rect width="140" height="55" rx="16" fill="url(#tyhdr)"/>
    <text x="70" y="25" text-anchor="middle" font-size="18" fill="white">🤖</text>
    <text x="70" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">AI</text>
  </g>

  <!-- Lines from AI down to Narrow and General -->
  <line x1="360" y1="110" x2="200" y2="150" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="360" y1="110" x2="520" y2="150" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Level 2: Narrow AI -->
  <g transform="translate(100,150)">
    <rect width="200" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🎯 Narrow AI (ANI)</text>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Good at ONE specific task</text>
  </g>

  <!-- Level 2: General AI -->
  <g transform="translate(420,150)">
    <rect width="200" height="60" rx="14" fill="white" stroke="#a7f3d0" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🌐 General AI (AGI)</text>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Human-level intelligence</text>
  </g>

  <!-- Lines from Narrow AI down to subtypes -->
  <line x1="200" y1="210" x2="130" y2="255" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="210" x2="300" y2="255" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Level 3: Reactive -->
  <g transform="translate(30,255)">
    <rect width="195" height="85" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="97" y="25" text-anchor="middle" font-size="18">⚡</text>
    <text x="97" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Reactive AI</text>
    <text x="97" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">No memory, responds to</text>
    <text x="97" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">current input only (e.g. chess)</text>
  </g>

  <!-- Level 3: Limited Memory -->
  <g transform="translate(240,255)">
    <rect width="195" height="85" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="97" y="25" text-anchor="middle" font-size="18">🧠</text>
    <text x="97" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Limited Memory</text>
    <text x="97" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Learns from recent data</text>
    <text x="97" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">(e.g. self-driving cars)</text>
  </g>

  <!-- General AI note -->
  <g transform="translate(455,255)">
    <rect width="195" height="85" rx="14" fill="white" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="97" y="25" text-anchor="middle" font-size="18">🔮</text>
    <text x="97" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#92400e">Not Yet Achieved</text>
    <text x="97" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">AGI remains a theoretical</text>
    <text x="97" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">goal for AI researchers</text>
  </g>
  <!-- Dashed line from General AI -->
  <line x1="520" y1="210" x2="552" y2="255" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 3"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">All AI today is Narrow AI — General AI is still a future goal</text>
</svg>
