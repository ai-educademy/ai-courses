<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="bm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bm-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#bm-bg)"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Bit Manipulation</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Bitwise AND, OR, and XOR operations on binary numbers</text>

  <!-- AND Section -->
  <rect x="30" y="78" width="210" height="250" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="78" width="210" height="32" rx="14" fill="url(#bm-accent)"/>
  <rect x="30" y="96" width="210" height="14" fill="url(#bm-accent)"/>
  <text x="135" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">AND (&amp;)</text>
  <!-- Bits A: 1010 -->
  <text x="55" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A =</text>
  <rect x="82" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="96" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="114" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="128" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="146" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="160" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="178" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="192" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <!-- Bits B: 1100 -->
  <text x="55" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">B =</text>
  <rect x="82" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="96" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="114" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="128" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="146" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="160" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="178" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="192" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <line x1="82" y1="184" x2="206" y2="184" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Result: 1000 -->
  <text x="45" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A&amp;B=</text>
  <rect x="82" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="96" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="114" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="128" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <rect x="146" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="160" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <rect x="178" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="192" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <text x="135" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">1 only where both bits are 1</text>
  <!-- Truth table -->
  <text x="65" y="270" font-family="monospace" font-size="10" fill="#475569">0&amp;0=0  0&amp;1=0</text>
  <text x="65" y="286" font-family="monospace" font-size="10" fill="#475569">1&amp;0=0  1&amp;1=1</text>
  <text x="135" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4338ca" font-weight="600">Decimal: 10 &amp; 12 = 8</text>

  <!-- OR Section -->
  <rect x="255" y="78" width="210" height="250" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="255" y="78" width="210" height="32" rx="14" fill="url(#bm-accent)"/>
  <rect x="255" y="96" width="210" height="14" fill="url(#bm-accent)"/>
  <text x="360" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">OR (|)</text>
  <text x="280" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A =</text>
  <rect x="307" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="321" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="339" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="353" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="371" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="385" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="403" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="417" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <text x="280" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">B =</text>
  <rect x="307" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="321" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="339" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="353" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="371" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="385" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="403" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="417" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <line x1="307" y1="184" x2="431" y2="184" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="270" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A|B=</text>
  <rect x="307" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="321" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="339" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="353" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="371" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="385" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="403" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="417" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <text x="360" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">1 where either bit is 1</text>
  <text x="290" y="270" font-family="monospace" font-size="10" fill="#475569">0|0=0  0|1=1</text>
  <text x="290" y="286" font-family="monospace" font-size="10" fill="#475569">1|0=1  1|1=1</text>
  <text x="360" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4338ca" font-weight="600">Decimal: 10 | 12 = 14</text>

  <!-- XOR Section -->
  <rect x="480" y="78" width="210" height="250" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="480" y="78" width="210" height="32" rx="14" fill="url(#bm-accent)"/>
  <rect x="480" y="96" width="210" height="14" fill="url(#bm-accent)"/>
  <text x="585" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">XOR (^)</text>
  <text x="505" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A =</text>
  <rect x="532" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="546" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="564" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="578" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="596" y="120" width="28" height="24" rx="5" fill="#818cf8"/><text x="610" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="628" y="120" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="642" y="137" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <text x="505" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">B =</text>
  <rect x="532" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="546" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="564" y="152" width="28" height="24" rx="5" fill="#818cf8"/><text x="578" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="596" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="610" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <rect x="628" y="152" width="28" height="24" rx="5" fill="#e0e7ff"/><text x="642" y="169" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#4338ca">0</text>
  <line x1="532" y1="184" x2="656" y2="184" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="495" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">A^B=</text>
  <rect x="532" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="546" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <rect x="564" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="578" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="596" y="192" width="28" height="24" rx="5" fill="#22c55e"/><text x="610" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">1</text>
  <rect x="628" y="192" width="28" height="24" rx="5" fill="#fecaca"/><text x="642" y="209" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#991b1b">0</text>
  <text x="585" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">1 where bits differ</text>
  <text x="515" y="270" font-family="monospace" font-size="10" fill="#475569">0^0=0  0^1=1</text>
  <text x="515" y="286" font-family="monospace" font-size="10" fill="#475569">1^0=1  1^1=0</text>
  <text x="585" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4338ca" font-weight="600">Decimal: 10 ^ 12 = 6</text>

  <!-- Key Insight -->
  <rect x="100" y="342" width="520" height="32" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="363" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">💡 XOR trick: a ^ a = 0 and a ^ 0 = a — find the single unique number in O(n) time!</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>