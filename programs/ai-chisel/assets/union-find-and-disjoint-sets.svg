<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="uf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="uf-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#uf-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Union-Find (Disjoint Sets)</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Merging two disjoint sets with union by rank and path compression</text>

  <!-- BEFORE -->
  <rect x="20" y="66" width="320" height="200" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="20" y="66" width="320" height="28" rx="14" fill="url(#uf-accent)"/>
  <rect x="20" y="80" width="320" height="14" fill="url(#uf-accent)"/>
  <text x="180" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Before Union</text>

  <!-- Set A: root=1, children 2,3 -->
  <text x="100" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3b82f6" font-weight="600">Set A: {1, 2, 3}</text>
  <!-- Edges -->
  <line x1="100" y1="140" x2="65" y2="178" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="100" y1="140" x2="135" y2="178" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Node 1 root -->
  <circle cx="100" cy="132" r="18" fill="#3b82f6"/><text x="100" y="138" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">1</text>
  <text x="126" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#3b82f6" font-weight="600">root</text>
  <!-- Node 2 -->
  <circle cx="65" cy="190" r="16" fill="#93c5fd"/><text x="65" y="196" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">2</text>
  <!-- Node 3 -->
  <circle cx="135" cy="190" r="16" fill="#93c5fd"/><text x="135" y="196" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">3</text>

  <!-- Set B: root=4, children 5,6 -->
  <text x="260" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Set B: {4, 5, 6}</text>
  <line x1="260" y1="140" x2="225" y2="178" stroke="#f59e0b" stroke-width="2.5"/>
  <line x1="260" y1="140" x2="295" y2="178" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="260" cy="132" r="18" fill="#f59e0b"/><text x="260" y="138" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">4</text>
  <text x="286" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#f59e0b" font-weight="600">root</text>
  <circle cx="225" cy="190" r="16" fill="#fcd34d"/><text x="225" y="196" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">5</text>
  <circle cx="295" cy="190" r="16" fill="#fcd34d"/><text x="295" y="196" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">6</text>

  <!-- find(2)=1, find(5)=4 -->
  <text x="100" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">find(2) → 1</text>
  <text x="260" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">find(5) → 4</text>
  <text x="180" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">1 ≠ 4 → different sets</text>

  <!-- Arrow union(2,5) -->
  <text x="360" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#4338ca">→</text>
  <text x="360" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#4338ca" font-weight="600">union(2,5)</text>

  <!-- AFTER -->
  <rect x="390" y="66" width="310" height="200" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="390" y="66" width="310" height="28" rx="14" fill="#22c55e"/>
  <rect x="390" y="80" width="310" height="14" fill="#22c55e"/>
  <text x="545" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">After Union (by rank)</text>

  <!-- Merged tree: 1 is root, children: 2, 3, 4; 4's children: 5, 6 -->
  <line x1="545" y1="120" x2="470" y2="162" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="545" y1="120" x2="545" y2="162" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="545" y1="120" x2="620" y2="162" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="620" y1="186" x2="590" y2="220" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="620" y1="186" x2="650" y2="220" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Root 1 -->
  <circle cx="545" cy="112" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2"/><text x="545" y="118" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">1</text>
  <text x="571" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e" font-weight="600">root</text>
  <!-- Node 2 -->
  <circle cx="470" cy="174" r="15" fill="#86efac"/><text x="470" y="180" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#166534">2</text>
  <!-- Node 3 -->
  <circle cx="545" cy="174" r="15" fill="#86efac"/><text x="545" y="180" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#166534">3</text>
  <!-- Node 4 (attached to 1) -->
  <circle cx="620" cy="174" r="15" fill="#86efac"/><text x="620" y="180" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#166534">4</text>
  <!-- Node 5 -->
  <circle cx="590" cy="232" r="14" fill="#bbf7d0"/><text x="590" y="237" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#166534">5</text>
  <!-- Node 6 -->
  <circle cx="650" cy="232" r="14" fill="#bbf7d0"/><text x="650" y="237" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#166534">6</text>

  <text x="545" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">find(5) → find(4) → 1</text>

  <!-- Path Compression -->
  <rect x="20" y="278" width="680" height="85" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Path Compression — After find(5)</text>
  <text x="360" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Every node visited during find() is directly attached to root</text>

  <!-- Flat tree after compression -->
  <line x1="360" y1="330" x2="240" y2="348" stroke="#22c55e" stroke-width="2"/>
  <line x1="360" y1="330" x2="300" y2="348" stroke="#22c55e" stroke-width="2"/>
  <line x1="360" y1="330" x2="360" y2="348" stroke="#22c55e" stroke-width="2"/>
  <line x1="360" y1="330" x2="420" y2="348" stroke="#22c55e" stroke-width="2"/>
  <line x1="360" y1="330" x2="480" y2="348" stroke="#22c55e" stroke-width="2"/>
  <circle cx="360" cy="328" r="12" fill="#22c55e"/><text x="360" y="333" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">1</text>
  <circle cx="240" cy="354" r="10" fill="#86efac"/><text x="240" y="358" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">2</text>
  <circle cx="300" cy="354" r="10" fill="#86efac"/><text x="300" y="358" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">3</text>
  <circle cx="360" cy="354" r="10" fill="#86efac"/><text x="360" y="358" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">4</text>
  <circle cx="420" cy="354" r="10" fill="#86efac"/><text x="420" y="358" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">5</text>
  <circle cx="480" cy="354" r="10" fill="#86efac"/><text x="480" y="358" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">6</text>
  <text x="590" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">Nearly O(1)</text>
  <text x="590" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">α(n) amortized</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>