<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#dp-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Dynamic Programming</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Fibonacci with memoization — eliminating redundant subproblems</text>

  <!-- Recursion Tree -->
  <rect x="20" y="66" width="420" height="230" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="230" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Recursion Tree for fib(5)</text>

  <!-- fib(5) -->
  <circle cx="230" cy="110" r="16" fill="url(#dp-accent)"/><text x="230" y="115" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">5</text>
  <!-- fib(4) -->
  <line x1="218" y1="124" x2="150" y2="148" stroke="#94a3b8" stroke-width="2.5"/>
  <circle cx="145" cy="158" r="16" fill="url(#dp-accent)"/><text x="145" y="163" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">4</text>
  <!-- fib(3) right of 5 -->
  <line x1="242" y1="124" x2="310" y2="148" stroke="#94a3b8" stroke-width="2.5"/>
  <circle cx="315" cy="158" r="16" fill="#f59e0b" stroke="#d97706" stroke-width="2"/><text x="315" y="163" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">3</text>

  <!-- fib(3) left of 4 -->
  <line x1="134" y1="172" x2="90" y2="196" stroke="#94a3b8" stroke-width="2.5"/>
  <circle cx="85" cy="206" r="16" fill="#f59e0b" stroke="#d97706" stroke-width="2"/><text x="85" y="211" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">3</text>
  <!-- fib(2) right of 4 -->
  <line x1="156" y1="172" x2="200" y2="196" stroke="#94a3b8" stroke-width="2.5"/>
  <circle cx="205" cy="206" r="16" fill="#ef4444" stroke="#dc2626" stroke-width="2"/><text x="205" y="211" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">2</text>

  <!-- fib(2) left of 3 (left) -->
  <line x1="74" y1="220" x2="50" y2="244" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="47" cy="254" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="2"/><text x="47" y="259" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">2</text>
  <!-- fib(1) right of 3 (left) -->
  <line x1="96" y1="220" x2="118" y2="244" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="121" cy="254" r="14" fill="#94a3b8"/><text x="121" y="259" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">1</text>

  <!-- fib(2) left of 3 (right) -->
  <line x1="304" y1="172" x2="280" y2="196" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="277" cy="206" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="2"/><text x="277" y="211" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">2</text>
  <!-- fib(1) right of 3 (right) -->
  <line x1="326" y1="172" x2="350" y2="196" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="353" cy="206" r="14" fill="#94a3b8"/><text x="353" y="211" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">1</text>

  <!-- fib(1), fib(0) leaves of fib(2) at 205 -->
  <line x1="196" y1="220" x2="178" y2="244" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="175" cy="254" r="12" fill="#94a3b8"/><text x="175" y="259" text-anchor="middle" font-family="monospace" font-size="9" fill="white">1</text>
  <line x1="214" y1="220" x2="232" y2="244" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="235" cy="254" r="12" fill="#94a3b8"/><text x="235" y="259" text-anchor="middle" font-family="monospace" font-size="9" fill="white">0</text>

  <!-- Legend -->
  <circle cx="55" cy="285" r="6" fill="url(#dp-accent)"/><text x="68" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Unique call</text>
  <circle cx="155" cy="285" r="6" fill="#f59e0b"/><text x="168" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Overlapping (fib3)</text>
  <circle cx="280" cy="285" r="6" fill="#ef4444"/><text x="293" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Overlapping (fib2)</text>

  <!-- Memo Table -->
  <rect x="460" y="66" width="240" height="230" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="580" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Memoization Table</text>
  <text x="580" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Cache results to avoid recomputation</text>

  <!-- Table headers -->
  <rect x="480" y="110" width="70" height="22" rx="4" fill="url(#dp-accent)"/><text x="515" y="126" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">n</text>
  <rect x="560" y="110" width="120" height="22" rx="4" fill="url(#dp-accent)"/><text x="620" y="126" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">fib(n)</text>

  <!-- Table rows -->
  <text x="515" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">0</text><text x="620" y="152" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">0</text>
  <line x1="480" y1="158" x2="680" y2="158" stroke="#e0e7ff" stroke-width="1"/>
  <text x="515" y="174" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">1</text><text x="620" y="174" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">1</text>
  <line x1="480" y1="180" x2="680" y2="180" stroke="#e0e7ff" stroke-width="1"/>
  <text x="515" y="196" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">2</text><text x="620" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">1</text>
  <line x1="480" y1="202" x2="680" y2="202" stroke="#e0e7ff" stroke-width="1"/>
  <text x="515" y="218" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">3</text><text x="620" y="218" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">2</text>
  <line x1="480" y1="224" x2="680" y2="224" stroke="#e0e7ff" stroke-width="1"/>
  <text x="515" y="240" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">4</text><text x="620" y="240" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">3</text>
  <line x1="480" y1="246" x2="680" y2="246" stroke="#e0e7ff" stroke-width="1"/>
  <text x="515" y="262" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">5</text><text x="620" y="262" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#4338ca">5</text>

  <text x="580" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">✓ O(n) with memo vs O(2ⁿ) naive</text>

  <!-- Bottom insight -->
  <rect x="60" y="308" width="600" height="60" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">DP = Optimal Substructure + Overlapping Subproblems</text>
  <text x="360" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Top-down (memoization) or Bottom-up (tabulation) — both avoid redundant work</text>
  <text x="360" y="363" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">fib(n) = fib(n-1) + fib(n-2) with base cases fib(0)=0, fib(1)=1</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>