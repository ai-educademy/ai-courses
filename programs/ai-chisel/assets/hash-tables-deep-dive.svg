<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ht-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ht-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ht-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ht-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Hash Tables Deep Dive</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Key → Hash Function → Index → Bucket with collision handling via chaining</text>

  <!-- Pipeline: Key -> Hash -> Index -> Bucket -->
  <rect x="30" y="68" width="660" height="140" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- Keys -->
  <rect x="50" y="90" width="80" height="28" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="90" y="109" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#4338ca">"apple"</text>
  <rect x="50" y="124" width="80" height="28" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="90" y="143" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#4338ca">"banana"</text>
  <rect x="50" y="158" width="80" height="28" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="177" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#92400e">"grape"</text>
  <text x="90" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Keys</text>

  <!-- Arrow to hash -->
  <line x1="138" y1="130" x2="170" y2="130" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ht-arrow)"/>

  <!-- Hash Function box -->
  <rect x="178" y="100" width="120" height="60" rx="12" fill="url(#ht-accent)"/>
  <text x="238" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Hash Function</text>
  <text x="238" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#c7d2fe">h(key) % size</text>
  <text x="238" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Transform</text>

  <!-- Arrow to index -->
  <line x1="306" y1="130" x2="338" y2="130" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ht-arrow)"/>

  <!-- Index results -->
  <rect x="346" y="90" width="80" height="28" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="386" y="109" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">index: 2</text>
  <rect x="346" y="124" width="80" height="28" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="386" y="143" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#166534">index: 5</text>
  <rect x="346" y="158" width="80" height="28" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="386" y="177" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#92400e">index: 2</text>
  <text x="386" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Indices</text>

  <!-- Arrow to buckets -->
  <line x1="434" y1="130" x2="466" y2="130" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ht-arrow)"/>

  <!-- Bucket array -->
  <text x="580" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Bucket Array</text>
  <rect x="474" y="88" width="46" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="497" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[0] —</text>
  <rect x="474" y="112" width="46" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="497" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[1] —</text>
  <rect x="474" y="136" width="46" height="22" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/><text x="497" y="152" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">[2] →</text>
  <rect x="474" y="160" width="46" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="497" y="176" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[3] —</text>

  <!-- Chaining at index 2 -->
  <rect x="530" y="134" width="68" height="26" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="564" y="152" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#4338ca">apple:5</text>
  <line x1="600" y1="147" x2="612" y2="147" stroke="#94a3b8" stroke-width="2" marker-end="url(#ht-arrow)"/>
  <rect x="618" y="134" width="68" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="652" y="152" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#92400e">grape:8</text>

  <!-- Collision callout -->
  <text x="620" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ef4444" font-weight="600">⚡ Collision! Chained</text>

  <!-- Extra rows -->
  <rect x="474" y="184" width="46" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="497" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">[4] —</text>
  <rect x="474" y="208" width="46" height="22" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/><text x="497" y="224" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#166534">[5] →</text>
  <rect x="530" y="206" width="80" height="26" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="570" y="224" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#4338ca">banana:3</text>

  <!-- Complexity section -->
  <rect x="30" y="240" width="320" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="190" y="262" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Time Complexity</text>
  <text x="80" y="284" font-family="monospace" font-size="11" fill="#475569">Insert:  </text><text x="160" y="284" font-family="monospace" font-size="11" font-weight="700" fill="#22c55e">O(1) average</text>
  <text x="80" y="304" font-family="monospace" font-size="11" fill="#475569">Lookup:  </text><text x="160" y="304" font-family="monospace" font-size="11" font-weight="700" fill="#22c55e">O(1) average</text>
  <text x="80" y="324" font-family="monospace" font-size="11" fill="#475569">Delete:  </text><text x="160" y="324" font-family="monospace" font-size="11" font-weight="700" fill="#22c55e">O(1) average</text>
  <text x="80" y="344" font-family="monospace" font-size="11" fill="#475569">Worst:   </text><text x="160" y="344" font-family="monospace" font-size="11" font-weight="700" fill="#ef4444">O(n) — all collide</text>
  <text x="80" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Load factor α = n/m controls performance</text>

  <!-- Collision strategies -->
  <rect x="370" y="240" width="320" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="530" y="262" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Collision Resolution</text>
  <text x="400" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🔗 <tspan font-weight="600">Chaining</tspan> — linked list at each bucket</text>
  <text x="400" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📍 <tspan font-weight="600">Open Addressing</tspan> — probe next slot</text>
  <text x="420" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">• Linear probing: h(k)+1, h(k)+2, ...</text>
  <text x="420" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">• Quadratic probing: h(k)+1², h(k)+2², ...</text>
  <text x="420" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">• Double hashing: h₁(k) + i·h₂(k)</text>
  <text x="530" y="366" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">Resize when load factor > 0.75</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>