<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="tr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="tr-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#tr-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Trie Data Structure</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Prefix tree for words: cat, car, card, care — shared prefixes save space</text>

  <rect x="30" y="66" width="430" height="280" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Trie Visualization</text>

  <!-- Edges -->
  <!-- root -> c -->
  <line x1="245" y1="116" x2="245" y2="150" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- c -> a -->
  <line x1="245" y1="176" x2="245" y2="210" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- a -> t -->
  <line x1="228" y1="234" x2="145" y2="266" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- a -> r -->
  <line x1="262" y1="234" x2="345" y2="266" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- r -> d -->
  <line x1="330" y1="296" x2="270" y2="322" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- r -> e -->
  <line x1="360" y1="296" x2="415" y2="322" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- Root node -->
  <circle cx="245" cy="106" r="14" fill="#94a3b8"/><text x="245" y="111" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="white">∅</text>
  <text x="270" y="111" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">root</text>

  <!-- Node c - shared prefix -->
  <circle cx="245" cy="162" r="18" fill="#818cf8" stroke="#6366f1" stroke-width="2"/><text x="245" y="168" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">c</text>
  <rect x="270" y="152" width="50" height="16" rx="4" fill="#ede9fe"/><text x="295" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6366f1" font-weight="600">shared</text>

  <!-- Node a - shared prefix -->
  <circle cx="245" cy="224" r="18" fill="#818cf8" stroke="#6366f1" stroke-width="2"/><text x="245" y="230" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">a</text>
  <rect x="270" y="214" width="50" height="16" rx="4" fill="#ede9fe"/><text x="295" y="226" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6366f1" font-weight="600">shared</text>

  <!-- Node t - end of "cat" -->
  <circle cx="140" cy="280" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2.5"/><text x="140" y="286" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">t</text>
  <text x="140" y="310" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#22c55e">cat ✓</text>

  <!-- Node r - end of "car" -->
  <circle cx="345" cy="280" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2.5"/><text x="345" y="286" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">r</text>
  <text x="345" y="310" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#22c55e">car ✓</text>

  <!-- Node d - end of "card" -->
  <circle cx="270" cy="335" r="16" fill="#f59e0b" stroke="#d97706" stroke-width="2"/><text x="270" y="341" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">d</text>
  <text x="270" y="362" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#f59e0b">card ✓</text>

  <!-- Node e - end of "care" -->
  <circle cx="420" cy="335" r="16" fill="#f59e0b" stroke="#d97706" stroke-width="2"/><text x="420" y="341" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">e</text>
  <text x="420" y="362" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#f59e0b">care ✓</text>

  <!-- Properties panel -->
  <rect x="480" y="66" width="210" height="280" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="585" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Trie Properties</text>

  <text x="500" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Words stored:</text>
  <rect x="500" y="118" width="170" height="18" rx="4" fill="#dcfce7"/><text x="585" y="132" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">cat, car, card, care</text>

  <text x="500" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Shared prefix: "ca"</text>
  <text x="500" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Stored once, not 4 times!</text>

  <line x1="495" y1="184" x2="675" y2="184" stroke="#e0e7ff" stroke-width="1"/>

  <text x="500" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Time Complexity:</text>
  <text x="510" y="222" font-family="monospace" font-size="10" fill="#475569">Search:  O(m)</text>
  <text x="510" y="240" font-family="monospace" font-size="10" fill="#475569">Insert:  O(m)</text>
  <text x="510" y="258" font-family="monospace" font-size="10" fill="#475569">Prefix:  O(m)</text>
  <text x="510" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">m = word length</text>

  <line x1="495" y1="288" x2="675" y2="288" stroke="#e0e7ff" stroke-width="1"/>

  <text x="500" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Use Cases:</text>
  <text x="510" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">• Autocomplete</text>
  <text x="510" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">• Spell checking</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>