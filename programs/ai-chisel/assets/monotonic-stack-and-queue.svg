<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ms-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ms-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ms-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Monotonic Stack</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Decreasing monotonic stack — maintains elements in descending order</text>

  <!-- Step 1: Stack = [5, 3, 1] -->
  <rect x="30" y="68" width="210" height="255" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="68" width="210" height="28" rx="14" fill="url(#ms-accent)"/>
  <rect x="30" y="82" width="210" height="14" fill="url(#ms-accent)"/>
  <text x="135" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 1: Stack = [5,3,1]</text>
  <text x="135" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Decreasing order maintained ✓</text>

  <!-- Stack visual -->
  <rect x="95" y="126" width="80" height="34" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="135" y="148" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#4338ca">1</text>
  <text x="185" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">← top</text>
  <rect x="95" y="164" width="80" height="34" rx="6" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.5"/>
  <text x="135" y="186" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#4338ca">3</text>
  <rect x="95" y="202" width="80" height="34" rx="6" fill="#818cf8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="224" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">5</text>
  <text x="185" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">← bottom</text>

  <!-- Base line -->
  <line x1="85" y1="240" x2="185" y2="240" stroke="#475569" stroke-width="2"/>
  <text x="135" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">5 ≥ 3 ≥ 1 ✓</text>
  <text x="135" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">Valid decreasing stack</text>

  <!-- Arrow -->
  <text x="270" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#4338ca">→</text>
  <text x="270" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">push(4)</text>

  <!-- Step 2: Pop 1 and 3 -->
  <rect x="310" y="68" width="210" height="255" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="310" y="68" width="210" height="28" rx="14" fill="#ef4444"/>
  <rect x="310" y="82" width="210" height="14" fill="#ef4444"/>
  <text x="415" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 2: Pop 1 and 3</text>
  <text x="415" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ef4444" font-weight="600">4 > 1 → pop! 4 > 3 → pop!</text>

  <!-- Popping visualization -->
  <rect x="375" y="126" width="80" height="34" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="415" y="148" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#ef4444" text-decoration="line-through">1</text>
  <text x="465" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ef4444">← pop!</text>
  <rect x="375" y="164" width="80" height="34" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="415" y="186" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#ef4444" text-decoration="line-through">3</text>
  <text x="465" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ef4444">← pop!</text>
  <rect x="375" y="202" width="80" height="34" rx="6" fill="#818cf8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="415" y="224" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">5</text>
  <text x="465" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">← stays</text>

  <line x1="365" y1="240" x2="465" y2="240" stroke="#475569" stroke-width="2"/>
  <text x="415" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">4 > top(1), pop 1</text>
  <text x="415" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">4 > top(3), pop 3</text>
  <text x="415" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">4 &lt; top(5), stop</text>

  <!-- Arrow -->
  <text x="550" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#4338ca">→</text>
  <text x="550" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">result</text>

  <!-- Step 3: Final stack [5, 4] -->
  <rect x="580" y="68" width="120" height="255" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="580" y="68" width="120" height="28" rx="14" fill="#22c55e"/>
  <rect x="580" y="82" width="120" height="14" fill="#22c55e"/>
  <text x="640" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Step 3: Done</text>
  <text x="640" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Stack = [5,4]</text>

  <rect x="600" y="160" width="80" height="34" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="182" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#166534">4</text>
  <text x="690" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">← new</text>
  <rect x="600" y="198" width="80" height="34" rx="6" fill="#818cf8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="640" y="220" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">5</text>

  <line x1="590" y1="236" x2="690" y2="236" stroke="#475569" stroke-width="2"/>
  <text x="640" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">5 ≥ 4 ✓</text>
  <text x="640" y="276" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Decreasing</text>
  <text x="640" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">maintained!</text>

  <!-- Bottom note -->
  <rect x="80" y="338" width="560" height="32" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="359" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">💡 Use cases: Next Greater Element, Largest Rectangle in Histogram, Stock Span Problem — O(n) amortized</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>