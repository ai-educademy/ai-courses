<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="tp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="tp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#tp-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Two Pointers &amp; Sliding Window</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Efficient array traversal patterns — O(n) instead of O(n²)</text>

  <!-- Two Pointers Section -->
  <rect x="30" y="66" width="660" height="142" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="66" width="660" height="28" rx="14" fill="url(#tp-accent)"/>
  <rect x="30" y="80" width="660" height="14" fill="url(#tp-accent)"/>
  <text x="360" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Two Pointers — Converging from both ends</text>
  <text x="360" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Find pair with target sum in sorted array: [1, 2, 4, 6, 8, 10, 12] target=14</text>

  <!-- Array cells -->
  <rect x="110" y="122" width="50" height="36" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/><text x="135" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#166534">1</text>
  <rect x="166" y="122" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="191" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">2</text>
  <rect x="222" y="122" width="50" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="247" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#92400e">4</text>
  <rect x="278" y="122" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="303" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">6</text>
  <rect x="334" y="122" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="359" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">8</text>
  <rect x="390" y="122" width="50" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="415" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#92400e">10</text>
  <rect x="446" y="122" width="50" height="36" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="2"/><text x="471" y="146" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#991b1b">12</text>

  <!-- Left pointer -->
  <text x="135" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="700">▲ L=0</text>
  <line x1="135" y1="166" x2="135" y2="158" stroke="#22c55e" stroke-width="2"/>

  <!-- Right pointer -->
  <text x="471" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#ef4444" font-weight="700">▲ R=6</text>
  <line x1="471" y1="166" x2="471" y2="158" stroke="#ef4444" stroke-width="2"/>

  <!-- Converging arrows -->
  <text x="185" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e">→ →</text>
  <text x="410" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ef4444">← ←</text>

  <!-- Found annotation -->
  <text x="570" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">sum=1+12=13 &lt; 14</text>
  <text x="570" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ move L right</text>
  <text x="570" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f59e0b" font-weight="600">4+10=14 ✓ Found!</text>

  <!-- Sliding Window Section -->
  <rect x="30" y="220" width="660" height="148" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="220" width="660" height="28" rx="14" fill="url(#tp-accent)"/>
  <rect x="30" y="234" width="660" height="14" fill="url(#tp-accent)"/>
  <text x="360" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Sliding Window — Fixed size k=3, find max sum</text>
  <text x="360" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Array: [2, 1, 5, 1, 3, 2] — slide window of 3 across, track max sum</text>

  <!-- Array cells for sliding window -->
  <rect x="110" y="276" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="135" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">2</text>
  <rect x="170" y="276" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="195" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">1</text>
  <rect x="230" y="276" width="50" height="36" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/><text x="255" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">5</text>
  <rect x="290" y="276" width="50" height="36" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/><text x="315" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">1</text>
  <rect x="350" y="276" width="50" height="36" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/><text x="375" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4338ca">3</text>
  <rect x="410" y="276" width="50" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="435" y="300" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#475569">2</text>

  <!-- Window bracket -->
  <rect x="226" y="272" width="178" height="44" rx="8" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="315" y="333" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6366f1" font-weight="600">Window: [5,1,3] sum=9 ← max!</text>

  <!-- Sliding steps on right -->
  <text x="510" y="283" font-family="monospace" font-size="10" fill="#6b7280">[2,1,5] sum=8</text>
  <text x="510" y="299" font-family="monospace" font-size="10" fill="#6b7280">[1,5,1] sum=7</text>
  <text x="510" y="315" font-family="monospace" font-size="10" font-weight="700" fill="#4338ca">[5,1,3] sum=9 ★</text>
  <text x="510" y="331" font-family="monospace" font-size="10" fill="#6b7280">[1,3,2] sum=6</text>

  <!-- Sliding arrow -->
  <text x="495" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Add right, remove left</text>
  <text x="495" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">→ O(n) not O(n×k)</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>