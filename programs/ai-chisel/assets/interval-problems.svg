<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ip-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ip-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="ip-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#ip-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Interval Problems</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">Merge overlapping intervals on a timeline</text>

  <!-- Before: Overlapping Intervals -->
  <rect x="30" y="68" width="660" height="140" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Before Merge — Overlapping Intervals</text>

  <!-- Timeline axis -->
  <line x1="60" y1="190" x2="660" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Tick marks 0-15 -->
  <line x1="60" y1="186" x2="60" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="60" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">0</text>
  <line x1="140" y1="186" x2="140" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="140" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">2</text>
  <line x1="220" y1="186" x2="220" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="220" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">4</text>
  <line x1="300" y1="186" x2="300" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="300" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">6</text>
  <line x1="380" y1="186" x2="380" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="380" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">8</text>
  <line x1="460" y1="186" x2="460" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="460" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">10</text>
  <line x1="540" y1="186" x2="540" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="540" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">12</text>
  <line x1="620" y1="186" x2="620" y2="194" stroke="#94a3b8" stroke-width="1.5"/><text x="620" y="204" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">14</text>

  <!-- Interval [1,3] -->
  <rect x="100" y="98" width="120" height="18" rx="9" fill="#818cf8" opacity="0.8"/>
  <text x="160" y="112" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="white">[1, 3]</text>
  <!-- Interval [2,6] -->
  <rect x="140" y="120" width="200" height="18" rx="9" fill="#f59e0b" opacity="0.8"/>
  <text x="240" y="134" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="white">[2, 6]</text>
  <!-- Interval [5,7] -->
  <rect x="260" y="142" width="120" height="18" rx="9" fill="#ef4444" opacity="0.8"/>
  <text x="320" y="156" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="white">[5, 7]</text>
  <!-- Interval [8,10] -->
  <rect x="380" y="98" width="120" height="18" rx="9" fill="#22c55e" opacity="0.8"/>
  <text x="440" y="112" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="white">[8, 10]</text>
  <!-- Interval [9,12] -->
  <rect x="420" y="120" width="160" height="18" rx="9" fill="#06b6d4" opacity="0.8"/>
  <text x="500" y="134" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="white">[9, 12]</text>

  <!-- Overlap markers -->
  <rect x="140" y="165" width="80" height="14" rx="4" fill="#fecaca" opacity="0.5"/><text x="180" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#dc2626" font-weight="600">overlap</text>
  <rect x="260" y="165" width="80" height="14" rx="4" fill="#fecaca" opacity="0.5"/><text x="300" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#dc2626" font-weight="600">overlap</text>
  <rect x="420" y="165" width="80" height="14" rx="4" fill="#fecaca" opacity="0.5"/><text x="460" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#dc2626" font-weight="600">overlap</text>

  <!-- Arrow down -->
  <text x="360" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#4338ca">⬇ merge()</text>

  <!-- After: Merged Intervals -->
  <rect x="30" y="240" width="660" height="90" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#22c55e">After Merge — Non-Overlapping Result</text>

  <!-- Timeline axis 2 -->
  <line x1="60" y1="310" x2="660" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="60" y1="306" x2="60" y2="314" stroke="#94a3b8" stroke-width="1"/><text x="60" y="324" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">0</text>
  <line x1="220" y1="306" x2="220" y2="314" stroke="#94a3b8" stroke-width="1"/><text x="220" y="324" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">4</text>
  <line x1="380" y1="306" x2="380" y2="314" stroke="#94a3b8" stroke-width="1"/><text x="380" y="324" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">8</text>
  <line x1="540" y1="306" x2="540" y2="314" stroke="#94a3b8" stroke-width="1"/><text x="540" y="324" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">12</text>

  <!-- Merged [1,7] -->
  <rect x="100" y="270" width="280" height="22" rx="11" fill="url(#ip-accent)" opacity="0.9"/>
  <text x="240" y="286" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">[1, 7]</text>
  <!-- Merged [8,12] -->
  <rect x="380" y="270" width="200" height="22" rx="11" fill="url(#ip-accent)" opacity="0.9"/>
  <text x="480" y="286" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="white">[8, 12]</text>

  <!-- Algorithm note -->
  <rect x="120" y="340" width="480" height="30" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Sort by start time → iterate and merge if current.start ≤ prev.end → O(n log n)</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>