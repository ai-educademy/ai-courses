<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="bst-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bst-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" rx="20" fill="url(#bst-bg)"/>
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Binary Search Trees</text>
  <text x="360" y="53" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">BST property: left &lt; parent &lt; right — searching for value 6</text>

  <rect x="30" y="64" width="440" height="270" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="250" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">BST Structure — Search Path for 6</text>

  <!-- Edges -->
  <line x1="250" y1="116" x2="150" y2="160" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="250" y1="116" x2="370" y2="160" stroke="#94a3b8" stroke-width="2"/>
  <line x1="150" y1="180" x2="90" y2="226" stroke="#94a3b8" stroke-width="2"/>
  <line x1="150" y1="180" x2="220" y2="226" stroke="#f59e0b" stroke-width="3"/>
  <line x1="370" y1="180" x2="420" y2="226" stroke="#94a3b8" stroke-width="2"/>

  <!-- Search path highlight: 8 -> 3 -> 6 -->
  <line x1="250" y1="116" x2="150" y2="160" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="6,3"/>
  <line x1="150" y1="180" x2="220" y2="226" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="6,3"/>

  <!-- Node 8 (root) -->
  <circle cx="250" cy="104" r="22" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">8</text>
  <text x="288" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#f59e0b" font-weight="600">6&lt;8 go left</text>

  <!-- Node 3 -->
  <circle cx="150" cy="170" r="22" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="176" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">3</text>
  <text x="115" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#f59e0b" font-weight="600">6>3 go right</text>

  <!-- Node 10 -->
  <circle cx="370" cy="170" r="22" fill="url(#bst-accent)"/>
  <text x="370" y="176" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">10</text>

  <!-- Node 1 -->
  <circle cx="90" cy="238" r="20" fill="url(#bst-accent)"/>
  <text x="90" y="244" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">1</text>

  <!-- Node 6 - FOUND! -->
  <circle cx="220" cy="238" r="22" fill="#22c55e" stroke="#16a34a" stroke-width="3"/>
  <text x="220" y="244" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="white">6</text>
  <text x="220" y="272" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" font-weight="700">Found! ✓</text>

  <!-- Node 14 -->
  <circle cx="420" cy="238" r="20" fill="url(#bst-accent)"/>
  <text x="420" y="244" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="white">14</text>

  <!-- BST property labels -->
  <text x="120" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">left subtree: 1, 3, 6 (all &lt; 8)</text>
  <text x="280" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">right subtree: 10, 14 (all > 8)</text>

  <!-- Properties panel -->
  <rect x="490" y="64" width="200" height="270" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="590" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">BST Properties</text>

  <text x="510" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Time Complexity:</text>
  <text x="520" y="130" font-family="monospace" font-size="10" fill="#475569">Search: O(log n)</text>
  <text x="520" y="148" font-family="monospace" font-size="10" fill="#475569">Insert: O(log n)</text>
  <text x="520" y="166" font-family="monospace" font-size="10" fill="#475569">Delete: O(log n)</text>
  <text x="520" y="184" font-family="monospace" font-size="10" fill="#ef4444">Worst:  O(n) skewed</text>

  <line x1="505" y1="196" x2="675" y2="196" stroke="#e0e7ff" stroke-width="1"/>

  <text x="510" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569" font-weight="600">Search for 6:</text>
  <rect x="510" y="222" width="26" height="20" rx="4" fill="#f59e0b"/><text x="523" y="237" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">8</text>
  <text x="540" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">6 &lt; 8 → left</text>
  <rect x="510" y="248" width="26" height="20" rx="4" fill="#f59e0b"/><text x="523" y="263" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">3</text>
  <text x="540" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">6 > 3 → right</text>
  <rect x="510" y="274" width="26" height="20" rx="4" fill="#22c55e"/><text x="523" y="289" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">6</text>
  <text x="540" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#22c55e" font-weight="600">6 == 6 ✓</text>

  <text x="590" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Only 3 comparisons!</text>
  <text x="590" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">O(log n) = O(log 6) ≈ 3</text>

  <!-- Traversals -->
  <rect x="30" y="345" width="660" height="28" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="40" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569" font-weight="600">In-order:</text>
  <text x="100" y="364" font-family="monospace" font-size="10" fill="#4338ca">1 → 3 → 6 → 8 → 10 → 14</text>
  <text x="310" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">(sorted!)</text>
  <text x="400" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569" font-weight="600">Pre-order:</text>
  <text x="465" y="364" font-family="monospace" font-size="10" fill="#4338ca">8 → 3 → 1 → 6 → 10 → 14</text>

  <text x="360" y="394" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — ai-chisel</text>
</svg>