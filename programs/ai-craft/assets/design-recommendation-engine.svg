<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dre_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dre_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="dre_arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="20" fill="url(#dre_bg)"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Recommendation Engine Pipeline</text>

  <!-- Stage 1: User Activity -->
  <rect x="22" y="80" width="118" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="22" y="80" width="118" height="30" rx="14" fill="url(#dre_accent)"/>
  <rect x="22" y="96" width="118" height="14" fill="url(#dre_accent)"/>
  <text x="81" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">User Activity</text>
  <text x="81" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Clicks, views,</text>
  <text x="81" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">purchases,</text>
  <text x="81" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">ratings &amp; searches</text>
  <!-- Icon: user silhouette -->
  <circle cx="81" cy="172" r="5" fill="#6366f1" opacity="0.3"/>
  <rect x="74" y="178" width="14" height="8" rx="4" fill="#6366f1" opacity="0.3"/>

  <!-- Arrow 1 -->
  <line x1="142" y1="135" x2="162" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <!-- Stage 2: Feature Store -->
  <rect x="168" y="80" width="118" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="168" y="80" width="118" height="30" rx="14" fill="url(#dre_accent)"/>
  <rect x="168" y="96" width="118" height="14" fill="url(#dre_accent)"/>
  <text x="227" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Feature Store</text>
  <text x="227" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">User embeddings,</text>
  <text x="227" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">item metadata,</text>
  <text x="227" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">contextual signals</text>
  <!-- Icon: database -->
  <ellipse cx="227" cy="172" rx="10" ry="4" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="217" y1="172" x2="217" y2="182" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="237" y1="172" x2="237" y2="182" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <ellipse cx="227" cy="182" rx="10" ry="4" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <!-- Arrow 2 -->
  <line x1="288" y1="135" x2="308" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <!-- Stage 3: ML Model -->
  <rect x="314" y="80" width="118" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="314" y="80" width="118" height="30" rx="14" fill="url(#dre_accent)"/>
  <rect x="314" y="96" width="118" height="14" fill="url(#dre_accent)"/>
  <text x="373" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">ML Model</text>
  <text x="373" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Collaborative</text>
  <text x="373" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">filtering, deep</text>
  <text x="373" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">neural network</text>
  <!-- Icon: brain/network -->
  <circle cx="365" cy="176" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="381" cy="176" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="373" cy="168" r="3" fill="#6366f1" opacity="0.3"/>
  <line x1="365" y1="176" x2="373" y2="168" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
  <line x1="381" y1="176" x2="373" y2="168" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
  <line x1="365" y1="176" x2="381" y2="176" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>

  <!-- Arrow 3 -->
  <line x1="434" y1="135" x2="454" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <!-- Stage 4: Ranking -->
  <rect x="460" y="80" width="118" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="460" y="80" width="118" height="30" rx="14" fill="url(#dre_accent)"/>
  <rect x="460" y="96" width="118" height="14" fill="url(#dre_accent)"/>
  <text x="519" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Ranking</text>
  <text x="519" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Score sorting,</text>
  <text x="519" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">diversity rules,</text>
  <text x="519" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">business logic</text>
  <!-- Icon: ranking bars -->
  <rect x="510" y="170" width="6" height="16" rx="1" fill="#6366f1" opacity="0.3"/>
  <rect x="518" y="174" width="6" height="12" rx="1" fill="#6366f1" opacity="0.3"/>
  <rect x="526" y="178" width="6" height="8" rx="1" fill="#6366f1" opacity="0.3"/>

  <!-- Arrow 4 -->
  <line x1="580" y1="135" x2="600" y2="135" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <!-- Stage 5: Top-K Results -->
  <rect x="606" y="80" width="96" height="110" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="606" y="80" width="96" height="30" rx="14" fill="url(#dre_accent)"/>
  <rect x="606" y="96" width="96" height="14" fill="url(#dre_accent)"/>
  <text x="654" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Top-K Results</text>
  <text x="654" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Personalised</text>
  <text x="654" y="143" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">item list</text>
  <text x="654" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">delivered to user</text>
  <!-- Icon: checklist -->
  <rect x="643" y="168" width="22" height="16" rx="3" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="648" y1="173" x2="651" y2="176" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="651" y1="176" x2="657" y2="170" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <!-- Data flow label -->
  <rect x="240" y="210" width="240" height="36" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="233" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Data Flow: Left → Right</text>

  <!-- Pipeline summary boxes -->
  <rect x="50" y="265" width="200" height="90" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="150" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Candidate Generation</text>
  <text x="150" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Broad retrieval from</text>
  <text x="150" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">millions of items using</text>
  <text x="150" y="335" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">approximate nearest neighbour</text>

  <line x1="255" y1="310" x2="275" y2="310" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <rect x="280" y="265" width="180" height="90" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="370" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Scoring &amp; Filtering</text>
  <text x="370" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Apply business rules,</text>
  <text x="370" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">remove duplicates,</text>
  <text x="370" y="335" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">enforce diversity</text>

  <line x1="465" y1="310" x2="485" y2="310" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dre_arrow)"/>

  <rect x="490" y="265" width="180" height="90" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="580" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Re-Ranking</text>
  <text x="580" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Fine-grained model</text>
  <text x="580" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">scores top candidates</text>
  <text x="580" y="335" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">for final ordering</text>

  <!-- Caption -->
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Recommendation Engine — From User Activity to Top-K Results</text>
</svg>
