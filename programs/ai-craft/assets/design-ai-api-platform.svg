<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dapi_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dapi_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="dapi_arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="20" fill="url(#dapi_bg)"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI API Platform Architecture</text>

  <!-- API Gateway Box -->
  <rect x="30" y="80" width="120" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="80" width="120" height="30" rx="14" fill="url(#dapi_accent)"/>
  <rect x="30" y="96" width="120" height="14" fill="url(#dapi_accent)"/>
  <text x="90" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">API Gateway</text>
  <text x="90" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Authentication</text>
  <text x="90" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Rate Limiting</text>
  <text x="90" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Routing</text>
  <text x="90" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">REST / gRPC</text>

  <!-- Arrow: Gateway -> Load Balancer -->
  <line x1="150" y1="145" x2="190" y2="145" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dapi_arrow)"/>

  <!-- Load Balancer Box -->
  <rect x="195" y="80" width="120" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="195" y="80" width="120" height="30" rx="14" fill="url(#dapi_accent)"/>
  <rect x="195" y="96" width="120" height="14" fill="url(#dapi_accent)"/>
  <text x="255" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Load Balancer</text>
  <text x="255" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Round Robin</text>
  <text x="255" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Health Checks</text>
  <text x="255" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Auto Scaling</text>
  <text x="255" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">L7 Routing</text>

  <!-- Arrow: Load Balancer -> Model Serving -->
  <line x1="315" y1="145" x2="355" y2="145" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dapi_arrow)"/>

  <!-- Model Serving Group -->
  <rect x="360" y="65" width="170" height="175" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="360" y="65" width="170" height="30" rx="14" fill="url(#dapi_accent)"/>
  <rect x="360" y="81" width="170" height="14" fill="url(#dapi_accent)"/>
  <text x="445" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Model Serving</text>

  <!-- Instance 1 -->
  <rect x="375" y="105" width="140" height="34" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="391" cy="122" r="5" fill="#22c55e"/>
  <text x="445" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Instance 1 — GPT-4</text>

  <!-- Instance 2 -->
  <rect x="375" y="145" width="140" height="34" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="391" cy="162" r="5" fill="#22c55e"/>
  <text x="445" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Instance 2 — Claude</text>

  <!-- Instance 3 -->
  <rect x="375" y="185" width="140" height="34" rx="8" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="391" cy="202" r="5" fill="#22c55e"/>
  <text x="445" y="206" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Instance 3 — Llama</text>

  <!-- Arrow: Model Serving -> Model Registry -->
  <line x1="530" y1="145" x2="570" y2="145" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dapi_arrow)"/>

  <!-- Model Registry Box -->
  <rect x="575" y="80" width="120" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="575" y="80" width="120" height="30" rx="14" fill="url(#dapi_accent)"/>
  <rect x="575" y="96" width="120" height="14" fill="url(#dapi_accent)"/>
  <text x="635" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Model Registry</text>
  <text x="635" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Versioning</text>
  <text x="635" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Model Store</text>
  <text x="635" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">A/B Config</text>
  <text x="635" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Rollback</text>

  <!-- Monitoring & Logging Panel -->
  <rect x="195" y="275" width="340" height="85" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="195" y="275" width="340" height="28" rx="14" fill="url(#dapi_accent)"/>
  <rect x="195" y="289" width="340" height="14" fill="url(#dapi_accent)"/>
  <text x="365" y="294" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Monitoring &amp; Logging</text>

  <!-- Monitoring sub-items -->
  <text x="270" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📊 Metrics</text>
  <text x="365" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📋 Logs</text>
  <text x="460" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🔔 Alerts</text>
  <text x="365" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Latency · Throughput · Error Rate · Model Drift</text>

  <!-- Vertical connectors from main pipeline to Monitoring -->
  <line x1="255" y1="210" x2="255" y2="275" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="445" y1="240" x2="445" y2="275" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="635" y1="210" x2="635" y2="317" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Caption -->
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI API Platform — Gateway, Load Balancing &amp; Model Serving</text>
</svg>
