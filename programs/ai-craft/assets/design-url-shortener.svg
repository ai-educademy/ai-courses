<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dus_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dus_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="dus_arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="20" fill="url(#dus_bg)"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">URL Shortener Architecture</text>

  <!-- Long URL box -->
  <rect x="30" y="65" width="140" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="65" width="140" height="28" rx="14" fill="url(#dus_accent)"/>
  <rect x="30" y="79" width="140" height="14" fill="url(#dus_accent)"/>
  <text x="100" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Long URL</text>
  <text x="100" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">https://example.com/</text>
  <text x="100" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">very/long/path...</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="105" x2="202" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dus_arrow)"/>

  <!-- Hash Function box -->
  <rect x="208" y="65" width="140" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="208" y="65" width="140" height="28" rx="14" fill="url(#dus_accent)"/>
  <rect x="208" y="79" width="140" height="14" fill="url(#dus_accent)"/>
  <text x="278" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Hash Function</text>
  <text x="278" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">MD5 / SHA-256</text>
  <text x="278" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ 128/256-bit digest</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="105" x2="380" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dus_arrow)"/>

  <!-- Base62 Encode box -->
  <rect x="386" y="65" width="140" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="386" y="65" width="140" height="28" rx="14" fill="url(#dus_accent)"/>
  <rect x="386" y="79" width="140" height="14" fill="url(#dus_accent)"/>
  <text x="456" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Base62 Encode</text>
  <text x="456" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">[a-z A-Z 0-9]</text>
  <text x="456" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">→ 7-char short code</text>

  <!-- Arrow 3 -->
  <line x1="528" y1="105" x2="558" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dus_arrow)"/>

  <!-- Short URL box -->
  <rect x="564" y="65" width="130" height="80" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="564" y="65" width="130" height="28" rx="14" fill="url(#dus_accent)"/>
  <rect x="564" y="79" width="130" height="14" fill="url(#dus_accent)"/>
  <text x="629" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Short URL</text>
  <text x="629" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">https://short.ly/</text>
  <text x="629" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4338ca">aB3xK9z</text>

  <!-- Arrow from Base62 down to Database (storage) -->
  <line x1="456" y1="147" x2="456" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dus_arrow)"/>
  <text x="476" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Store</text>

  <!-- Database box -->
  <rect x="100" y="180" width="530" height="170" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- DB header bar -->
  <rect x="100" y="180" width="530" height="32" rx="14" fill="url(#dus_accent)"/>
  <rect x="100" y="198" width="530" height="14" fill="url(#dus_accent)"/>
  <text x="365" y="201" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">Database — URL Mapping Table</text>

  <!-- DB icon -->
  <ellipse cx="145" cy="196" rx="12" ry="5" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="133" y1="196" x2="133" y2="206" stroke="white" stroke-width="1.2"/>
  <line x1="157" y1="196" x2="157" y2="206" stroke="white" stroke-width="1.2"/>
  <ellipse cx="145" cy="206" rx="12" ry="5" fill="none" stroke="white" stroke-width="1.2"/>

  <!-- Table header row -->
  <rect x="130" y="224" width="100" height="24" rx="4" fill="#eef2ff"/>
  <text x="180" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Short Code</text>
  <rect x="240" y="224" width="240" height="24" rx="4" fill="#eef2ff"/>
  <text x="360" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Long URL</text>
  <rect x="490" y="224" width="110" height="24" rx="4" fill="#eef2ff"/>
  <text x="545" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Created At</text>

  <!-- Table row 1 -->
  <text x="180" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">aB3xK9z</text>
  <text x="360" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">https://example.com/very/long/path/to/page</text>
  <text x="545" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">2025-01-15</text>
  <line x1="130" y1="274" x2="600" y2="274" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Table row 2 -->
  <text x="180" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Xm7pQ2w</text>
  <text x="360" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">https://docs.example.org/api/v2/reference</text>
  <text x="545" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">2025-01-16</text>
  <line x1="130" y1="300" x2="600" y2="300" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Table row 3 -->
  <text x="180" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Rk4nL8y</text>
  <text x="360" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">https://blog.example.com/2025/architecture</text>
  <text x="545" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">2025-01-17</text>

  <!-- Bidirectional label -->
  <text x="365" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Short Code ↔ Long URL — O(1) lookup via hash index</text>

  <!-- Caption -->
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">URL Shortener — Hash, Encode &amp; Store</text>
</svg>
