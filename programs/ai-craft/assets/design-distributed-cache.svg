<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ddc_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ddc_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="ddc_green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <marker id="ddc_arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="ddc_arrow_green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="ddc_arrow_orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="20" fill="url(#ddc_bg)"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Distributed Cache Architecture</text>

  <!-- Application Box -->
  <rect x="30" y="100" width="120" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="100" width="120" height="28" rx="14" fill="url(#ddc_accent)"/>
  <rect x="30" y="114" width="120" height="14" fill="url(#ddc_accent)"/>
  <text x="90" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Application</text>
  <text x="90" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">API Server</text>
  <text x="90" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Cache Client</text>
  <text x="90" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Read / Write</text>
  <text x="90" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Requests</text>

  <!-- Arrow: Application -> Cache Cluster -->
  <line x1="150" y1="155" x2="220" y2="155" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ddc_arrow)"/>
  <text x="185" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">lookup</text>

  <!-- Redis Cluster Group -->
  <rect x="225" y="62" width="270" height="210" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="225" y="62" width="270" height="28" rx="14" fill="url(#ddc_accent)"/>
  <rect x="225" y="76" width="270" height="14" fill="url(#ddc_accent)"/>
  <text x="360" y="81" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Redis Cluster</text>

  <!-- Node 1 -->
  <rect x="243" y="100" width="74" height="65" rx="10" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="280" cy="117" r="8" fill="#ef4444" opacity="0.8"/>
  <text x="280" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="white">R</text>
  <text x="280" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">Node 1</text>
  <text x="280" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Primary</text>

  <!-- Node 2 -->
  <rect x="323" y="100" width="74" height="65" rx="10" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="360" cy="117" r="8" fill="#ef4444" opacity="0.8"/>
  <text x="360" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="white">R</text>
  <text x="360" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">Node 2</text>
  <text x="360" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Replica</text>

  <!-- Node 3 -->
  <rect x="403" y="100" width="74" height="65" rx="10" fill="#f8fafc" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="440" cy="117" r="8" fill="#ef4444" opacity="0.8"/>
  <text x="440" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="white">R</text>
  <text x="440" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">Node 3</text>
  <text x="440" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Replica</text>

  <!-- Cluster details -->
  <text x="360" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Consistent Hashing · Slot Distribution</text>
  <text x="360" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Auto Failover · TTL Expiration</text>
  <text x="360" y="226" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Eviction Policy: LRU / LFU</text>
  <text x="360" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Key Partitioning: 16384 slots</text>

  <!-- Database Box -->
  <rect x="575" y="100" width="120" height="130" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="575" y="100" width="120" height="28" rx="14" fill="url(#ddc_accent)"/>
  <rect x="575" y="114" width="120" height="14" fill="url(#ddc_accent)"/>
  <text x="635" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Database</text>
  <text x="635" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">PostgreSQL</text>
  <text x="635" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Source of Truth</text>
  <text x="635" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Persistent</text>
  <text x="635" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Storage</text>

  <!-- Cache Hit path (green, curves up) -->
  <path d="M 360 62 Q 360 50, 200 50 Q 90 50, 90 100" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ddc_arrow_green)"/>
  <rect x="170" y="42" width="80" height="20" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="210" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#16a34a">✓ Cache Hit</text>

  <!-- Cache Miss path (dashed, goes to DB) -->
  <line x1="495" y1="165" x2="575" y2="165" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ddc_arrow_orange)"/>
  <text x="535" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ea580c">miss</text>

  <!-- DB response back through cache (dashed) -->
  <path d="M 635 230 L 635 310 Q 635 325, 620 325 L 380 325 Q 360 325, 360 310 L 360 272" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ddc_arrow_orange)"/>
  <text x="500" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ea580c">fetch → populate cache</text>

  <!-- Cache Miss label -->
  <rect x="540" y="295" width="84" height="20" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="582" y="309" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#ea580c">✗ Cache Miss</text>

  <!-- Legend -->
  <rect x="30" y="290" width="170" height="70" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="115" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Legend</text>
  <line x1="45" y1="325" x2="75" y2="325" stroke="#16a34a" stroke-width="2.5"/>
  <text x="82" y="329" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Cache Hit (fast path)</text>
  <line x1="45" y1="343" x2="75" y2="343" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="82" y="347" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Cache Miss (slow path)</text>

  <!-- Caption -->
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Distributed Cache — Redis Cluster with Hit/Miss Paths</text>
</svg>
