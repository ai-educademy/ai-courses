<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="dca_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="dca_accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="dca_arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="dca_arrow_rev" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="20" fill="url(#dca_bg)"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Chat Application Architecture</text>

  <!-- Client Box -->
  <rect x="25" y="100" width="110" height="150" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="25" y="100" width="110" height="28" rx="14" fill="url(#dca_accent)"/>
  <rect x="25" y="114" width="110" height="14" fill="url(#dca_accent)"/>
  <text x="80" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="white">Client</text>

  <!-- Chat bubble icon representation -->
  <rect x="50" y="142" width="60" height="30" rx="10" fill="#ede9fe" stroke="#c7d2fe" stroke-width="1"/>
  <text x="80" y="161" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6366f1">Hello!</text>
  <polygon points="60,172 66,172 58,182" fill="#ede9fe" stroke="#c7d2fe" stroke-width="1"/>

  <rect x="50" y="188" width="60" height="30" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="80" y="207" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#16a34a">Hi there!</text>
  <polygon points="100,218 94,218 102,228" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>

  <text x="80" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Web / Mobile</text>

  <!-- Bidirectional Arrow: Client <-> WebSocket Server -->
  <line x1="135" y1="165" x2="180" y2="165" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dca_arrow)"/>
  <line x1="180" y1="185" x2="135" y2="185" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dca_arrow)"/>
  <text x="158" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">real-</text>
  <text x="158" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">time</text>

  <!-- WebSocket Server Box -->
  <rect x="185" y="100" width="120" height="150" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="185" y="100" width="120" height="28" rx="14" fill="url(#dca_accent)"/>
  <rect x="185" y="114" width="120" height="14" fill="url(#dca_accent)"/>
  <text x="245" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">WebSocket Server</text>

  <text x="245" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Connection Mgmt</text>
  <text x="245" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Session Tracking</text>
  <text x="245" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Presence</text>
  <text x="245" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Heartbeat</text>
  <text x="245" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Reconnection</text>

  <!-- Arrow: WebSocket -> Message Queue -->
  <line x1="305" y1="175" x2="350" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dca_arrow)"/>

  <!-- Message Queue Box -->
  <rect x="355" y="100" width="120" height="150" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="355" y="100" width="120" height="28" rx="14" fill="url(#dca_accent)"/>
  <rect x="355" y="114" width="120" height="14" fill="url(#dca_accent)"/>
  <text x="415" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Message Queue</text>

  <text x="415" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Pub/Sub Topics</text>
  <text x="415" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Ordering</text>
  <text x="415" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Delivery Guarantee</text>
  <text x="415" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Kafka / RabbitMQ</text>

  <!-- Arrow: Message Queue -> Chat Service -->
  <line x1="475" y1="175" x2="520" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dca_arrow)"/>

  <!-- Chat Service Box -->
  <rect x="525" y="100" width="110" height="150" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="525" y="100" width="110" height="28" rx="14" fill="url(#dca_accent)"/>
  <rect x="525" y="114" width="110" height="14" fill="url(#dca_accent)"/>
  <text x="580" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="white">Chat Service</text>

  <text x="580" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Message Logic</text>
  <text x="580" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">User Lookup</text>
  <text x="580" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Group Chat</text>
  <text x="580" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Read Receipts</text>

  <!-- Arrow: Chat Service -> Database -->
  <line x1="635" y1="175" x2="660" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#dca_arrow)"/>

  <!-- Database Box -->
  <rect x="665" y="120" width="44" height="110" rx="10" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <!-- Database cylinder representation -->
  <ellipse cx="687" cy="143" rx="16" ry="8" fill="url(#dca_accent)"/>
  <rect x="671" y="143" width="32" height="30" fill="white" stroke="none"/>
  <line x1="671" y1="143" x2="671" y2="173" stroke="#c7d2fe" stroke-width="1.5"/>
  <line x1="703" y1="143" x2="703" y2="173" stroke="#c7d2fe" stroke-width="1.5"/>
  <ellipse cx="687" cy="173" rx="16" ry="8" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <ellipse cx="687" cy="143" rx="16" ry="8" fill="url(#dca_accent)"/>
  <text x="687" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Database</text>
  <text x="687" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">MongoDB</text>

  <!-- Flow description boxes at bottom -->
  <rect x="60" y="290" width="180" height="60" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="150" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">↔ Bidirectional</text>
  <text x="150" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">WebSocket keeps connection</text>
  <text x="150" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">alive for real-time updates</text>

  <rect x="270" y="290" width="180" height="60" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">⚡ Async Processing</text>
  <text x="360" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Message queue decouples</text>
  <text x="360" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">delivery from processing</text>

  <rect x="480" y="290" width="180" height="60" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1"/>
  <text x="570" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">💾 Persistence</text>
  <text x="570" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Messages stored for history,</text>
  <text x="570" y="342" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">search &amp; compliance</text>

  <!-- Caption -->
  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Real-time Chat — WebSocket, Message Queue &amp; Persistence</text>
</svg>
