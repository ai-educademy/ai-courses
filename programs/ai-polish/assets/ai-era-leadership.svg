<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="ael-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="ael-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#ael-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Leadership in the AI Era</text>
  <!-- Left circle: Technical Skills -->
  <circle cx="280" cy="210" r="130" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="210" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Technical Skills</text>
  <text x="210" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">ML &amp; Data Fluency</text>
  <text x="210" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">System Architecture</text>
  <text x="210" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">AI Tool Proficiency</text>
  <text x="210" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Code Review &amp; Quality</text>
  <text x="210" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Research Awareness</text>
  <!-- Right circle: Leadership Skills -->
  <circle cx="440" cy="210" r="130" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="510" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Leadership Skills</text>
  <text x="510" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Vision &amp; Strategy</text>
  <text x="510" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Team Empowerment</text>
  <text x="510" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Stakeholder Mgmt</text>
  <text x="510" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Ethical Decision Making</text>
  <text x="510" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Change Management</text>
  <!-- Intersection -->
  <text x="360" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">AI-Era</text>
  <text x="360" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Leader</text>
  <text x="360" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6366f1">Bridge between</text>
  <text x="360" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6366f1">tech &amp; people</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">The best AI leaders blend deep technical knowledge with human-centric leadership</text>
</svg>