<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="cta-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="cta-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <marker id="cta-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="400" fill="url(#cta-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Career Transitions to AI</text>
  <!-- Left column: backgrounds -->
  <rect x="30" y="75" width="150" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="105" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">👨‍💻 Developer</text>
  <text x="105" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Python, Java, APIs</text>
  <rect x="30" y="147" width="150" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="105" y="169" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📊 Analyst</text>
  <text x="105" y="186" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">SQL, Excel, Statistics</text>
  <rect x="30" y="219" width="150" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="105" y="241" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🎨 Designer</text>
  <text x="105" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">UX, Prototyping, Users</text>
  <rect x="30" y="291" width="150" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="105" y="313" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📋 Manager</text>
  <text x="105" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Strategy, Teams, KPIs</text>
  <!-- Center: Skills to Learn -->
  <rect x="260" y="75" width="200" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#475569">+ ML Frameworks, MLOps</text>
  <text x="360" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">TensorFlow, PyTorch, Docker</text>
  <rect x="260" y="147" width="200" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="169" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#475569">+ Python, ML Theory</text>
  <text x="360" y="186" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Scikit-learn, Pandas, Models</text>
  <rect x="260" y="219" width="200" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="241" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#475569">+ AI Capabilities, Ethics</text>
  <text x="360" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Prompt Design, AI UX Patterns</text>
  <rect x="260" y="291" width="200" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="360" y="313" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#475569">+ AI Landscape, Metrics</text>
  <text x="360" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">ROI, Build-vs-Buy, Roadmaps</text>
  <!-- Right column: AI Roles -->
  <rect x="540" y="75" width="150" height="52" rx="14" fill="url(#cta-accent)"/>
  <text x="615" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">ML Engineer</text>
  <text x="615" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Build &amp; deploy models</text>
  <rect x="540" y="147" width="150" height="52" rx="14" fill="url(#cta-accent)"/>
  <text x="615" y="169" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Data Scientist</text>
  <text x="615" y="186" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Insights &amp; models</text>
  <rect x="540" y="219" width="150" height="52" rx="14" fill="url(#cta-accent)"/>
  <text x="615" y="241" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">AI Product Mgr</text>
  <text x="615" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">AI-first products</text>
  <rect x="540" y="291" width="150" height="52" rx="14" fill="url(#cta-accent)"/>
  <text x="615" y="313" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">AI PM / Lead</text>
  <text x="615" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Strategy &amp; execution</text>
  <!-- Arrows -->
  <line x1="180" y1="101" x2="258" y2="101" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="460" y1="101" x2="538" y2="101" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="180" y1="173" x2="258" y2="173" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="460" y1="173" x2="538" y2="173" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="180" y1="245" x2="258" y2="245" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="460" y1="245" x2="538" y2="245" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="180" y1="317" x2="258" y2="317" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <line x1="460" y1="317" x2="538" y2="317" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cta-arrow)"/>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Every background brings unique strengths to an AI career</text>
</svg>