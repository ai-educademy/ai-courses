<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="bim-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="bim-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bim-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Behavioural Interview — STAR Method</text>
  <!-- S card -->
  <rect x="30" y="80" width="148" height="240" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="30" y="80" width="148" height="44" rx="14" fill="url(#bim-accent)"/>
  <rect x="30" y="104" width="148" height="20" fill="url(#bim-accent)"/>
  <text x="104" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="white">S</text>
  <text x="104" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Situation</text>
  <text x="104" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Set the scene.</text>
  <text x="104" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Describe context,</text>
  <text x="104" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">team, and challenge</text>
  <text x="104" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">you faced.</text>
  <text x="104" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280" font-style="italic">"In my previous role…"</text>
  <!-- Arrow S→T -->
  <line x1="178" y1="200" x2="198" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#bim-arrow)"/>
  <defs><marker id="bim-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker></defs>
  <!-- T card -->
  <rect x="200" y="80" width="148" height="240" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="200" y="80" width="148" height="44" rx="14" fill="url(#bim-accent)"/>
  <rect x="200" y="104" width="148" height="20" fill="url(#bim-accent)"/>
  <text x="274" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="white">T</text>
  <text x="274" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Task</text>
  <text x="274" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Define your role.</text>
  <text x="274" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">What was expected</text>
  <text x="274" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">of you? What goal</text>
  <text x="274" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">did you need to hit?</text>
  <text x="274" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280" font-style="italic">"I was responsible for…"</text>
  <!-- Arrow T→A -->
  <line x1="348" y1="200" x2="368" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#bim-arrow)"/>
  <!-- A card -->
  <rect x="370" y="80" width="148" height="240" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="370" y="80" width="148" height="44" rx="14" fill="url(#bim-accent)"/>
  <rect x="370" y="104" width="148" height="20" fill="url(#bim-accent)"/>
  <text x="444" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="white">A</text>
  <text x="444" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Action</text>
  <text x="444" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Explain what YOU</text>
  <text x="444" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">did. Be specific</text>
  <text x="444" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">about your steps</text>
  <text x="444" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">and decisions.</text>
  <text x="444" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280" font-style="italic">"I implemented…"</text>
  <!-- Arrow A→R -->
  <line x1="518" y1="200" x2="538" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#bim-arrow)"/>
  <!-- R card -->
  <rect x="540" y="80" width="148" height="240" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="540" y="80" width="148" height="44" rx="14" fill="url(#bim-accent)"/>
  <rect x="540" y="104" width="148" height="20" fill="url(#bim-accent)"/>
  <text x="614" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="white">R</text>
  <text x="614" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4338ca">Result</text>
  <text x="614" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Quantify the impact.</text>
  <text x="614" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">What was the</text>
  <text x="614" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">outcome? Use</text>
  <text x="614" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">metrics if possible.</text>
  <text x="614" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280" font-style="italic">"This resulted in 40%…"</text>
  <!-- Tip -->
  <text x="360" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4338ca" font-weight="600">💡 Keep answers 2-3 minutes. Focus 60% on Action &amp; Result.</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Structure every behavioural answer with STAR for clarity and impact</text>
</svg>