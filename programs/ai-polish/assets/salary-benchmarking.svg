<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="sb-bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#sb-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Salary Benchmarking — AI/ML Roles (USD)</text>
  <!-- Y-axis -->
  <line x1="90" y1="60" x2="90" y2="330" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="82" y="330" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">$0K</text>
  <text x="82" y="276" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">$50K</text>
  <line x1="85" y1="276" x2="660" y2="276" stroke="#e0e7ff" stroke-width="1" stroke-dasharray="4"/>
  <text x="82" y="222" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">$100K</text>
  <line x1="85" y1="222" x2="660" y2="222" stroke="#e0e7ff" stroke-width="1" stroke-dasharray="4"/>
  <text x="82" y="168" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">$150K</text>
  <line x1="85" y1="168" x2="660" y2="168" stroke="#e0e7ff" stroke-width="1" stroke-dasharray="4"/>
  <text x="82" y="114" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">$200K</text>
  <line x1="85" y1="114" x2="660" y2="114" stroke="#e0e7ff" stroke-width="1" stroke-dasharray="4"/>
  <!-- X-axis -->
  <line x1="90" y1="330" x2="660" y2="330" stroke="#c7d2fe" stroke-width="1.5"/>
  <!-- Junior: $60K — height = 60/200 * 216 = 64.8 -->
  <rect x="120" y="265" width="80" height="65" rx="6" fill="url(#sb-bar)" opacity="0.7"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">$60K</text>
  <text x="160" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Junior</text>
  <text x="160" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">0-2 yrs</text>
  <!-- Mid: $90K — height = 90/200 * 216 = 97.2 -->
  <rect x="230" y="233" width="80" height="97" rx="6" fill="url(#sb-bar)" opacity="0.8"/>
  <text x="270" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">$90K</text>
  <text x="270" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Mid</text>
  <text x="270" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">2-5 yrs</text>
  <!-- Senior: $130K — height = 130/200 * 216 = 140.4 -->
  <rect x="340" y="190" width="80" height="140" rx="6" fill="url(#sb-bar)" opacity="0.85"/>
  <text x="380" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">$130K</text>
  <text x="380" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Senior</text>
  <text x="380" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">5-8 yrs</text>
  <!-- Staff: $170K — height = 170/200 * 216 = 183.6 -->
  <rect x="450" y="147" width="80" height="183" rx="6" fill="url(#sb-bar)" opacity="0.9"/>
  <text x="490" y="137" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">$170K</text>
  <text x="490" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Staff</text>
  <text x="490" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">8-12 yrs</text>
  <!-- Principal: $200K+ — height = 200/200 * 216 = 216 -->
  <rect x="560" y="114" width="80" height="216" rx="6" fill="url(#sb-bar)"/>
  <text x="600" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">$200K+</text>
  <text x="600" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Principal</text>
  <text x="600" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">12+ yrs</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Base salary only — total comp with equity can be 2-3× higher at top companies</text>
</svg>