<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="cti-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="cti-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#cti-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Communicating Technical Ideas</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280">The Communication Pyramid — adapt depth to your audience</text>
  <!-- Pyramid: top tier -->
  <polygon points="360,85 440,160 280,160" fill="url(#cti-accent)" stroke="white" stroke-width="2"/>
  <text x="360" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Executive</text>
  <text x="360" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Summary</text>
  <!-- Pyramid: middle tier -->
  <polygon points="280,162 440,162 490,248 230,248" fill="#818cf8" stroke="white" stroke-width="2"/>
  <text x="360" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Key Points</text>
  <text x="360" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Why it matters • Impact • Timeline</text>
  <text x="360" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Trade-offs • Recommendations</text>
  <!-- Pyramid: bottom tier -->
  <polygon points="230,250 490,250 540,340 180,340" fill="#a5b4fc" stroke="white" stroke-width="2"/>
  <text x="360" y="282" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Technical Details</text>
  <text x="360" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white">Architecture • Algorithms • Data Flow</text>
  <text x="360" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white">Implementation • Edge Cases • Testing</text>
  <!-- Audience labels on right -->
  <text x="560" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">👔 C-Suite</text>
  <text x="560" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">30 seconds, business impact</text>
  <line x1="445" y1="130" x2="500" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="560" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">📋 Managers</text>
  <text x="560" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">5 minutes, decisions &amp; risks</text>
  <line x1="495" y1="205" x2="500" y2="205" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="560" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">⚙️ Engineers</text>
  <text x="560" y="313" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Deep dive, implementation</text>
  <line x1="545" y1="295" x2="500" y2="295" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Start at the top — go deeper only when your audience needs it</text>
</svg>