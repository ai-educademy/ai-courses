<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="bpb-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="bpb-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bpb-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Building Your Personal Brand</text>
  <!-- Center hub -->
  <circle cx="360" cy="210" r="52" fill="url(#bpb-accent)"/>
  <text x="360" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="white">YOU</text>
  <text x="360" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Your Identity</text>
  <!-- Spokes: 6 nodes evenly around -->
  <!-- Blog (top-left) -->
  <line x1="318" y1="172" x2="175" y2="100" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="110" y="70" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="175" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📝 Blog</text>
  <text x="175" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Share insights &amp; tutorials</text>
  <!-- GitHub (top-right) -->
  <line x1="402" y1="172" x2="545" y2="100" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="480" y="70" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="545" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">💻 GitHub</text>
  <text x="545" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Open source contributions</text>
  <!-- LinkedIn (left) -->
  <line x1="308" y1="210" x2="175" y2="210" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="110" y="181" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="175" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🔗 LinkedIn</text>
  <text x="175" y="221" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Network &amp; thought leadership</text>
  <!-- Speaking (right) -->
  <line x1="412" y1="210" x2="545" y2="210" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="480" y="181" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="545" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🎤 Speaking</text>
  <text x="545" y="221" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Conferences &amp; meetups</text>
  <!-- Open Source (bottom-left) -->
  <line x1="318" y1="248" x2="175" y2="320" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="110" y="292" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="175" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🌐 Open Source</text>
  <text x="175" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Build in public</text>
  <!-- Portfolio (bottom-right) -->
  <line x1="402" y1="248" x2="545" y2="320" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="480" y="292" width="130" height="58" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="545" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🎨 Portfolio</text>
  <text x="545" y="332" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Showcase your best work</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Consistency across channels builds trust and recognition</text>
</svg>