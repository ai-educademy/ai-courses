<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="nyo-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="nyo-accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#nyo-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Negotiating Your Offer — Total Compensation</text>
  <!-- Stacked bar chart -->
  <!-- Bar 1: Base Salary -->
  <rect x="80" y="90" width="110" height="240" rx="8" fill="#6366f1" opacity="0.9"/>
  <text x="135" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Base</text>
  <text x="135" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Salary</text>
  <text x="135" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e0e7ff">40-60%</text>
  <text x="135" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Guaranteed cash</text>
  <text x="135" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">paid regularly</text>
  <!-- + sign -->
  <text x="210" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#4338ca">+</text>
  <!-- Bar 2: Equity -->
  <rect x="230" y="140" width="100" height="190" rx="8" fill="#818cf8"/>
  <text x="280" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Equity</text>
  <text x="280" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e0e7ff">20-40%</text>
  <text x="280" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">RSUs / Options</text>
  <text x="280" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">4yr vest</text>
  <!-- + sign -->
  <text x="350" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#4338ca">+</text>
  <!-- Bar 3: Bonus -->
  <rect x="370" y="195" width="90" height="135" rx="8" fill="#a5b4fc"/>
  <text x="415" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white">Bonus</text>
  <text x="415" y="262" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white">10-20%</text>
  <text x="415" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white">Annual target</text>
  <!-- + sign -->
  <text x="478" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#4338ca">+</text>
  <!-- Bar 4: Benefits -->
  <rect x="495" y="240" width="85" height="90" rx="8" fill="#c7d2fe"/>
  <text x="537" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Benefits</text>
  <text x="537" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Health, 401k</text>
  <text x="537" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">PTO, Perks</text>
  <!-- = Total Comp -->
  <text x="598" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#4338ca">=</text>
  <rect x="616" y="150" width="84" height="130" rx="14" fill="url(#nyo-accent)"/>
  <text x="658" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Total</text>
  <text x="658" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Comp</text>
  <text x="658" y="243" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Negotiate</text>
  <text x="658" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">each part</text>
  <!-- Tip -->
  <text x="360" y="358" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4338ca" font-weight="600">💡 Never accept the first offer. Always negotiate with data.</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Compare total compensation, not just base salary</text>
</svg>