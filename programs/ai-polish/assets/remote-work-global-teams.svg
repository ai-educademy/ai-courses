  <text x="145" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Async communication</text>
  <rect x="230" y="278" width="130" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="295" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📹 Zoom</text>
  <text x="295" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Face-to-face sync</text>
  <rect x="380" y="278" width="130" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="445" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">💻 GitHub</text>
  <text x="445" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Code collaboration</text>
  <rect x="530" y="278" width="130" height="52" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="595" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📋 Notion</text>
  <text x="595" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Documentation hub</text>
  <text x="360" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4338ca" font-weight="600">💡 Overlap hours are golden — protect them for live collaboration</text>
  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Async-first culture enables truly global teams to thrive</text>
