<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <linearGradient id="rwg-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="rwg-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#rwg-bg)" rx="20"/>
