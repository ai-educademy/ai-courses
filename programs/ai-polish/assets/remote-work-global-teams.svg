  <circle cx="155" cy="155" r="6" fill="#6366f1"/><circle cx="155" cy="155" r="3" fill="white"/>
  <circle cx="200" cy="185" r="6" fill="#6366f1"/><circle cx="200" cy="185" r="3" fill="white"/>
  <circle cx="170" cy="195" r="6" fill="#6366f1"/><circle cx="170" cy="195" r="3" fill="white"/>
  <circle cx="345" cy="140" r="6" fill="#6366f1"/><circle cx="345" cy="140" r="3" fill="white"/>
