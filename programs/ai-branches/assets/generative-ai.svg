<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="ga-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ga-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#ga-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Generative AI</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">From prompts to creative outputs via transformer models</text>

  <!-- Input Prompt (left) -->
  <rect x="40" y="130" width="150" height="140" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="115" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Input Prompt</text>
  <line x1="60" y1="172" x2="170" y2="172" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="115" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">💬 "Write a poem</text>
  <text x="115" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">about the ocean"</text>
  <text x="115" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🎨 "A sunset over</text>
  <text x="115" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">mountains"</text>

  <!-- Arrow: Input -> Model -->
  <line x1="190" y1="200" x2="240" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="240,194 256,200 240,206" fill="#94a3b8"/>

  <!-- Transformer Model (center, large) -->
  <rect x="260" y="100" width="200" height="200" rx="16" fill="url(#ga-accent)"/>
  <text x="360" y="135" text-anchor="middle" font-size="32">⚡</text>
  <text x="360" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff">Transformer</text>
  <text x="360" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0e7ff">Model</text>
  <line x1="285" y1="195" x2="435" y2="195" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="360" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Self-Attention</text>
  <text x="360" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Feed-Forward Layers</text>
  <text x="360" y="249" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Billions of Parameters</text>
  <text x="360" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Token Generation</text>
  <!-- Layer lines -->
  <rect x="285" y="275" width="150" height="4" rx="2" fill="#fff" fill-opacity="0.15"/>
  <rect x="285" y="282" width="150" height="4" rx="2" fill="#fff" fill-opacity="0.1"/>
  <rect x="285" y="289" width="150" height="4" rx="2" fill="#fff" fill-opacity="0.07"/>

  <!-- Arrow: Model -> Output -->
  <line x1="460" y1="200" x2="510" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="510,194 526,200 510,206" fill="#94a3b8"/>

  <!-- Generated Output (right) -->
  <rect x="530" y="105" width="160" height="90" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="610" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">📝 Text Output</text>
  <text x="610" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Stories, code, essays</text>
  <text x="610" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">translations, summaries</text>
  <rect x="545" y="175" width="130" height="4" rx="2" fill="#6366f1" fill-opacity="0.2"/>
  <rect x="545" y="182" width="90" height="4" rx="2" fill="#6366f1" fill-opacity="0.15"/>

  <rect x="530" y="210" width="160" height="90" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="610" y="235" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">🎨 Image Output</text>
  <text x="610" y="255" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Art, photos, designs</text>
  <text x="610" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">diagrams, logos</text>
  <!-- Mini image grid -->
  <rect x="570" y="278" width="18" height="14" rx="3" fill="#c7d2fe"/>
  <rect x="592" y="278" width="18" height="14" rx="3" fill="#a5b4fc"/>
  <rect x="614" y="278" width="18" height="14" rx="3" fill="#818cf8"/>
  <rect x="636" y="278" width="18" height="14" rx="3" fill="#6366f1"/>

  <!-- Bottom examples -->
  <text x="360" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Examples: GPT-4, Claude, Gemini (text) • DALL·E, Midjourney, Stable Diffusion (image)</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Generative AI</text>
</svg>
