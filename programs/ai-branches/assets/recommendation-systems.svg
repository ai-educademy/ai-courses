<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="rs-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="rs-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#rs-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Recommendation Systems</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Collaborative Filtering vs Content-Based approaches</text>

  <!-- Left: Collaborative Filtering -->
  <rect x="30" y="80" width="310" height="195" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="185" y="106" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">👥 Collaborative Filtering</text>
  <text x="185" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">"Users like you also liked..."</text>

  <!-- User-Item Matrix -->
  <rect x="55" y="135" width="260" height="120" rx="8" fill="#f8fafc" stroke="#e0e7ff" stroke-width="1"/>
  <text x="185" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">User-Item Rating Matrix</text>
  <!-- Headers -->
  <text x="120" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Movie A</text>
  <text x="180" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Movie B</text>
  <text x="240" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Movie C</text>
  <text x="295" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Movie D</text>
  <!-- User rows -->
  <text x="75" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Alice</text>
  <text x="120" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐5</text>
  <text x="180" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐4</text>
  <text x="240" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">—</text>
  <text x="295" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐3</text>
  <text x="75" y="206" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Bob</text>
  <text x="120" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐4</text>
  <text x="180" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐5</text>
  <text x="240" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐3</text>
  <text x="295" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">—</text>
  <text x="75" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Carol</text>
  <text x="120" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">—</text>
  <text x="180" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐4</text>
  <text x="240" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">⭐5</text>
  <text x="295" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1" font-weight="700">⭐?</text>
  <text x="185" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">Predict missing ratings from similar users</text>

  <!-- Right: Content-Based -->
  <rect x="380" y="80" width="310" height="195" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="535" y="106" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📋 Content-Based</text>
  <text x="535" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">"Because you liked this genre..."</text>

  <!-- Item features -->
  <rect x="405" y="135" width="260" height="120" rx="8" fill="#f8fafc" stroke="#e0e7ff" stroke-width="1"/>
  <text x="535" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">Item Feature Vectors</text>
  <!-- Feature items -->
  <text x="435" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🎬 Movie A:</text>
  <rect x="510" y="163" width="60" height="12" rx="3" fill="#6366f1" opacity="0.7"/>
  <rect x="575" y="163" width="40" height="12" rx="3" fill="#a5b4fc"/>
  <rect x="620" y="163" width="30" height="12" rx="3" fill="#c7d2fe"/>
  <text x="435" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🎬 Movie B:</text>
  <rect x="510" y="183" width="45" height="12" rx="3" fill="#6366f1" opacity="0.7"/>
  <rect x="560" y="183" width="55" height="12" rx="3" fill="#a5b4fc"/>
  <rect x="620" y="183" width="30" height="12" rx="3" fill="#c7d2fe"/>
  <text x="435" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">🎬 Movie C:</text>
  <rect x="510" y="203" width="55" height="12" rx="3" fill="#6366f1" opacity="0.7"/>
  <rect x="570" y="203" width="35" height="12" rx="3" fill="#a5b4fc"/>
  <rect x="610" y="203" width="45" height="12" rx="3" fill="#c7d2fe"/>
  <!-- Legend -->
  <rect x="420" y="225" width="10" height="10" rx="2" fill="#6366f1" opacity="0.7"/>
  <text x="435" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Action</text>
  <rect x="470" y="225" width="10" height="10" rx="2" fill="#a5b4fc"/>
  <text x="485" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Drama</text>
  <rect x="520" y="225" width="10" height="10" rx="2" fill="#c7d2fe"/>
  <text x="535" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Comedy</text>
  <text x="535" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6366f1">Match item features to user preferences</text>

  <!-- Bottom: Hybrid -->
  <rect x="160" y="300" width="400" height="60" rx="14" fill="url(#rs-accent)"/>
  <text x="360" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fff">🔀 Hybrid Approach</text>
  <text x="360" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e0e7ff">Combines both methods for best results — Netflix, Spotify, Amazon</text>

  <!-- Arrows to hybrid -->
  <line x1="185" y1="275" x2="280" y2="300" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="276,294 286,303 274,302" fill="#94a3b8"/>
  <line x1="535" y1="275" x2="440" y2="300" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="446,294 434,303 444,302" fill="#94a3b8"/>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Recommendation Systems</text>
</svg>
