<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="cv-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="cv-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#cv-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Computer Vision Pipeline</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">From raw pixels to meaningful labels</text>

  <!-- Step 1: Image -->
  <rect x="30" y="120" width="110" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="85" y="155" text-anchor="middle" font-size="28">🖼️</text>
  <text x="85" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Image</text>
  <text x="85" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Raw pixels</text>
  <text x="85" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">RGB input</text>
  <rect x="30" y="240" width="110" height="5" rx="2" fill="url(#cv-accent)" opacity="0.3"/>
  <text x="85" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 1</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="175" x2="162" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="162,169 175,175 162,181" fill="#94a3b8"/>

  <!-- Step 2: Preprocessing -->
  <rect x="178" y="120" width="110" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="233" y="155" text-anchor="middle" font-size="28">⚙️</text>
  <text x="233" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Preprocess</text>
  <text x="233" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Resize, normalize</text>
  <text x="233" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Augment data</text>
  <rect x="178" y="240" width="110" height="5" rx="2" fill="url(#cv-accent)" opacity="0.4"/>
  <text x="233" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 2</text>

  <!-- Arrow 2 -->
  <line x1="288" y1="175" x2="310" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="310,169 323,175 310,181" fill="#94a3b8"/>

  <!-- Step 3: Feature Extraction -->
  <rect x="326" y="120" width="110" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="381" y="155" text-anchor="middle" font-size="28">🔍</text>
  <text x="381" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">Feature Extract</text>
  <text x="381" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Edges, textures</text>
  <text x="381" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">CNN filters</text>
  <rect x="326" y="240" width="110" height="5" rx="2" fill="url(#cv-accent)" opacity="0.6"/>
  <text x="381" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 3</text>

  <!-- Arrow 3 -->
  <line x1="436" y1="175" x2="458" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="458,169 471,175 458,181" fill="#94a3b8"/>

  <!-- Step 4: Classification -->
  <rect x="474" y="120" width="110" height="110" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="529" y="155" text-anchor="middle" font-size="28">🧠</text>
  <text x="529" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Classify</text>
  <text x="529" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Softmax layer</text>
  <text x="529" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Probability scores</text>
  <rect x="474" y="240" width="110" height="5" rx="2" fill="url(#cv-accent)" opacity="0.8"/>
  <text x="529" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 4</text>

  <!-- Arrow 4 -->
  <line x1="584" y1="175" x2="606" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="606,169 619,175 606,181" fill="#94a3b8"/>

  <!-- Step 5: Label -->
  <rect x="622" y="120" width="80" height="110" rx="14" fill="url(#cv-accent)"/>
  <text x="662" y="155" text-anchor="middle" font-size="28">🏷️</text>
  <text x="662" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">Label</text>
  <text x="662" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">"Cat"</text>
  <text x="662" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">98.5%</text>

  <!-- Example annotations -->
  <rect x="120" y="290" width="480" height="60" rx="12" fill="#fff" fill-opacity="0.6" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="312" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4338ca">Example: Photo of a cat → resize to 224×224 → detect ears, whiskers → classify → "Cat" 98.5%</text>
  <text x="360" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Common architectures: ResNet, VGG, EfficientNet, Vision Transformer (ViT)</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Computer Vision Pipeline</text>
</svg>
