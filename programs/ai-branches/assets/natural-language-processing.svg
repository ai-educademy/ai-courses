<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="nlp-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="nlp-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#nlp-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">NLP Pipeline</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">From raw text to meaning — the Natural Language Processing flow</text>

  <!-- Step 1: Raw Text -->
  <rect x="20" y="110" width="115" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="77" y="140" text-anchor="middle" font-size="24">📄</text>
  <text x="77" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Raw Text</text>
  <text x="77" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">"The movie</text>
  <text x="77" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">was great!"</text>
  <text x="77" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 1</text>

  <!-- Arrow -->
  <line x1="135" y1="170" x2="155" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="155,164 168,170 155,176" fill="#94a3b8"/>

  <!-- Step 2: Tokenize -->
  <rect x="170" y="110" width="115" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="227" y="140" text-anchor="middle" font-size="24">✂️</text>
  <text x="227" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Tokenize</text>
  <text x="227" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">["The", "movie",</text>
  <text x="227" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">"was", "great"]</text>
  <text x="227" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 2</text>

  <!-- Arrow -->
  <line x1="285" y1="170" x2="305" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="305,164 318,170 305,176" fill="#94a3b8"/>

  <!-- Step 3: Embed -->
  <rect x="320" y="110" width="115" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="377" y="140" text-anchor="middle" font-size="24">🔢</text>
  <text x="377" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Embed</text>
  <text x="377" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">[0.23, -0.87,</text>
  <text x="377" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">0.45, 0.12...]</text>
  <text x="377" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 3</text>

  <!-- Arrow -->
  <line x1="435" y1="170" x2="455" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="455,164 468,170 455,176" fill="#94a3b8"/>

  <!-- Step 4: Encode -->
  <rect x="470" y="110" width="115" height="120" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="527" y="140" text-anchor="middle" font-size="24">🧠</text>
  <text x="527" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4338ca">Encode</text>
  <text x="527" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Contextual repr.</text>
  <text x="527" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Self-attention</text>
  <text x="527" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Step 4</text>

  <!-- Arrow -->
  <line x1="585" y1="170" x2="605" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="605,164 618,170 605,176" fill="#94a3b8"/>

  <!-- Step 5: Classify -->
  <rect x="620" y="110" width="82" height="120" rx="14" fill="url(#nlp-accent)"/>
  <text x="661" y="140" text-anchor="middle" font-size="24">🏷️</text>
  <text x="661" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">Classify</text>
  <text x="661" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Positive 😊</text>
  <text x="661" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">94.2%</text>
  <text x="661" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#e0e7ff" opacity="0.7">Step 5</text>

  <!-- Progress bar -->
  <rect x="20" y="245" width="682" height="6" rx="3" fill="#e0e7ff"/>
  <rect x="20" y="245" width="136" height="6" rx="3" fill="#c7d2fe"/>
  <rect x="156" y="245" width="136" height="6" rx="3" fill="#a5b4fc"/>
  <rect x="292" y="245" width="136" height="6" rx="3" fill="#818cf8"/>
  <rect x="428" y="245" width="136" height="6" rx="3" fill="#6366f1"/>
  <rect x="564" y="245" width="138" height="6" rx="3" fill="#4f46e5"/>

  <!-- Bottom: NLP tasks -->
  <rect x="50" y="270" width="620" height="80" rx="12" fill="#fff" fill-opacity="0.6" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Common NLP Tasks</text>
  <text x="140" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">😊 Sentiment</text>
  <text x="270" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🏷 NER</text>
  <text x="380" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">🌐 Translation</text>
  <text x="500" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">📋 Summarization</text>
  <text x="620" y="315" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">❓ QA</text>
  <text x="360" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Models: BERT, GPT, T5, RoBERTa, XLNet</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — NLP Pipeline</text>
</svg>
