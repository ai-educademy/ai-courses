<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="rl-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="rl-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#rl-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Reinforcement Learning</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">The classic Agent-Environment interaction loop</text>

  <!-- Agent (left) -->
  <rect x="80" y="130" width="180" height="140" rx="16" fill="url(#rl-accent)"/>
  <text x="170" y="170" text-anchor="middle" font-size="32">🤖</text>
  <text x="170" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff">Agent</text>
  <text x="170" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Policy π(s) → a</text>
  <text x="170" y="237" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Value function V(s)</text>
  <text x="170" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Q-function Q(s,a)</text>

  <!-- Environment (right) -->
  <rect x="460" y="130" width="180" height="140" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="550" y="170" text-anchor="middle" font-size="32">🌍</text>
  <text x="550" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#4338ca">Environment</text>
  <text x="550" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Game, simulation,</text>
  <text x="550" y="237" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">robot world, market</text>
  <text x="550" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">Transition dynamics</text>

  <!-- Top Arrow: Agent -> Action -> Environment -->
  <line x1="260" y1="145" x2="460" y2="145" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="455,139 468,145 455,151" fill="#94a3b8"/>
  <rect x="320" y="120" width="80" height="26" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">Action aₜ</text>

  <!-- Bottom Arrow: Environment -> Reward/State -> Agent -->
  <line x1="460" y1="255" x2="260" y2="255" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="265,249 252,255 265,261" fill="#94a3b8"/>

  <!-- Reward box -->
  <rect x="300" y="268" width="100" height="26" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="350" y="286" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">Reward rₜ</text>

  <!-- State box -->
  <rect x="300" y="240" width="100" height="26" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="350" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6366f1">State sₜ₊₁</text>

  <!-- Goal label -->
  <rect x="220" y="310" width="280" height="45" rx="10" fill="#fff" fill-opacity="0.7" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">🎯 Goal: Maximize cumulative reward</text>
  <text x="360" y="346" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">R = Σ γᵗ rₜ where γ is the discount factor</text>

  <!-- Cycle arrows (decorative small arrows showing loop) -->
  <path d="M260 155 C300 85, 420 85, 460 155" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <text x="360" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Repeat for each timestep t</text>

  <!-- Examples -->
  <text x="360" y="370" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569">AlphaGo • Atari Games • Robot Navigation • ChatGPT (RLHF) • Autonomous Driving</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Reinforcement Learning</text>
</svg>
