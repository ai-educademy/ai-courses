<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="ma-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="ma-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#ma-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Multimodal AI</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Combining text, image, and audio for unified understanding</text>

  <!-- Text Input (top) -->
  <rect x="40" y="90" width="160" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">📝 Text</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Words, sentences, docs</text>

  <!-- Image Input (middle) -->
  <rect x="40" y="180" width="160" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="120" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🖼️ Image</text>
  <text x="120" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Photos, diagrams, video</text>

  <!-- Audio Input (bottom) -->
  <rect x="40" y="270" width="160" height="70" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="120" y="298" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">🔊 Audio</text>
  <text x="120" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Speech, music, sounds</text>

  <!-- Converging arrows -->
  <line x1="200" y1="125" x2="290" y2="195" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="285,189 296,198 283,198" fill="#94a3b8"/>
  <line x1="200" y1="215" x2="290" y2="210" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="286,204 296,210 286,216" fill="#94a3b8"/>
  <line x1="200" y1="305" x2="290" y2="225" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="285,220 296,222 283,230" fill="#94a3b8"/>

  <!-- Encoder labels on arrows -->
  <text x="230" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" transform="rotate(-22 230 148)">Text Encoder</text>
  <text x="240" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">Image Encoder</text>
  <text x="228" y="278" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" transform="rotate(22 228 278)">Audio Encoder</text>

  <!-- Fusion Layer (center) -->
  <rect x="300" y="150" width="150" height="130" rx="16" fill="url(#ma-accent)"/>
  <text x="375" y="185" text-anchor="middle" font-size="28">🔗</text>
  <text x="375" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fff">Fusion Layer</text>
  <text x="375" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Cross-attention</text>
  <text x="375" y="248" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Shared embeddings</text>
  <text x="375" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e0e7ff">Alignment</text>

  <!-- Arrow: Fusion -> Output -->
  <line x1="450" y1="215" x2="510" y2="215" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="510,209 526,215 510,221" fill="#94a3b8"/>

  <!-- Unified Understanding (right) -->
  <rect x="530" y="120" width="160" height="190" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="610" y="150" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Unified</text>
  <text x="610" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4338ca">Understanding</text>
  <line x1="548" y1="178" x2="672" y2="178" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="610" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Visual Q&amp;A</text>
  <text x="610" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Image captioning</text>
  <text x="610" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Video understanding</text>
  <text x="610" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Speech translation</text>
  <text x="610" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">✅ Cross-modal search</text>
  <text x="610" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">GPT-4V, Gemini, LLaVA</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Multimodal AI</text>
</svg>
