<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="vas-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="vas-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#vas-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Voice AI &amp; Speech</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">End-to-end voice assistant pipeline</text>

  <!-- Step 1: Sound Wave (input) -->
  <rect x="15" y="120" width="90" height="85" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="60" y="150" text-anchor="middle" font-size="22">🎤</text>
  <text x="60" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Sound</text>
  <text x="60" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Wave</text>
  <text x="60" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Audio input</text>

  <!-- Sound wave decoration -->
  <path d="M25 145 Q35 135, 45 145 Q55 155, 65 145 Q75 135, 85 145" stroke="#c7d2fe" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Arrow -->
  <line x1="105" y1="162" x2="122" y2="162" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="122,156 134,162 122,168" fill="#94a3b8"/>

  <!-- Step 2: STT -->
  <rect x="136" y="120" width="95" height="85" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="183" y="150" text-anchor="middle" font-size="20">📝</text>
  <text x="183" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Speech-to-</text>
  <text x="183" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Text</text>
  <text x="183" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">ASR / Whisper</text>

  <!-- Arrow -->
  <line x1="231" y1="162" x2="248" y2="162" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="248,156 260,162 248,168" fill="#94a3b8"/>

  <!-- Step 3: NLU -->
  <rect x="262" y="120" width="95" height="85" rx="14" fill="url(#vas-accent)"/>
  <text x="309" y="150" text-anchor="middle" font-size="20">🧠</text>
  <text x="309" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">Natural</text>
  <text x="309" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">Language</text>
  <text x="309" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e0e7ff">Intent &amp; Entities</text>

  <!-- Arrow -->
  <line x1="357" y1="162" x2="374" y2="162" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="374,156 386,162 374,168" fill="#94a3b8"/>

  <!-- Step 4: Response Gen -->
  <rect x="388" y="120" width="95" height="85" rx="14" fill="url(#vas-accent)"/>
  <text x="435" y="150" text-anchor="middle" font-size="20">💬</text>
  <text x="435" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">Response</text>
  <text x="435" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">Generation</text>
  <text x="435" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e0e7ff">LLM / Dialog</text>

  <!-- Arrow -->
  <line x1="483" y1="162" x2="500" y2="162" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="500,156 512,162 500,168" fill="#94a3b8"/>

  <!-- Step 5: TTS -->
  <rect x="514" y="120" width="95" height="85" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="561" y="150" text-anchor="middle" font-size="20">🗣️</text>
  <text x="561" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Text-to-</text>
  <text x="561" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Speech</text>
  <text x="561" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Voice synthesis</text>

  <!-- Arrow -->
  <line x1="609" y1="162" x2="626" y2="162" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="626,156 638,162 626,168" fill="#94a3b8"/>

  <!-- Step 6: Sound Wave (output) -->
  <rect x="640" y="120" width="65" height="85" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="672" y="150" text-anchor="middle" font-size="22">🔊</text>
  <text x="672" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Sound</text>
  <text x="672" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4338ca">Wave</text>
  <text x="672" y="196" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280">Audio out</text>

  <!-- Example flow -->
  <rect x="60" y="230" width="600" height="75" rx="12" fill="#fff" fill-opacity="0.7" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">Example Flow</text>
  <text x="360" y="272" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">"Hey Siri, what's the weather?" → ASR → Intent: weather_query → API call → "It's 22°C and sunny" → TTS → 🔊</text>
  <text x="360" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Technologies: Whisper, Wav2Vec, Tacotron, WaveNet, VITS</text>

  <!-- Voice assistants -->
  <text x="120" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">🍎 Siri</text>
  <text x="240" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">📱 Alexa</text>
  <text x="360" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">🔵 Google</text>
  <text x="480" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">🟦 Cortana</text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">🤖 ChatGPT</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Voice AI &amp; Speech</text>
</svg>
