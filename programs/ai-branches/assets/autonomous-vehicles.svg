<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="av-bg" x1="0" y1="0" x2="720" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="av-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#av-bg)" rx="20"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Autonomous Vehicles</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280">Sensor fusion enabling self-driving decisions</text>

  <!-- Car outline (center) -->
  <rect x="280" y="155" width="160" height="80" rx="20" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <rect x="300" y="145" width="120" height="40" rx="12" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="310" cy="240" r="14" fill="#4f46e5" opacity="0.8"/>
  <circle cx="310" cy="240" r="6" fill="#fff"/>
  <circle cx="410" cy="240" r="14" fill="#4f46e5" opacity="0.8"/>
  <circle cx="410" cy="240" r="6" fill="#fff"/>
  <text x="360" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4338ca">🚗 Self-Driving</text>

  <!-- AI Decision Engine (center below car) -->
  <rect x="295" y="268" width="130" height="40" rx="10" fill="url(#av-accent)"/>
  <text x="360" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fff">AI Decision Engine</text>

  <!-- Camera (top-left) -->
  <rect x="60" y="90" width="130" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="125" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">📷 Camera</text>
  <text x="125" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Visual recognition</text>
  <line x1="190" y1="135" x2="295" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="290,170 300,178 288,179" fill="#94a3b8"/>

  <!-- LiDAR (top-right) -->
  <rect x="530" y="90" width="130" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="595" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">🎯 LiDAR</text>
  <text x="595" y="136" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">3D point cloud</text>
  <line x1="530" y1="135" x2="425" y2="175" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="430,170 420,178 432,179" fill="#94a3b8"/>

  <!-- Radar (bottom-left) -->
  <rect x="60" y="260" width="130" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="125" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">📡 Radar</text>
  <text x="125" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Distance &amp; velocity</text>
  <line x1="190" y1="288" x2="295" y2="288" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="290,282 300,288 290,294" fill="#94a3b8"/>

  <!-- GPS (bottom-right) -->
  <rect x="530" y="260" width="130" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="595" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">🛰 GPS</text>
  <text x="595" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">Location &amp; mapping</text>
  <line x1="530" y1="288" x2="425" y2="288" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="430,282 420,288 430,294" fill="#94a3b8"/>

  <!-- Center label -->
  <text x="360" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Sensor Fusion combines all inputs for safe navigation</text>

  <text x="360" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">AI Educademy — Autonomous Vehicles</text>
</svg>
