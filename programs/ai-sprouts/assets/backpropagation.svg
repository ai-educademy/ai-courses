<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="babg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bahdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#babg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">Backpropagation</text>

  <!-- Layer labels -->
  <text x="110" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Input</text>
  <text x="310" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Hidden</text>
  <text x="510" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#4338ca">Output</text>
  <text x="650" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#dc2626">Error</text>

  <!-- Input Layer Nodes -->
  <circle cx="110" cy="130" r="20" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <text x="110" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">x₁</text>
  <circle cx="110" cy="200" r="20" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <text x="110" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">x₂</text>
  <circle cx="110" cy="270" r="20" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <text x="110" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">x₃</text>

  <!-- Hidden Layer Nodes -->
  <circle cx="310" cy="115" r="20" fill="white" stroke="#a7f3d0" stroke-width="2"/>
  <text x="310" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">h₁</text>
  <circle cx="310" cy="200" r="20" fill="white" stroke="#a7f3d0" stroke-width="2"/>
  <text x="310" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">h₂</text>
  <circle cx="310" cy="285" r="20" fill="white" stroke="#a7f3d0" stroke-width="2"/>
  <text x="310" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">h₃</text>

  <!-- Output Layer Nodes -->
  <circle cx="510" cy="160" r="20" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <text x="510" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">o₁</text>
  <circle cx="510" cy="240" r="20" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <text x="510" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">o₂</text>

  <!-- Forward Arrows (green) Input → Hidden -->
  <line x1="130" y1="130" x2="290" y2="115" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="130" x2="290" y2="200" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="130" x2="290" y2="285" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="200" x2="290" y2="115" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="200" x2="290" y2="200" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="200" x2="290" y2="285" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="270" x2="290" y2="115" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="270" x2="290" y2="200" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="270" x2="290" y2="285" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- Forward Arrows (green) Hidden → Output -->
  <line x1="330" y1="115" x2="490" y2="160" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="115" x2="490" y2="240" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="200" x2="490" y2="160" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="200" x2="490" y2="240" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="285" x2="490" y2="160" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="285" x2="490" y2="240" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- Forward label -->
  <rect x="175" y="55" width="80" height="18" rx="6" fill="#dcfce7"/>
  <text x="215" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#16a34a">Forward →</text>

  <!-- Error output -->
  <line x1="530" y1="200" x2="620" y2="200" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="618,195 628,200 618,205" fill="#ef4444"/>
  <rect x="625" y="170" width="70" height="60" rx="12" fill="white" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="195" text-anchor="middle" font-size="18">📉</text>
  <text x="660" y="215" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#dc2626">Loss</text>

  <!-- Backward Arrows (red/orange, below) -->
  <path d="M620,230 Q560,310 510,270" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M490,270 Q400,340 310,305" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M290,300 Q200,340 130,285" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>

  <!-- Backward label -->
  <rect x="300" y="335" width="120" height="22" rx="6" fill="#fff7ed"/>
  <text x="360" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#ea580c">← Backpropagation</text>
  <text x="360" y="365" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280">(Adjust weights to reduce error)</text>

  <text x="360" y="390" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Forward pass computes output — backward pass adjusts weights</text>
</svg>
