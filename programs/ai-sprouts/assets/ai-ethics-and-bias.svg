<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <linearGradient id="aebg" x1="0" y1="0" x2="720" y2="400">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="aehdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#aebg)" rx="20"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#4338ca">AI Ethics &amp; Bias</text>

  <!-- Balance Scale -->
  <!-- Fulcrum triangle -->
  <polygon points="360,280 340,310 380,310" fill="#94a3b8" opacity="0.5"/>
  <!-- Base -->
  <rect x="310" y="310" width="100" height="8" rx="4" fill="#94a3b8" opacity="0.5"/>
  <!-- Scale beam (tilted) -->
  <line x1="140" y1="240" x2="580" y2="200" stroke="#475569" stroke-width="3" stroke-linecap="round"/>

  <!-- Left Pan: Biased Data (tilting down) -->
  <g transform="translate(60,250)">
    <rect width="200" height="100" rx="14" fill="white" stroke="#fca5a5" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#dc2626">⚠️ Biased Training Data</text>
    <text x="100" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Unbalanced demographics</text>
    <text x="100" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Historical prejudices</text>
    <text x="100" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Missing representation</text>
  </g>
  <!-- Data points feeding in -->
  <circle cx="100" cy="220" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="130" cy="215" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="160" cy="225" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="190" cy="210" r="5" fill="#ef4444" opacity="0.4"/>
  <circle cx="220" cy="230" r="5" fill="#ef4444" opacity="0.4"/>
  <line x1="100" y1="226" x2="110" y2="250" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="160" y1="231" x2="140" y2="250" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Right Pan: Fair Outcomes (tilting up) -->
  <g transform="translate(460,210)">
    <rect width="200" height="100" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#16a34a">✅ Fair Outcomes</text>
    <text x="100" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Equal treatment for all</text>
    <text x="100" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Transparent decisions</text>
    <text x="100" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Accountable AI systems</text>
  </g>

  <!-- Top info boxes -->
  <g transform="translate(60,60)">
    <rect width="280" height="65" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="140" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">🔍 The Problem</text>
    <text x="140" y="43" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">If training data is biased, the AI model</text>
    <text x="140" y="57" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">will learn and amplify those biases</text>
  </g>

  <g transform="translate(380,60)">
    <rect width="280" height="65" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="140" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#4338ca">💡 The Solution</text>
    <text x="140" y="43" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">Diverse data, regular audits, fairness</text>
    <text x="140" y="57" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280">metrics, and human oversight</text>
  </g>

  <!-- Arrow between top boxes -->
  <line x1="345" y1="92" x2="375" y2="92" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="373,87 383,92 373,97" fill="#94a3b8"/>

  <text x="360" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6366f1" opacity="0.7">Biased data in → biased decisions out — fairness requires effort</text>
</svg>
